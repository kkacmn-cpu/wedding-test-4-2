<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ivory:#fcf9f4;--ivory-2:#f7f1e8;--brown:#3a2f26;--brown-soft:#5c4e42;
  --brown-mute:#8a7a6a;--gold:#b8945f;--gold-deep:#9a7740;--gold-pale:#e9dcc4;
  --gold-wash:#f5eedf;--line:#e8ddcc;--white:#ffffff;--ok:#6f8f6a;--sand:#d9c8af;
  --sh-sm:0 4px 18px -8px rgba(58,47,38,.18);
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --invitation-card-width:480px;
  --invitation-cover-height:100vh;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--ivory);color:var(--brown);min-height:100vh;font-weight:300;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word;}

/* 로딩 */
#loading{position:fixed;inset:0;background:var(--ivory);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s;}
#loading.hide{opacity:0;pointer-events:none;}
.loading-logo{font-family:var(--serif);font-size:22px;color:var(--gold-deep);margin-bottom:20px;letter-spacing:2px;}
.loading-dots{display:flex;gap:8px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dot .9s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}

/* 청첩장 전체 */
#card{max-width:480px;margin:0 auto;background:var(--white);min-height:100vh;position:relative;overflow:hidden;animation:cardFadeIn .9s .85s ease both;}
@keyframes cardFadeIn{0%{opacity:0;}100%{opacity:1;}}

/* 오프닝 */
/* FEATURE30 — 오프닝은 실제 청첩장 프레임과 같은 폭·높이에서 재생한다.
   데스크톱에서 사진만 모니터 전체로 커졌다가 480px 카드로 줄어드는 점프를 차단한다. */
.op-overlay{
  --op-outer-bg:var(--ivory);
  position:fixed;top:0;left:50%;right:auto;bottom:auto;
  width:min(100vw,var(--invitation-card-width,480px));
  max-width:var(--invitation-card-width,480px);
  height:var(--invitation-cover-height);min-height:0;
  transform:translateX(-50%);
  z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;overflow:hidden;
  box-shadow:0 0 0 100vmax var(--op-outer-bg);
  overscroll-behavior:contain;
}
.op-overlay.done{display:none;pointer-events:none;}
.op-overlay.release-touch{pointer-events:none;}
.op-names{font-family:var(--cover-name-font-family,var(--serif));font-size:var(--cover-name-font-size,28px);letter-spacing:var(--cover-name-letter-spacing,3px);color:inherit;margin-bottom:12px;}
.op-sub{font-size:var(--cover-date-font-size,13px);letter-spacing:var(--cover-date-letter-spacing,2px);opacity:.7;}

/* ===== theme별 오프닝 커버 (1.2~1.6초 자동, opacity+transform만) ===== */
.op-overlay.op-theme{animation:opThemeOut .5s 1.05s ease forwards;}
.op-overlay.op-theme .op-names{font-family:var(--cover-name-font-family,var(--serif));letter-spacing:var(--cover-name-letter-spacing,4px);white-space:var(--cover-name-white-space,nowrap);}
.op-overlay.op-theme .op-sub{font-size:var(--cover-date-font-size,12px);letter-spacing:var(--cover-date-letter-spacing,3px);margin-top:var(--cover-date-margin-top,14px);opacity:.85;}
.op-overlay.op-theme .op-lbl{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;opacity:.7;margin-bottom:16px;}
@keyframes opThemeOut{to{opacity:0;visibility:hidden;}}
@keyframes opRiseFade{0%{opacity:0;transform:translateY(6px);}100%{opacity:1;transform:translateY(0);}}
@keyframes opSoftFade{0%{opacity:0;}100%{opacity:1;}}
@keyframes opVerySoft{0%{opacity:0;}100%{opacity:1;}}
@keyframes opCardRise{0%{opacity:0;transform:translateY(8px) scale(.98);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes opCardIn{0%{opacity:0;transform:scale(.98);}100%{opacity:1;transform:scale(1);}}
@keyframes opZoomBg{0%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes opLineExpand{0%{transform:scaleX(0);}100%{transform:scaleX(1);}}
@keyframes opBoxIn{0%{opacity:0;}100%{opacity:1;}}
@keyframes opGoldGlow{0%{opacity:0;box-shadow:0 0 0 rgba(201,168,106,0);}100%{opacity:1;box-shadow:0 0 14px rgba(201,168,106,.5);}}
@keyframes opCutIn{0%{opacity:0;}18%{opacity:0;}19%{opacity:1;}100%{opacity:1;}}

/* 1. signature → 웨딩 화보 인화: 과노출에서 실제 사진과 타이포가 정착 */
.op-overlay.theme-signature{--op-outer-bg:#f1eadf;padding:0;color:#fff;background:#f1eadf;overflow:hidden;animation:opThemeOut .55s 1.72s ease forwards;}
.op-overlay.theme-signature .op-sig-stage{position:absolute;inset:0;overflow:hidden;background:#ece4d8;}
.op-overlay.theme-signature .op-sig-photo{position:absolute;inset:-1%;background-size:cover;background-position:center 52%;filter:brightness(1.72) saturate(.58) contrast(.78) blur(3px);transform:scale(1.055);animation:opSigDevelop 1.58s .04s cubic-bezier(.2,.7,.2,1) forwards;}
.op-overlay.theme-signature .op-sig-paper{position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,252,245,.96),rgba(245,236,222,.82));mix-blend-mode:screen;animation:opSigPaper .95s .08s ease forwards;}
.op-overlay.theme-signature .op-sig-grain{position:absolute;inset:0;opacity:.2;pointer-events:none;background-image:radial-gradient(circle at 20% 30%,rgba(255,255,255,.35) 0 1px,transparent 1.4px),radial-gradient(circle at 72% 64%,rgba(0,0,0,.12) 0 .8px,transparent 1.2px);background-size:11px 13px,13px 17px;animation:opSigGrain 1.6s ease forwards;}
.op-overlay.theme-signature .op-sig-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,6,4,.1) 0%,transparent 27%,transparent 52%,rgba(8,6,4,.32) 78%,rgba(8,6,4,.62) 100%);opacity:0;animation:opSoftFade .72s .72s ease forwards;}
.op-overlay.theme-signature .op-sig-kicker{position:absolute;top:calc(34px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%) translateY(4px);font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:5px;color:rgba(68,55,44,.66);white-space:nowrap;opacity:0;animation:opSigKicker 1.25s .2s ease forwards;}
.op-overlay.theme-signature .op-sig-overlay{position:absolute;left:0;right:0;bottom:0;padding:0 30px calc(82px + env(safe-area-inset-bottom,0px));text-align:center;z-index:2;}
.op-overlay.theme-signature .op-sig-textwrap{display:inline-block;max-width:100%;position:relative;}
.op-overlay.theme-signature .op-names{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;max-width:var(--cover-name-max-width,84vw);margin:0 auto 0;font-family:var(--cover-name-font-family,'Noto Serif KR',serif);font-size:var(--cover-name-font-size,28px);font-weight:var(--cover-name-font-weight,500);line-height:var(--cover-name-line-height,1.12);letter-spacing:var(--cover-name-letter-spacing,.02em);color:#fff;white-space:var(--cover-name-white-space,normal);opacity:0;transform:translateY(9px);animation:opSigText .62s .92s cubic-bezier(.2,.7,.2,1) forwards;text-shadow:0 1px 8px rgba(0,0,0,.28);}
.op-overlay.theme-signature .op-names .nm-person{display:block;white-space:nowrap;}
.op-overlay.theme-signature .op-sub{font-family:var(--cover-date-font-family,'Noto Sans KR',sans-serif);font-size:var(--cover-date-font-size,13px);font-weight:var(--cover-date-font-weight,500);line-height:var(--cover-date-line-height,1);letter-spacing:var(--cover-date-letter-spacing,.14em);margin-top:var(--cover-date-margin-top,11px);color:rgba(255,255,255,.92);opacity:0;transform:translateY(6px);animation:opSigText .55s 1.12s ease forwards;text-shadow:0 1px 6px rgba(0,0,0,.25);white-space:var(--cover-date-white-space,nowrap);}
.op-overlay.theme-signature .op-sig-time{font-family:var(--cover-time-font-family,'Noto Sans KR',sans-serif);font-size:var(--cover-time-font-size,12px);font-weight:var(--cover-time-font-weight,400);line-height:var(--cover-time-line-height,1);letter-spacing:var(--cover-time-letter-spacing,.08em);margin-top:var(--cover-time-margin-top,8px);color:rgba(255,255,255,.88);opacity:0;transform:translateY(5px);animation:opSigText .5s 1.24s ease forwards;text-shadow:0 1px 6px rgba(0,0,0,.25);white-space:var(--cover-time-white-space,nowrap);}
@keyframes opSigDevelop{0%{filter:brightness(1.72) saturate(.58) contrast(.78) blur(3px);transform:scale(1.055);}100%{filter:brightness(1) saturate(1) contrast(1) blur(0);transform:scale(1);}}
@keyframes opSigPaper{0%{opacity:.96;}58%{opacity:.32;}100%{opacity:0;}}
@keyframes opSigGrain{0%{opacity:.2;}75%{opacity:.08;}100%{opacity:0;}}
@keyframes opSigKicker{0%{opacity:0;transform:translateX(-50%) translateY(4px);}30%,72%{opacity:.7;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-3px);}}
@keyframes opSigText{to{opacity:1;transform:translateY(0);}}

/* 2. classic-ivory → 밝은 스튜디오: '지금 결혼합니다' 발표 후 아이보리 종이가 걷히며 사진 공개 */
.op-overlay.theme-classic-ivory{--op-outer-bg:#f8f2e7;background:#f8f2e7;color:#241c14;padding:0;overflow:hidden;animation:opThemeOut .48s 1.92s ease forwards;}
.op-overlay.theme-classic-ivory .op-civ-stage{position:absolute;inset:0;display:flex;flex-direction:column;background:#f6efe0;overflow:hidden;}
.op-overlay.theme-classic-ivory .op-civ-photo-area{position:relative;flex:0 0 75%;overflow:hidden;background:#e8dcc6;}
.op-overlay.theme-classic-ivory .op-civ-photo{position:absolute;inset:0;background-size:cover;background-position:center 32%;filter:brightness(1.05) contrast(.97) saturate(.98);transform:scale(1.025);animation:opCivPhotoSettle 1.55s .72s cubic-bezier(.2,.7,.2,1) forwards;}
.op-overlay.theme-classic-ivory .op-civ-curtain{position:absolute;inset:-2px;background:linear-gradient(165deg,#fbf7ef,#f1e6d4);z-index:3;transform:translateY(0);animation:opCivCurtain .95s .78s cubic-bezier(.65,0,.22,1) forwards;}
.op-overlay.theme-classic-ivory .op-civ-curtain::before{content:'';position:absolute;inset:0;opacity:.42;background-image:radial-gradient(circle at 18% 24%,rgba(146,117,75,.12) 0 1px,transparent 1.5px),radial-gradient(circle at 78% 72%,rgba(255,255,255,.72) 0 1px,transparent 1.6px);background-size:17px 17px,23px 23px;mix-blend-mode:multiply;}
.op-overlay.theme-classic-ivory .op-civ-photo-fade{position:absolute;left:0;right:0;bottom:0;height:15%;background:linear-gradient(to bottom,transparent,rgba(253,252,248,.35) 65%,#fdfcf8);z-index:2;pointer-events:none;opacity:0;animation:opSoftFade .55s 1.25s ease forwards;}
.op-overlay.theme-classic-ivory .op-civ-info{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:0 28px calc(env(safe-area-inset-bottom,0px));background:linear-gradient(170deg,#fdfcf8,#f3ead8);opacity:0;transform:translateY(8px);animation:opCivInfoIn .68s 1.16s ease forwards;}
.op-overlay.theme-classic-ivory .op-civ-info::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 38%,rgba(255,255,255,.5),transparent 70%);pointer-events:none;}
.op-overlay.theme-classic-ivory .op-civ-info>*{position:relative;}
.op-overlay.theme-classic-ivory .op-names{display:inline-block;max-width:var(--cover-name-max-width,88%);font-family:var(--cover-name-font-family,'Noto Serif KR',serif);font-size:var(--cover-name-font-size,25px);font-weight:var(--cover-name-font-weight,500);line-height:var(--cover-name-line-height,1.18);letter-spacing:var(--cover-name-letter-spacing,3px);color:#241c14;text-align:var(--cover-name-text-align,center);white-space:var(--cover-name-white-space,nowrap);margin:0;}
.op-overlay.theme-classic-ivory .op-civ-dot{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:400;font-style:italic;color:#b79a62;margin:0 5px;vertical-align:middle;}
.op-overlay.theme-classic-ivory .op-civ-when{display:flex;flex-direction:column;align-items:center;gap:5px;}
.op-overlay.theme-classic-ivory .op-sub{font-family:var(--cover-date-font-family,'Cormorant Garamond',serif);font-size:var(--cover-date-font-size,14px);font-weight:var(--cover-date-font-weight,500);line-height:var(--cover-date-line-height,1);letter-spacing:var(--cover-date-letter-spacing,.10em);color:#4a3c2c;white-space:var(--cover-date-white-space,nowrap);margin:0;opacity:1;}
.op-overlay.theme-classic-ivory .op-civ-time{font-family:var(--cover-time-font-family,'Noto Serif KR',serif);font-size:var(--cover-time-font-size,12px);font-weight:var(--cover-time-font-weight,400);line-height:var(--cover-time-line-height,1);letter-spacing:var(--cover-time-letter-spacing,.06em);color:#6a5a46;white-space:var(--cover-time-white-space,nowrap);}
.op-overlay.theme-classic-ivory .op-civ-announcement{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px;pointer-events:none;animation:opCivAnnouncementOut .44s .78s ease forwards;}
.op-overlay.theme-classic-ivory .op-civ-now{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;font-family:'Noto Serif KR',serif;font-size:13px;font-weight:500;letter-spacing:.16em;color:#9a7740;}
.op-overlay.theme-classic-ivory .op-civ-now span{display:inline-block;opacity:0;transform:translateY(5px);animation:opCivLetterIn .34s ease forwards;}
.op-overlay.theme-classic-ivory .op-civ-now span:nth-child(1){animation-delay:.08s;}
.op-overlay.theme-classic-ivory .op-civ-now span:nth-child(2){animation-delay:.22s;}
.op-overlay.theme-classic-ivory .op-civ-marry{font-family:'Gowun Batang','Noto Serif KR',serif;font-size:31px;font-weight:400;letter-spacing:.12em;color:#2d241b;white-space:nowrap;opacity:0;clip-path:inset(0 100% 0 0);animation:opCivWordReveal .58s .34s cubic-bezier(.2,.7,.2,1) forwards;}
.op-overlay.theme-classic-ivory .op-civ-rule{width:44px;height:1px;margin-top:20px;background:linear-gradient(90deg,transparent,rgba(154,119,64,.76),transparent);opacity:0;transform:scaleX(.2);animation:opCivRuleIn .38s .56s ease forwards;}
@keyframes opCivLetterIn{to{opacity:1;transform:translateY(0);}}
@keyframes opCivWordReveal{to{opacity:1;clip-path:inset(0 0 0 0);}}
@keyframes opCivRuleIn{to{opacity:1;transform:scaleX(1);}}
@keyframes opCivAnnouncementOut{to{opacity:0;transform:translateY(-8px);visibility:hidden;}}
@keyframes opCivCurtain{to{transform:translateY(-102%);}}
@keyframes opCivPhotoSettle{to{transform:scale(1);}}
@keyframes opCivInfoIn{to{opacity:1;transform:translateY(0);}}
@media(max-height:680px){.op-overlay.theme-classic-ivory .op-civ-marry{font-size:27px}.op-overlay.theme-classic-ivory .op-civ-now{margin-bottom:9px}.op-overlay.theme-classic-ivory .op-civ-info{gap:9px}.op-overlay.theme-classic-ivory .op-names{font-size:var(--cover-name-font-size,22px)}.op-overlay.theme-classic-ivory .op-civ-time{font-size:var(--cover-time-font-size,11px)}}

/* 3. hanok → 현대적인 한국형 에디토리얼. 한 장의 한지가 위로 걷히며 사진 공개 */
.op-overlay.theme-hanok{--op-outer-bg:#efe7d8;background:#efe7d8;color:#1f1710;overflow:hidden;padding:0;animation:opThemeOut .5s 1.62s cubic-bezier(.4,0,.2,1) forwards;}
.op-overlay.theme-hanok .op-hk-stage{position:absolute;inset:0;display:flex;flex-direction:column;background:#efe7d8;overflow:hidden;}
.op-overlay.theme-hanok .op-hk-photo-area{position:relative;flex:0 0 70%;overflow:hidden;background:#d9ccb6;}
.op-overlay.theme-hanok .op-hk-photo{position:absolute;inset:-1%;background-size:cover;background-position:center 32%;filter:sepia(.08) saturate(.96) contrast(1.01) brightness(1.015);transform:scale(1.025);animation:opHkPhotoSet 1.55s .3s cubic-bezier(.22,.68,.2,1) forwards;}
.op-overlay.theme-hanok .op-hk-photo-fade{position:absolute;left:0;right:0;bottom:0;height:16%;background:linear-gradient(to bottom,transparent,rgba(239,231,216,.34) 62%,#efe7d8);pointer-events:none;}
.op-overlay.theme-hanok .op-hk-info{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(170deg,#f3ebdc,#e7dac2);padding:0 28px calc(0px + env(safe-area-inset-bottom,0px));z-index:2;opacity:0;transform:translateY(7px);animation:opHkInfoIn .62s .88s ease forwards;}
.op-overlay.theme-hanok .op-names{display:inline-block;max-width:var(--cover-name-max-width,88%);font-family:var(--cover-name-font-family,'Noto Serif KR',serif);font-size:var(--cover-name-font-size,29px);font-weight:var(--cover-name-font-weight,400);letter-spacing:var(--cover-name-letter-spacing,4.5px);color:#1f1710;line-height:var(--cover-name-line-height,1);white-space:var(--cover-name-white-space,nowrap);margin:0;}
.op-overlay.theme-hanok .op-names .nm-sep{margin:0 12px;color:#8a4b3e;font-size:.54em;vertical-align:middle;}
.op-overlay.theme-hanok .op-hk-when{display:flex;flex-direction:column;align-items:center;gap:5px;}
.op-overlay.theme-hanok .op-sub{font-family:var(--cover-date-font-family,'Noto Serif KR',serif);font-size:var(--cover-date-font-size,14px);letter-spacing:var(--cover-date-letter-spacing,2.5px);color:#4c3b28;white-space:var(--cover-date-white-space,nowrap);margin:0;opacity:1;}
.op-overlay.theme-hanok .op-hk-time{font-family:var(--cover-time-font-family,'Noto Serif KR',serif);font-size:var(--cover-time-font-size,12px);letter-spacing:var(--cover-time-letter-spacing,.8px);color:#8b7655;white-space:var(--cover-time-white-space,nowrap);}
.op-overlay.theme-hanok .op-hk-sheet{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:42px;background:linear-gradient(165deg,#f5eee2,#e8dcc5 76%,#dfd0b4);box-shadow:0 12px 36px rgba(82,57,31,.10);will-change:transform;animation:opHkSheetLift .74s .66s cubic-bezier(.56,.02,.18,1) forwards;}
.op-overlay.theme-hanok .op-hk-sheet::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 22% 18%,rgba(255,255,255,.34),transparent 34%),radial-gradient(circle at 80% 74%,rgba(117,82,40,.035),transparent 42%);pointer-events:none;}
.op-overlay.theme-hanok .op-hk-sheet::after{content:'';position:absolute;left:0;right:0;bottom:-12px;height:26px;background:linear-gradient(to bottom,rgba(232,220,197,.86),rgba(232,220,197,0));filter:blur(4px);pointer-events:none;}
.op-overlay.theme-hanok .op-hk-copy{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.op-overlay.theme-hanok .op-hk-kicker{font-family:'Noto Serif KR',serif;font-size:10px;font-weight:500;letter-spacing:.32em;color:#8a4b3e;text-indent:.32em;opacity:0;transform:translateY(4px);animation:opHkTextIn .38s .08s ease forwards;}
.op-overlay.theme-hanok .op-hk-rule{width:28px;height:1px;margin:14px 0 16px;background:linear-gradient(90deg,transparent,rgba(138,75,62,.56),transparent);opacity:0;transform:scaleX(.2);animation:opHkRuleIn .38s .16s ease forwards;}
.op-overlay.theme-hanok .op-hk-phrase{font-family:'Gowun Batang','Noto Serif KR',serif;font-size:24px;font-weight:400;line-height:1.62;letter-spacing:.045em;color:#2a2018;opacity:0;transform:translateY(5px);animation:opHkTextIn .45s .2s ease forwards;}
@keyframes opHkSheetLift{to{transform:translateY(103%);}}
@keyframes opHkTextIn{to{opacity:1;transform:translateY(0);}}
@keyframes opHkRuleIn{to{opacity:1;transform:scaleX(1);}}
@keyframes opHkPhotoSet{to{transform:scale(1);}}
@keyframes opHkInfoIn{to{opacity:1;transform:translateY(0);}}
@media(max-height:680px){.op-overlay.theme-hanok .op-hk-phrase{font-size:21px;line-height:1.52}.op-overlay.theme-hanok .op-hk-kicker{font-size:9px}.op-overlay.theme-hanok .op-hk-rule{margin:11px 0 13px}.op-overlay.theme-hanok .op-names{font-size:var(--cover-name-font-size,25px);letter-spacing:var(--cover-name-letter-spacing,3px)}.op-overlay.theme-hanok .op-hk-info{gap:8px}.op-overlay.theme-hanok .op-sub{font-size:var(--cover-date-font-size,12px)}}

/* 4. black → 호텔·야간형: 완성된 포스터 구도 위 어두운 베일만 걷히는 정적 럭셔리 */
.op-overlay.theme-black{--op-outer-bg:#0a0807;background:#0a0807;color:#f4ecdb;overflow:hidden;padding:0;animation:opThemeOut .55s 1.52s cubic-bezier(.4,0,.2,1) forwards;}
.op-overlay.theme-black .op-black-stage{position:absolute;inset:0;display:flex;flex-direction:column;background:#100d0a;overflow:hidden;}

.op-overlay.theme-gold-serif .op-lt-when{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:12px;}
.op-overlay.theme-gold-serif .op-sub{font-family:var(--cover-date-font-family,'Cormorant Garamond',serif);font-size:var(--cover-date-font-size,14px);letter-spacing:var(--cover-date-letter-spacing,3px);color:#6a5a3f;margin:0;opacity:1;}
.op-overlay.theme-gold-serif .op-lt-time{font-family:var(--cover-time-font-family,'Noto Sans KR',sans-serif);font-size:var(--cover-time-font-size,11px);font-weight:var(--cover-time-font-weight,400);letter-spacing:var(--cover-time-letter-spacing,1px);color:#7a6a4f;white-space:var(--cover-time-white-space,nowrap);}
.op-overlay.theme-gold-serif .op-lt-rule{display:flex;align-items:center;gap:8px;justify-content:center;margin:14px auto;}
.op-overlay.theme-gold-serif .op-lt-rule::before,.op-overlay.theme-gold-serif .op-lt-rule::after{content:'';width:24px;height:1px;background:linear-gradient(to right,transparent,#cbb27a,transparent);}
.op-overlay.theme-gold-serif .op-lt-msg{font-family:'Noto Serif KR',serif;font-size:14px;line-height:1.85;color:#4a4030;letter-spacing:.3px;white-space:pre-line;}
.op-overlay.theme-gold-serif .op-lt-wrap{position:absolute;left:8px;right:8px;top:50%;height:88px;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:translateY(-50%);background:linear-gradient(180deg,rgba(250,247,239,.8),rgba(237,229,214,.72));backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);border-top:1px solid rgba(176,140,75,.18);border-bottom:1px solid rgba(176,140,75,.22);box-shadow:0 5px 20px rgba(95,73,42,.06);pointer-events:none;animation:opLtWrapLift .9s .38s cubic-bezier(.52,.02,.16,1) forwards;}
.op-overlay.theme-gold-serif .op-lt-wrap::before,.op-overlay.theme-gold-serif .op-lt-wrap::after{content:'';position:absolute;left:9%;right:9%;height:1px;background:linear-gradient(90deg,transparent,rgba(176,140,75,.36),transparent);}
.op-overlay.theme-gold-serif .op-lt-wrap::before{top:13px;}.op-overlay.theme-gold-serif .op-lt-wrap::after{bottom:13px;}
.op-overlay.theme-gold-serif .op-lt-wrap-mono{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:400;letter-spacing:1.4px;color:#9b7f50;line-height:1;margin-bottom:7px;}
.op-overlay.theme-gold-serif .op-lt-wrap-label{font-family:'Cormorant Garamond',serif;font-size:8px;letter-spacing:3.3px;color:#8d7450;text-transform:uppercase;}
@keyframes opLtCardSet{to{transform:translateY(0) scale(1);box-shadow:0 8px 30px rgba(120,96,58,.11);}}
@keyframes opLtContentSet{to{opacity:1;filter:blur(0);transform:translateY(0);}}
@keyframes opLtWrapLift{0%{opacity:1;transform:translateY(-50%);}62%{opacity:.92;}100%{opacity:0;transform:translateY(calc(-50% - 92px)) scale(.985);}}
@media(max-height:680px){.op-overlay.theme-gold-serif .op-lt-wrap{height:76px}.op-overlay.theme-gold-serif .op-lt-wrap::before{top:11px}.op-overlay.theme-gold-serif .op-lt-wrap::after{bottom:11px}.op-overlay.theme-gold-serif .op-lt-wrap-mono{font-size:16px;margin-bottom:5px}.op-overlay.theme-gold-serif .op-lt-wrap-label{font-size:7px;letter-spacing:2.8px;}}
/* ===== 이름 길이 대응 (자간→구분자→간격 우선, font-size 최소 축소) ===== */
/* 이름 그룹은 inline-block(콘텐츠 폭) + 템플릿별 max-width 상한 → 너무 넓게 퍼져 찢어져 보이는 것 방지 */
#card.t-signature .sig-names{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;max-width:var(--cover-name-max-width,84%);margin:0 auto;white-space:var(--cover-name-white-space,normal);font-family:var(--cover-name-font-family,'Noto Serif KR',serif);font-size:var(--cover-name-font-size,28px);font-weight:var(--cover-name-font-weight,500);line-height:var(--cover-name-line-height,1.12);letter-spacing:var(--cover-name-letter-spacing,.02em);text-align:var(--cover-name-text-align,center);color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.28);}
#card.t-signature .sig-names .nm-person{display:block;white-space:nowrap;}
#card.t-classic-ivory .civ-names{display:inline-block;max-width:var(--cover-name-max-width,88%);}
#card.t-black .bk-names{display:inline-block;max-width:var(--cover-name-max-width,88%);}
#card.t-flower .fl-names{display:inline-block;max-width:var(--cover-name-max-width,88%);}
#card.t-hanok .hk-names{display:inline-block;max-width:var(--cover-name-max-width,88%);}
#card.t-minimal .stl-names{display:inline-block;max-width:var(--cover-name-max-width,86%);}
#card.t-gold-serif .lt-names{display:inline-block;max-width:var(--cover-name-max-width,96%);}
#card.t-fullscreen .cn-names{display:inline-block;max-width:var(--cover-name-max-width,100%);}
/* 사람 이름은 절대 글자 단위로 쪼개지지 않음(span 단위 nowrap), 줄바꿈은 사람 단위로만 */
#card .nm-person{white-space:nowrap;display:inline-block;}
#card .nm-sep{white-space:nowrap;display:inline-block;}
/* 측정 기반 폭 맞춤: 이름 그룹은 기본 한 줄(nowrap), JS(fitName)가 overflow 시 단계적 축소 */
#card .sig-names,#card .civ-names,#card .bk-names,#card .fl-names,#card .hk-names,#card .stl-names,#card .lt-names{white-space:var(--cover-name-white-space,nowrap);}
/* JS가 2줄로 전환 시: 사람 단위로만 줄바꿈 */
#card .nm-twoline{white-space:normal !important;line-height:1.34 !important;word-break:keep-all;}
#card .nm-twoline .nm-person{display:block;}
/* A그룹(signature/classic-ivory/hanok/black/minimal/flower): 2줄 시 구분자 완전 제거 → "양군재식\n남궁소영" */
#card.t-signature .nm-twoline .nm-sep,
#card.t-classic-ivory .nm-twoline .nm-sep,
#card.t-hanok .nm-twoline .nm-sep,
#card.t-black .nm-twoline .nm-sep,
#card.t-minimal .nm-twoline .nm-sep,
#card.t-flower .nm-twoline .nm-sep{display:none !important;}
/* B그룹(gold-serif): 2줄 시 구분자 유지하되 작고 보조적으로 → "양재식 / and / 독고소영" */
#card.t-gold-serif .nm-twoline .nm-sep{display:block;margin:5px 0;font-size:11px;opacity:.6;font-style:italic;}
/* 오프닝 오버레이(#card 밖)용 2줄 전환: op-names도 메인과 동일 규칙 */
.op-overlay .nm-twoline{white-space:normal !important;line-height:1.34 !important;word-break:keep-all;}
.op-overlay .nm-twoline .nm-person{display:block;}
.op-overlay .nm-twoline .nm-sep{display:none !important;}
.op-overlay.theme-gold-serif .nm-twoline .nm-sep{display:block !important;margin:5px 0;font-size:11px;opacity:.6;font-style:italic;color:#9a7740;}

/* 커버 */
.iv-cover{padding:64px 30px 48px;text-align:center;position:relative;}
.iv-eyebrow{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;opacity:.55;margin-bottom:18px;font-weight:400;}
.iv-names{font-size:27px;letter-spacing:3px;font-weight:400;line-height:1.55;margin-bottom:6px;}
.iv-amp{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;margin:0 8px;}
.iv-photo{width:182px;height:226px;margin:26px auto 0;border-radius:120px 120px 10px 10px;background:var(--gold-wash);display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden;border:1px solid var(--line);box-shadow:0 12px 36px -18px rgba(58,47,38,.4);}
.iv-photo img{width:100%;height:100%;object-fit:cover;}
.iv-div{width:36px;height:1px;margin:24px auto;background:var(--gold);opacity:.4;}
.iv-date{font-size:14px;letter-spacing:1.5px;line-height:1.7;}
.sub-lang{display:block;font-size:.82em;font-weight:300;opacity:.55;margin-top:4px;font-family:'Noto Sans KR','Noto Sans JP','Noto Sans Thai',sans-serif;letter-spacing:.5px;}

/* 섹션 */
.iv-sec{padding:46px 30px;text-align:center;border-top:1px solid rgba(0,0,0,.05);}
.iv-sec-t{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.55;margin-bottom:18px;font-weight:400;}
.iv-msg{font-size:14.5px;line-height:2.15;font-weight:400;white-space:pre-line;margin-top:4px;letter-spacing:.2px;}
.iv-info{font-size:14px;line-height:1.95;margin-top:4px;}
.iv-info b{font-weight:500;}
.iv-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.iv-map{margin-top:18px;}
.iv-map-label{font-size:11px;letter-spacing:2px;opacity:.65;text-transform:uppercase;}
.iv-map .iv-chips{margin-top:10px;}
.iv-map .iv-chip{min-width:84px;text-align:center;}
.iv-chip{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;padding:11px 20px;border-radius:999px;border:1px solid currentColor;opacity:.6;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;display:inline-block;letter-spacing:.3px;}
.iv-chip:hover{opacity:1;transform:translateY(-1px);}
.iv-gal{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.iv-gal .g{aspect-ratio:1;border-radius:8px;background:var(--ivory-2);overflow:hidden;cursor:pointer;}
.iv-gal .g img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.iv-gal .g:hover img{transform:scale(1.06);}
/* 매거진형: 2열, 3n+1만 세로(3/4), 나머지 정사각 (editor gal-masonry와 동일) */
.iv-gal-masonry{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;}
.iv-gal-masonry .g{border-radius:8px;background:var(--ivory-2);overflow:hidden;cursor:pointer;}
.iv-gal-masonry .g:nth-child(3n+1){aspect-ratio:3/4;}
.iv-gal-masonry .g:not(:nth-child(3n+1)){aspect-ratio:1;}
.iv-gal-masonry .g img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.iv-gal-masonry .g:hover img{transform:scale(1.06);}
/* 가로전체: 세로 1열, 4/3 비율 (editor gal-full과 동일) */
.iv-gal-full{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.iv-gal-full .g{width:100%;aspect-ratio:4/3;border-radius:8px;background:var(--ivory-2);overflow:hidden;cursor:pointer;}
.iv-gal-full .g img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.iv-gal-full .g:hover img{transform:scale(1.06);}
/* 더보기: 10번째부터 숨김, 펼치면 표시 */
.iv-gal-wrap .g-more{display:none;}
.iv-gal-wrap.gal-expanded .g-more{display:block;}
.gal-more-btn{display:block;width:100%;margin:28px 0 8px;padding:0;background:transparent;border:none;cursor:pointer;text-align:center;font-family:'Noto Serif KR','Cormorant Garamond',serif;color:#9a7740;}
.gal-more-btn .gm-1{display:block;font-size:14px;font-weight:500;letter-spacing:1px;}
.gal-more-btn .gm-2{display:block;font-size:11.5px;letter-spacing:.5px;opacity:.55;margin-top:5px;}
.gal-more-btn:hover .gm-1{opacity:.7;}
/* 기본: 장식/설명줄 숨김 (gold-serif 외 템플릿은 기존 텍스트형 유지) */
.gal-more-btn .gm-deco,.gal-more-btn .gm-3{display:none;}
/* ===== gold-serif 전용: 갤러리 전환 카드 ===== */
.t-gold-serif .gal-more-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:84%;max-width:300px;min-height:48px;margin:18px auto 8px;padding:14px 20px;background:#fffdf8;border:1px solid rgba(176,140,75,.5);border-radius:3px;text-align:center;}
.t-gold-serif .gal-more-btn .gm-deco{display:block;width:4px;height:4px;margin:0;transform:rotate(45deg);border:1px solid #b08c4b;flex:0 0 auto;}
.t-gold-serif .gal-more-btn .gm-1{display:none;}
.t-gold-serif .gal-more-btn .gm-2{font-size:13px;font-weight:400;letter-spacing:.3px;color:#7a6230;opacity:1;text-transform:none;margin:0;}
.t-gold-serif .gal-more-btn .gm-count{font-weight:600;color:#5a4a30;}
#card.t-hanok .gal-more-btn{color:#8a4538;}
#card.t-hanok .gal-more-btn .gm-2{opacity:.72;}
.t-gold-serif .gal-more-btn:hover{border-color:rgba(176,140,75,.75);background:#fffaf0;}
.dday-box{display:flex;justify-content:center;gap:20px;margin-top:6px;}
.dday-unit{text-align:center;}
.dday-num{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;line-height:1;letter-spacing:1px;}
/* D-DAY 에디토리얼 (위젯 느낌 제거) */
.dday-figure{font-family:'Cormorant Garamond',serif;font-size:34.5px;font-weight:300;letter-spacing:2px;line-height:1;margin-top:2px;}
.dday-date{font-family:'Cormorant Garamond',serif;font-size:14.5px;letter-spacing:3px;opacity:.58;margin-top:11px;}
.dday-sec .iv-sec-t{margin-bottom:10px;}
.dday-lbl{font-size:11px;letter-spacing:1.5px;opacity:.55;margin-top:8px;}
.iv-foot{padding:42px 30px;text-align:center;font-size:11px;opacity:.45;letter-spacing:1.5px;line-height:1.9;}


/* 계좌 */
.acc-box{margin-top:6px;text-align:left;}
.acc-toggle{box-sizing:border-box;display:flex;align-items:center;justify-content:center;margin-left:auto;margin-right:auto;cursor:pointer;list-style:none;text-align:center;font-size:12px;letter-spacing:1px;padding:13px 0;border:1px solid currentColor;border-radius:999px;opacity:.45;transition:opacity .25s;width:100%;font-family:inherit;color:inherit;background:transparent;-webkit-appearance:none;appearance:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.acc-toggle:hover{opacity:.7;}
.acc-toggle::-webkit-details-marker{display:none;}
.acc-list{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.acc-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:15px 16px;border-radius:12px;background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.04);}
.acc-info{display:flex;flex-direction:column;gap:3px;}
.acc-side{font-size:10px;letter-spacing:1px;opacity:.5;text-transform:uppercase;}
.acc-bank{font-size:13px;font-weight:500;}
.acc-num{font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:400;opacity:.85;letter-spacing:.5px;-webkit-user-select:text;user-select:text;transition:background .2s;}.acc-bank.copy-selected,.acc-num.copy-selected{background:rgba(193,158,96,.22);border-radius:4px;}
.acc-copy{flex-shrink:0;font-size:11px;padding:9px 15px;border-radius:999px;background:rgba(0,0,0,.06);color:inherit;cursor:pointer;border:none;transition:all .25s;opacity:.7;font-family:inherit;-webkit-appearance:none;appearance:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.acc-copy:hover{opacity:1;background:rgba(0,0,0,.1);}
.acc-copy.done{background:var(--ok);color:#fff;opacity:1;}

/* ===== V68-1B 프리미엄 웨딩 봉투 계좌 컴포넌트 ===== */
.acc-envelope-zone{
  --ae-env:#e8d5b8;--ae-env-light:#f5e9d5;--ae-env-dark:#bfa27d;--ae-env-line:rgba(137,101,66,.42);
  --ae-letter:#fffaf0;--ae-letter-ink:#4c4035;--ae-accent:#9b704b;--ae-seal:#8b573d;--ae-seal-ink:#f8e7c9;--ae-shadow:rgba(70,45,25,.20);
  display:flex;flex-direction:column;align-items:center;width:100%;margin-top:22px;padding-top:0;perspective:900px;transition:padding-top .48s cubic-bezier(.2,.74,.22,1);
}
.acc-envelope-button{position:relative;width:min(205px,72vw);height:138px;padding:0;border:0;background:transparent;color:inherit;cursor:pointer;overflow:hidden;transform-style:preserve-3d;filter:drop-shadow(0 13px 15px var(--ae-shadow));-webkit-tap-highlight-color:transparent;touch-action:manipulation;animation:account-envelope-intro 1.45s ease-in-out 1s 2,account-envelope-reminder 7s ease-in-out 5s infinite;}
.acc-envelope-button:focus-visible{outline:2px solid var(--ae-accent);outline-offset:7px;border-radius:12px;}
.acc-envelope-zone.is-open{padding-top:54px;}
.acc-envelope-zone.is-open .acc-envelope-button{animation:none;overflow:visible;filter:drop-shadow(0 17px 19px var(--ae-shadow));}
.acc-envelope-back,.acc-envelope-front,.acc-envelope-flap,.acc-envelope-letter{position:absolute;left:0;width:100%;border-radius:7px;}
.acc-envelope-back{inset:14px 0 0;background:linear-gradient(145deg,var(--ae-env-light),var(--ae-env));border:1px solid var(--ae-env-line);box-shadow:inset 0 0 0 1px rgba(255,255,255,.32);}
.acc-envelope-back::after{content:'';position:absolute;inset:8px;border:1px solid rgba(155,112,75,.22);border-radius:4px;pointer-events:none;}
.acc-envelope-letter{z-index:2;left:14px;width:calc(100% - 28px);height:111px;bottom:9px;padding:15px 13px 11px;background:linear-gradient(180deg,rgba(255,255,255,.9),transparent 24%),var(--ae-letter);color:var(--ae-letter-ink);border:1px solid rgba(95,72,44,.11);border-radius:5px;transform:translateY(49px);transition:transform .72s cubic-bezier(.2,.74,.22,1),box-shadow .5s ease;box-shadow:0 4px 13px rgba(55,39,23,.08);overflow:hidden;text-align:center;}
.acc-envelope-letter::before{content:'';position:absolute;left:17px;right:17px;top:13px;height:1px;background:var(--ae-accent);opacity:.42;}
.acc-envelope-letter-mark{display:block;margin-top:9px;font-family:var(--iv-title-font,var(--serif));font-size:9px;letter-spacing:.18em;color:var(--ae-accent);text-transform:uppercase;}
.acc-envelope-letter-names{display:block;margin-top:10px;font-family:var(--iv-title-font,var(--serif));font-size:15px;line-height:1.25;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acc-envelope-letter-date{display:block;margin-top:6px;font-size:8px;letter-spacing:.14em;opacity:.58;}
.acc-envelope-front{z-index:4;bottom:0;height:99px;background:linear-gradient(154deg,var(--ae-env-light),var(--ae-env));border:1px solid var(--ae-env-line);clip-path:polygon(0 0,50% 48%,100% 0,100% 100%,0 100%);}
.acc-envelope-front::after{content:'';position:absolute;inset:0;background:linear-gradient(32deg,transparent 49.5%,rgba(255,255,255,.26) 50%,transparent 50.5%),linear-gradient(-32deg,transparent 49.5%,rgba(103,72,36,.08) 50%,transparent 50.5%);opacity:.72;}
.acc-envelope-flap{z-index:5;top:14px;height:77px;transform-origin:50% 0;transform:rotateX(0deg);transition:transform .66s cubic-bezier(.23,.76,.24,1),z-index 0s linear .33s;background:linear-gradient(150deg,var(--ae-env-light),var(--ae-env));border:1px solid var(--ae-env-line);clip-path:polygon(0 0,100% 0,50% 100%);backface-visibility:hidden;}
.acc-envelope-seal{position:absolute;z-index:7;left:50%;top:70px;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;transform:translate(-50%,-50%) scale(1);background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.22),transparent 25%),var(--ae-seal);color:var(--ae-seal-ink);font-family:Georgia,'Times New Roman',serif;font-size:15px;border:2px solid rgba(255,255,255,.52);box-shadow:0 4px 9px rgba(43,27,15,.24),inset 0 0 0 2px rgba(255,255,255,.11);transition:opacity .25s ease,transform .38s ease;}
.acc-envelope-zone.is-open .acc-envelope-flap{z-index:1;transform:rotateX(178deg);transition:transform .66s cubic-bezier(.23,.76,.24,1),z-index 0s;}
.acc-envelope-zone.is-open .acc-envelope-letter{transform:translateY(-54px);box-shadow:0 12px 25px rgba(55,39,23,.13);}
.acc-envelope-zone.is-open .acc-envelope-seal{opacity:0;transform:translate(-50%,-50%) scale(.65);}
.acc-envelope-prompt{margin-top:11px;font-size:11px;letter-spacing:.03em;opacity:.68;transition:opacity .25s ease,transform .25s ease;}
.acc-envelope-prompt::after{content:'';display:inline-block;width:4px;height:4px;margin:0 0 2px 7px;border-right:1px solid currentColor;border-bottom:1px solid currentColor;transform:rotate(45deg);}
.acc-envelope-zone.is-open .acc-envelope-prompt{opacity:0;transform:translateY(-4px);}

/* ===== V68-1B 프리미엄 웨딩 봉투 계좌 컴포넌트 끝 ===== */

/* 방명록 */
.guest-form{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.guest-form input,.guest-form textarea{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:var(--ivory);font-size:13.5px;font-family:inherit;color:var(--brown);outline:none;resize:none;transition:border-color .25s;}
.guest-form input:focus,.guest-form textarea:focus{border-color:var(--gold);background:#fff;}
.guest-submit{background:var(--gold);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;cursor:pointer;width:100%;transition:background .25s;letter-spacing:.5px;}
.guest-submit:hover{background:var(--gold-deep);}
.guest-list{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.guest-item{background:var(--ivory-2);border-radius:12px;padding:16px 18px;text-align:left;}
.guest-item .gi-name{font-size:13px;font-weight:500;color:var(--brown);margin-bottom:5px;}
.guest-item .gi-msg{font-size:13.5px;color:var(--brown-soft);line-height:1.8;}
.guest-item .gi-date{font-size:11px;color:var(--brown-mute);margin-top:8px;letter-spacing:.5px;}

/* RSVP */
.rsvp-form{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.rsvp-opts{display:flex;gap:10px;}
.rsvp-opt{flex:1;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:13.5px;text-align:center;cursor:pointer;transition:all .25s;background:var(--white);letter-spacing:.5px;}
.rsvp-opt.on{background:var(--gold);color:#fff;border-color:var(--gold);}
.rsvp-form input,.rsvp-form select,.rsvp-form textarea{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:var(--ivory);font-size:13.5px;font-family:inherit;color:var(--brown);outline:none;transition:border-color .25s;}
.rsvp-form input:focus,.rsvp-form select:focus{border-color:var(--gold);background:#fff;}
.rsvp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rsvp-submit{background:var(--brown);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;cursor:pointer;width:100%;transition:background .25s;letter-spacing:.5px;}
.rsvp-submit:hover{background:var(--gold-deep);}
.privacy{font-size:11px;color:var(--brown-mute);line-height:1.7;margin-top:10px;text-align:center;opacity:.8;}

/* 갤러리 라이트박스 */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:800;display:none;align-items:center;justify-content:center;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;z-index:2;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;z-index:2;-webkit-tap-highlight-color:transparent;}
.lb-nav:hover{background:rgba(255,255,255,.22);}
.lb-prev{left:14px;}
.lb-next{right:14px;}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:2px;z-index:2;}
@media(max-width:480px){.lb-nav{width:38px;height:38px;font-size:22px;}.lb-prev{left:8px;}.lb-next{right:8px;}}

/* ================================================================
   12종 템플릿 CSS
   각 템플릿은 색감 + 폰트 느낌 + 커버 레이아웃이 모두 다릅니다
   ================================================================ */

/* ============================================================
   1. SIGNATURE PHOTO — 거의 풀스크린 사진 (웨딩 매거진 첫 장)
   ============================================================ */
.t-signature{background:#0c0a08;color:#3a2f26;}
.t-signature .iv-cover{padding:0;}
/* 풀스크린 포토형 — 사진이 주인공, 텍스트 최소 */
.sig-hero{position:relative;width:100%;height:100svh;min-height:560px;max-height:1000px;overflow:hidden;background:#0c0a08;}
.sig-photo{position:absolute;inset:0;width:100%;height:100%;}
.sig-photo img{width:100%;height:100%;object-fit:cover;object-position:center 52%;display:block;}
@keyframes sigKenburns{from{transform:scale(1.035);}to{transform:scale(1);}}
/* 하단 안전영역만 살짝 어둡게 — 사진 대부분은 그대로 */
.sig-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,6,4,.16) 0%,transparent 24%,transparent 52%,rgba(8,6,4,.34) 78%,rgba(8,6,4,.62) 100%);}
/* 텍스트는 하단 안전영역에 작고 얇게 + 국소 보강으로 어떤 사진이든 가독 */
.sig-overlay{position:absolute;left:0;right:0;bottom:0;padding:0 30px calc(82px + env(safe-area-inset-bottom,0px));text-align:center;z-index:2;}
.sig-textwrap{display:inline-block;max-width:100%;padding:0;position:relative;}
.sig-textwrap::before{content:'';position:absolute;inset:-8px -20px;background:radial-gradient(ellipse 75% 100% at 50% 60%,rgba(6,4,3,.5),transparent 75%);z-index:-1;filter:blur(2px);}
.sig-names{font-family:var(--cover-name-font-family,'Noto Serif KR',serif);font-size:var(--cover-name-font-size,28px);font-weight:var(--cover-name-font-weight,500);letter-spacing:var(--cover-name-letter-spacing,.02em);color:#fff;line-height:var(--cover-name-line-height,1.12);text-align:var(--cover-name-text-align,center);text-shadow:0 1px 8px rgba(0,0,0,.28);}
.sig-date{font-family:var(--cover-date-font-family,'Noto Sans KR',sans-serif);font-size:var(--cover-date-font-size,13px);font-weight:var(--cover-date-font-weight,500);line-height:var(--cover-date-line-height,1);letter-spacing:var(--cover-date-letter-spacing,.14em);margin-top:var(--cover-date-margin-top,11px);color:rgba(255,255,255,.92);text-shadow:0 1px 6px rgba(0,0,0,.25);text-align:var(--cover-date-text-align,center);white-space:var(--cover-date-white-space,nowrap);}
.sig-time{font-family:var(--cover-time-font-family,'Noto Sans KR',sans-serif);font-size:var(--cover-time-font-size,12px);font-weight:var(--cover-time-font-weight,400);line-height:var(--cover-time-line-height,1);letter-spacing:var(--cover-time-letter-spacing,.08em);margin-top:var(--cover-time-margin-top,8px);color:rgba(255,255,255,.88);text-shadow:0 1px 6px rgba(0,0,0,.25);text-align:var(--cover-time-text-align,center);white-space:var(--cover-time-white-space,nowrap);}
@media (max-width:380px){
  #card.t-signature .sig-names{font-size:var(--cover-name-font-size,26px);letter-spacing:var(--cover-name-letter-spacing,.02em);}
  .sig-date{font-size:var(--cover-date-font-size,12px);letter-spacing:var(--cover-date-letter-spacing,.12em);}

}

/* 플로팅 액션 버튼 */
/* FEATURE37 — 첫 화면 컨트롤 정리
   사진과 이름이 주인공이 되도록 컨트롤은 카드 우측 안쪽에 작게 고정하고,
   첫 화면에서는 조용히, 상세영역에서는 필요한 만큼만 선명하게 보인다. */
.fab-wrap{
  position:fixed;
  right:max(12px,calc((100vw - 480px)/2 + 12px));
  bottom:calc(14px + env(safe-area-inset-bottom,0px));
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
  opacity:.94;
  transform:translateZ(0);
  transition:opacity .22s ease,transform .22s ease;
}
.fab-wrap.is-hero:not(.menu-open):not(:focus-within){opacity:.62;transform:scale(.94);transform-origin:100% 100%;}
.fab-wrap.menu-open,.fab-wrap:focus-within{opacity:1;transform:none;}
.fab-wrap.menu-open .bgm-fab{display:none;}
.fab-main,.bgm-fab{
  border-radius:50%;
  border:1px solid rgba(255,255,255,.34);
  background:rgba(22,19,16,.52);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 5px 18px rgba(18,14,10,.18);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.fab-main{width:43px;height:43px;padding:0;font-size:20px;line-height:1;letter-spacing:1px;transition:opacity .18s,transform .18s,background .18s,border-color .18s;}
.fab-main:hover,.fab-main:focus-visible{background:rgba(22,19,16,.72);border-color:rgba(255,255,255,.56);transform:translateY(-1px);}
.fab-menu{display:flex;flex-direction:column;align-items:flex-end;gap:7px;opacity:0;pointer-events:none;transform:translateY(8px) scale(.98);transform-origin:100% 100%;transition:opacity .2s ease,transform .22s cubic-bezier(.2,.7,.2,1);}
.fab-menu.open{opacity:1;pointer-events:auto;transform:none;}
.fab-item{min-height:40px;display:flex;align-items:center;gap:9px;background:rgba(255,253,249,.96);border:1px solid rgba(126,105,77,.22);border-radius:999px;padding:8px 14px 8px 9px;font-size:12.5px;color:#433a31;box-shadow:0 6px 18px rgba(39,31,23,.10);cursor:pointer;white-space:nowrap;transition:background .18s,border-color .18s,transform .18s;letter-spacing:.1px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.fab-item:hover,.fab-item:focus-visible{background:#fffdf9;border-color:rgba(155,124,78,.46);transform:translateX(-1px);}
.fab-item .fi{width:23px;height:23px;flex:0 0 23px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(126,105,77,.28);border-radius:50%;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;line-height:1;color:#685846;background:rgba(250,246,239,.7);}
.bgm-fab{display:none;width:37px;height:37px;padding:0;font-size:15px;transition:opacity .18s,transform .18s,background .18s,border-color .18s,color .18s;}
.bgm-fab.show{display:flex;}
.bgm-fab:hover,.bgm-fab:focus-visible{background:rgba(22,19,16,.70);border-color:rgba(255,255,255,.54);transform:translateY(-1px);}
.bgm-fab.playing{background:rgba(139,109,64,.84);border-color:rgba(255,239,211,.56);color:#fff;box-shadow:0 5px 18px rgba(71,52,27,.18),0 0 0 2px rgba(190,154,97,.16);}
.bgm-fab.loading{opacity:.58;}
.bgm-fab.error{display:none!important;}
.bgm-fab .bgm-icon{display:block;line-height:1;transform-origin:center;}
.bgm-fab.playing .bgm-icon{animation:none;}
@media(max-width:480px){
  .fab-wrap{right:12px;bottom:calc(12px + env(safe-area-inset-bottom,0px));}
  .fab-wrap.is-hero:not(.menu-open):not(:focus-within) .fab-main{width:38px;height:38px;font-size:18px;}
  .fab-wrap.is-hero:not(.menu-open):not(:focus-within) .bgm-fab{width:33px;height:33px;font-size:14px;}
}
@media(prefers-reduced-motion:reduce){.fab-wrap,.fab-main,.bgm-fab,.fab-menu,.fab-item{transition:none!important;}}

/* FEATURE35 — 모바일 터치 반응 엔진
   모든 실제 조작 요소는 손가락 탭을 스크롤/더블탭으로 오인하지 않게 하고,
   기능 실행 전에도 즉각적인 눌림 피드백을 보여준다. 디자인 크기/배치는 변경하지 않는다. */
button,
a[href],
[role="button"],
.fab-item,
.rsvp-opt,
.iv-chip,
.iv-gal .g,
.iv-gal-masonry .g,
.iv-gal-full .g{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
button,
[role="button"],
.fab-item,
.rsvp-opt{
  -webkit-user-select:none;
  user-select:none;
}
.fab-item,.rsvp-opt{font-family:inherit;}
@media (pointer:coarse){
  button,a[href],[role="button"],.fab-item,.rsvp-opt,.iv-chip{
    -webkit-tap-highlight-color:transparent;
  }
  .touch-pressed{
    opacity:.72 !important;
    filter:brightness(.94);
    transition-duration:.06s !important;
  }
  button:disabled.touch-pressed,[aria-disabled="true"].touch-pressed{
    opacity:inherit !important;
    filter:none;
  }
}

/* === theme별 상세영역 디자인: 모든 theme 오버라이드보다 뒤(우선 적용) === */
/* ================================================================
   theme별 상세영역 디자인 (배경/글자/제목/구분선/버튼/카드 차별화)
   레이아웃·기능 불변, 색·스타일만
   ================================================================ */
/* 1. signature — 고급 웨딩 매거진: 화이트크림 배경, 진회색, 채움 버튼, 여백 넓게 */
#card.t-signature{background:#fdfbf7;}
.t-signature .iv-sec{background:#fdfbf7;border-top:none;padding:54px 32px;}
.t-signature .iv-sec-t{font-family:'Noto Serif KR',serif;color:#b89a6a;letter-spacing:6px;font-size:11px;}
.t-signature .iv-msg,.t-signature .iv-info{color:#3a352e;line-height:1.9;letter-spacing:.3px;}
.t-signature .iv-div{background:#d8c8a8;opacity:.5;width:28px;}
.t-signature .iv-chip{background:#3a352e;color:#fdfbf7;border:none;opacity:1;padding:12px 22px;}
.t-signature .iv-chip:hover{background:#5a5248;}
.t-signature .dday-num{color:#b89a6a;}

/* 2. classic-ivory — 깨끗한 스튜디오: 오프화이트, 다크그레이, 정석형 */
#card.t-classic-ivory{background:#f8f5ef;}
.t-classic-ivory .iv-sec{background:#f8f5ef;border-top:1px solid rgba(168,138,88,.14);padding:48px 32px;}
.t-classic-ivory .iv-sec-t{font-family:'Gowun Batang','Noto Serif KR',serif;color:#8a7350;letter-spacing:5px;font-size:13px;}
.t-classic-ivory .iv-msg,.t-classic-ivory .iv-info{color:#3c3630;line-height:1.95;letter-spacing:.2px;}
.t-classic-ivory .iv-div{background:#c0a878;opacity:.45;}
.t-classic-ivory .iv-chip{border:1px solid #a8895a;color:#7a6440;opacity:.85;}
.t-classic-ivory .iv-chip:hover{background:#a8895a;color:#fff;opacity:1;}
.t-classic-ivory .dday-num{color:#8a7350;}

/* 3. minimal(Fine Art) — 웨딩 화보집: 화이트, 매우 넓은 여백, 에디토리얼 제목, 본문 작게 */
#card.t-minimal{background:#ffffff;}
.t-minimal .iv-sec{background:#fff;border-top:1px solid #eee;padding:60px 38px;text-align:left;}
.t-minimal .iv-sec-t{font-family:'Noto Serif KR',serif;color:#4a3c2c;letter-spacing:6px;font-size:11px;font-weight:500;}
/* minimal 하단 3섹션: 여백 축소 + 제목 대비 강화 */
#card.t-minimal .rsvp-sec{padding-top:38px;padding-bottom:38px;}
#card.t-minimal .guest-sec{padding-top:36px;padding-bottom:36px;}
#card.t-minimal .acc-sec{padding-top:34px;padding-bottom:34px;}
#card.t-minimal .rsvp-sec .iv-sec-t,#card.t-minimal .guest-sec .iv-sec-t,#card.t-minimal .acc-sec .iv-sec-t{color:#322619;font-size:13px;letter-spacing:4px;text-align:center;}
#card.t-minimal .rsvp-sec .hk-sec-desc,#card.t-minimal .guest-sec .hk-sec-desc,#card.t-minimal .acc-sec .hk-sec-desc{text-align:center;margin-top:15px;margin-bottom:20px;}
/* minimal 하단 버튼 공통 규격 (알약 제거, 44px, radius3, 중앙) */
#card.t-minimal .hk-open-btn,#card.t-minimal .rsvp-submit,#card.t-minimal .guest-submit{box-sizing:border-box;width:min(100%,184px);min-height:44px;margin-left:auto;margin-right:auto;display:flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:3px;font-size:14px;font-weight:500;letter-spacing:.3px;box-shadow:none;cursor:pointer;}
/* RSVP 1차: 브론즈 채움 */
#card.t-minimal .rsvp-submit,#card.t-minimal .rsvp-sec .hk-open-btn{background:#897763;color:#faf6ee;border:1px solid #897763;opacity:1;}
#card.t-minimal .rsvp-submit:hover,#card.t-minimal .rsvp-sec .hk-open-btn:hover{background:#766753;border-color:#766753;}
/* 방명록 2차: 회갈 외곽선 */
#card.t-minimal .guest-submit,#card.t-minimal .guest-sec .hk-open-btn{background:transparent;color:#5a4a36;border:1px solid #8a7355;opacity:1;}
#card.t-minimal .guest-submit:hover,#card.t-minimal .guest-sec .hk-open-btn:hover{background:rgba(138,115,85,.08);}
/* 계좌 보조: 약한 외곽선 */
#card.t-minimal .acc-toggle{box-sizing:border-box;list-style:none;display:flex;align-items:center;justify-content:center;width:min(100%,184px);min-height:44px;padding:11px 16px;margin:0 auto;border:1px solid rgba(120,98,68,.68);background:transparent;border-radius:3px;color:#5d4c33;font-size:14px;font-weight:500;letter-spacing:.3px;box-shadow:none;cursor:pointer;}
#card.t-minimal .acc-toggle:hover{background:rgba(138,115,85,.07);}
#card.t-minimal .acc-toggle::-webkit-details-marker{display:none;}
/* 푸터 대비 강화 (회갈) */
#card.t-minimal .iv-foot{opacity:1;color:#5a4a36;}
.t-minimal .iv-msg,.t-minimal .iv-info{color:#444;font-size:15px;line-height:1.9;letter-spacing:.2px;text-align:left;}
.t-minimal .iv-div{background:#1a1a1a;opacity:.25;margin:24px 0;width:40px;}
.t-minimal .iv-chip{border:1px solid #1a1a1a;color:#1a1a1a;opacity:.7;border-radius:0;}
.t-minimal .iv-chip:hover{background:#1a1a1a;color:#fff;opacity:1;}
#card.t-minimal .iv-map .iv-chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;width:100%;max-width:300px;margin:10px auto 0;justify-content:center;flex-wrap:nowrap;}
#card.t-minimal .iv-map .iv-chip{width:100%;min-width:0;min-height:44px;display:flex;align-items:center;justify-content:center;padding:10px 5px;font-size:13px;white-space:nowrap;border-radius:2px;box-shadow:none;}
.t-minimal .dday-num{color:#1a1a1a;}
#card.t-minimal .dday-figure{color:#33271c;font-size:33px;letter-spacing:1px;}
#card.t-minimal .dday-date{color:#4a3c2c;opacity:.78;}

/* 4. hanok — 전통 청첩장: 한지색, 먹색, 전통 갈색 포인트 */
#card.t-hanok{background:#f2ebd9;}
.t-hanok .iv-sec{background:#f2ebd9;border-top:1px solid rgba(138,69,56,.1);padding:44px 32px;}
/* 한옥 하단 섹션별 여백 차등 (반복감 완화) */
#card.t-hanok .rsvp-sec{padding-top:35px;padding-bottom:35px;border-top-color:rgba(138,69,56,.085);}
#card.t-hanok .guest-sec{padding-top:33px;padding-bottom:33px;border-top-color:rgba(138,69,56,.07);}
#card.t-hanok .acc-sec{padding-top:30px;padding-bottom:30px;border-top-color:rgba(138,69,56,.06);background:#f0e8d3;}
/* 한옥 섹션 설명 줄바꿈/톤 */
#card.t-hanok .hk-sec-desc{max-width:280px;margin-left:auto;margin-right:auto;word-break:keep-all;line-height:1.7;}
#card.t-hanok .acc-sec .hk-sec-desc{color:#5d4b2c;opacity:1;max-width:280px;}
.t-hanok .iv-sec-t{font-family:'Noto Serif KR',serif;font-weight:500;color:#8a4538;letter-spacing:5px;}
.t-hanok .iv-msg,.t-hanok .iv-info{color:#2a1d12;line-height:1.9;letter-spacing:.4px;}
.t-hanok .iv-div{background:#8a4538;opacity:.6;width:30px;height:1.5px;}
.t-hanok .iv-chip{border:1px solid #8a4538;color:#6a3528;opacity:.85;border-radius:2px;}
#card.t-hanok .iv-map .iv-chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;width:100%;max-width:286px;margin:10px auto 0;flex-wrap:nowrap;}
#card.t-hanok .iv-map .iv-chip{width:100%;min-width:0;min-height:44px;display:flex;align-items:center;justify-content:center;padding:10px 5px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:none;}
/* 한옥 RSVP·방명록·계좌 버튼 통일 (적갈색 사각, 44px) */
/* 한옥 하단 버튼: 공통 규격 (186px·44px·radius3·14px·중앙) */
#card.t-hanok .hk-open-btn,#card.t-hanok .rsvp-submit,#card.t-hanok .guest-submit{box-sizing:border-box;width:min(100%,186px);min-height:44px;margin-left:auto;margin-right:auto;display:flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:3px;font-size:14px;font-weight:500;letter-spacing:.2px;box-shadow:none;cursor:pointer;}
/* RSVP만 1차 행동: 채움형 */
#card.t-hanok .rsvp-submit{background:#92564a;color:#f5ecdb;border:1px solid #92564a;opacity:1;}
#card.t-hanok .rsvp-submit:hover{background:#7e4438;border-color:#7e4438;}
/* RSVP 열기 버튼도 1차 채움형(초기 노출 버튼) */
#card.t-hanok .rsvp-sec .hk-open-btn{background:#92564a;color:#f5ecdb;border:1px solid #92564a;}
#card.t-hanok .rsvp-sec .hk-open-btn:hover{background:#7e4438;}
/* 방명록·계좌·방명록 열기: 외곽선형(2차) */
#card.t-hanok .guest-submit,#card.t-hanok .hk-open-btn{background:rgba(255,250,242,.5);color:#8a4538;border:1px solid #8a4538;opacity:.92;}
#card.t-hanok .guest-submit:hover{opacity:1;background:rgba(138,69,56,.07);}
/* 계좌 토글: 조용한 텍스트 링크형 (박스/배경 없음, 44px 터치 유지) */
#card.t-hanok .acc-toggle{list-style:none;box-sizing:border-box;display:flex;align-items:center;justify-content:center;width:min(100%,168px);min-height:44px;padding:11px 16px;margin:0 auto;border:1px solid #92564a;background:transparent;border-radius:3px;color:#723a2f;font-size:13.5px;font-weight:500;letter-spacing:.2px;box-shadow:none;cursor:pointer;}
#card.t-hanok .acc-toggle:hover{background:rgba(146,86,74,.07);color:#723a2f;}
#card.t-hanok .acc-toggle::-webkit-details-marker{display:none;}
.t-hanok .iv-chip:hover{background:#8a4538;color:#f2ebd9;opacity:1;}
.t-hanok .dday-num{color:#8a4538;}
#card.t-hanok .hk-dday-num{font-family:'Noto Serif KR',serif;font-size:46px;font-weight:500;line-height:1;color:#8a4538;letter-spacing:1px;}
#card.t-hanok .hk-dday-unit{font-family:'Noto Serif KR',serif;font-size:15px;color:#5a4428;margin-top:11px;letter-spacing:1px;}
#card.t-hanok .hk-dday-date{font-family:'Noto Serif KR',serif;font-size:13px;color:#8a7450;margin-top:13px;letter-spacing:1.5px;}

/* 5. black — 럭셔리 호텔: 블랙 배경, 아이보리 글자(밝게), 골드 포인트 */
#card.t-black{background:#0e0c0a;}
.t-black .iv-sec{background:#0e0c0a;border-top:1px solid rgba(201,168,106,.16);padding:50px 32px;}
.t-black .iv-sec-t{font-family:'Noto Serif KR',serif;color:#d2b478;letter-spacing:6px;}
.t-black .iv-msg,.t-black .iv-info{color:#f0e8d8;line-height:1.8;letter-spacing:.3px;}
.t-black .iv-div{background:#c9a86a;opacity:.7;}
.t-black .iv-chip{border:1px solid #c9a86a;color:#e9dcc4;opacity:.95;}
.t-black .iv-chip:hover{background:#c9a86a;color:#0e0c0a;opacity:1;}
#card.t-black .iv-map .iv-chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;width:100%;max-width:286px;margin:10px auto 0;flex-wrap:nowrap;}
#card.t-black .iv-map .iv-chip{width:100%;min-width:0;min-height:44px;display:flex;align-items:center;justify-content:center;padding:10px 5px;font-size:13px;white-space:nowrap;border-radius:3px;box-shadow:none;}
.t-black .dday-num{color:#d2b478;}
#card.t-black .dday-figure{color:#f0e8d8;font-size:32px;font-weight:300;letter-spacing:1.5px;margin-top:4px;margin-bottom:4px;}
#card.t-black .dday-date{color:#c9a86a;opacity:.92;}
/* black 갤러리: 2열 균형 grid + 정사각 cover */
#card.t-black .iv-gal,#card.t-black .iv-gal-masonry{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;grid-auto-flow:row;}
#card.t-black .iv-gal-wrap .g{position:relative;aspect-ratio:1/1;overflow:hidden;}
#card.t-black .iv-gal-wrap .g img{width:100%;height:100%;object-fit:cover;display:block;}
/* 더보기 문구 중복 제거: gm-1 숨기고 gm-2만 */
#card.t-black .gal-more-btn .gm-1{display:none;}
#card.t-black .gal-more-btn{color:#c9a86a;}
#card.t-black .gal-more-btn .gm-2{opacity:1;font-size:14px;color:#c9a86a;}
/* 홀수 마지막 사진: 2열 전체폭으로 확장 (혼자 왼쪽 방치 방지) */
#card.t-black .iv-gal-wrap:not(.gal-expanded) .g:nth-child(9){grid-column:1 / -1;aspect-ratio:2/1;}
#card.t-black .iv-gal-wrap.gal-expanded .g:last-child:nth-child(odd){grid-column:1 / -1;aspect-ratio:2/1;}
/* CINEMA 갤러리: 2열 영화 프레임 + 9번째 전체폭, radius 3px */
#card.t-fullscreen .iv-gal,#card.t-fullscreen .iv-gal-masonry,#card.t-fullscreen .iv-gal-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;grid-auto-flow:row;}
#card.t-fullscreen .iv-gal-wrap .g{position:relative;aspect-ratio:1/1;overflow:hidden;border-radius:3px;background:#0c0a08;cursor:pointer;}
#card.t-fullscreen .iv-gal-wrap .g img{width:100%;height:100%;object-fit:cover;display:block;}
#card.t-fullscreen .iv-gal-wrap:not(.gal-expanded) .g:nth-child(9){grid-column:1 / -1;aspect-ratio:2/1;}
#card.t-fullscreen .iv-gal-wrap.gal-expanded .g:last-child:nth-child(odd){grid-column:1 / -1;aspect-ratio:2/1;}
/* LETTER 갤러리: 2열 + 홀수 마지막 전체폭, radius 4px */
#card.t-gold-serif .iv-gal,#card.t-gold-serif .iv-gal-masonry,#card.t-gold-serif .iv-gal-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;grid-auto-flow:row;}
#card.t-gold-serif .iv-gal-wrap .g{position:relative;aspect-ratio:1/1;overflow:hidden;border-radius:4px;background:var(--ivory-2);cursor:pointer;}
#card.t-gold-serif .iv-gal-wrap .g img{width:100%;height:100%;object-fit:cover;display:block;}
#card.t-gold-serif .iv-gal-wrap:not(.gal-expanded) .g:nth-child(9){grid-column:1 / -1;aspect-ratio:2/1;}
#card.t-gold-serif .iv-gal-wrap.gal-expanded .g:last-child:nth-child(odd){grid-column:1 / -1;aspect-ratio:2/1;}
#card.t-fullscreen .gal-more-btn .gm-1{display:none;}
#card.t-fullscreen .gal-more-btn{color:rgba(214,186,132,.9);}
#card.t-fullscreen .gal-more-btn .gm-2{opacity:1;font-size:14px;color:rgba(214,186,132,.9);}
/* minimal 편집 화보형 갤러리: 첫 사진 전체폭 + 이후 2열 + 홀수 마지막 전체폭 */
#card.t-minimal .iv-gal-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;grid-auto-flow:row;}
#card.t-minimal .iv-gal-wrap .g{position:relative;aspect-ratio:1/1;overflow:hidden;border-radius:3px;background:var(--ivory-2);cursor:pointer;}
#card.t-minimal .iv-gal-wrap .g img{width:100%;height:100%;object-fit:cover;display:block;}
#card.t-minimal .iv-gal-wrap:not(.gal-expanded) .g:nth-child(9){grid-column:1 / -1;aspect-ratio:2/1;}
#card.t-minimal .iv-gal-wrap.gal-expanded .g:last-child:nth-child(odd){grid-column:1 / -1;aspect-ratio:2/1;}
/* V42 — 2열 매거진형은 사진 수가 홀수여도 마지막 줄을 비워두지 않는다.
   접힌 10장 이상 상태는 9번째, 9장 이하 상태와 펼친 상태는 실제 마지막 사진을 전체 폭으로 마감한다.
   Flower 비대칭 12열과 grid/full 레이아웃은 기존 디자인을 유지한다. */
#card:not(.t-flower) .iv-gal-masonry.iv-gal-wrap:not(.gal-expanded) .g:nth-child(9){grid-column:1 / -1;aspect-ratio:2/1;}
#card:not(.t-flower) .iv-gal-masonry.iv-gal-wrap:not(.gal-expanded) .g:last-child:nth-child(odd){grid-column:1 / -1;aspect-ratio:2/1;}
#card:not(.t-flower) .iv-gal-masonry.iv-gal-wrap.gal-expanded .g:last-child:nth-child(odd){grid-column:1 / -1;aspect-ratio:2/1;}
/* 더보기 문구 중복 제거: gm-1 숨기고 gm-2만 (회갈 대비) */
#card.t-minimal .gal-more-btn .gm-1{display:none;}
#card.t-minimal .gal-more-btn .gm-2{opacity:1;font-size:13.5px;color:#62503e;margin-top:0;}
.t-black .dday-lbl{color:rgba(240,232,216,.7);}
/* black 하단 3섹션: 여백 차등 + 구분선 연하게 */
#card.t-black .rsvp-sec{padding-top:42px;padding-bottom:42px;border-top-color:rgba(201,168,106,.1);}
#card.t-black .rsvp-sec .iv-sec-t,#card.t-black .guest-sec .iv-sec-t,#card.t-black .acc-sec .iv-sec-t{color:#dcc089;}
#card.t-black .guest-sec{padding-top:39px;padding-bottom:39px;border-top-color:rgba(201,168,106,.085);}
#card.t-black .acc-sec{padding-top:36px;padding-bottom:36px;border-top-color:rgba(201,168,106,.07);}
/* black 하단 버튼 공통 규격 (알약 제거, 44px, radius3) */
#card.t-black .hk-open-btn,#card.t-black .rsvp-submit,#card.t-black .guest-submit{box-sizing:border-box;width:min(100%,190px);min-height:44px;margin-left:auto;margin-right:auto;display:flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:3px;font-size:14px;font-weight:500;letter-spacing:.3px;box-shadow:none;cursor:pointer;}
/* RSVP 1차: 저채도 골드 채움 */
#card.t-black .rsvp-submit,#card.t-black .rsvp-sec .hk-open-btn{background:#9e7d44;color:#f0e8d8;border:1px solid #9e7d44;opacity:1;}
#card.t-black .rsvp-submit:hover,#card.t-black .rsvp-sec .hk-open-btn:hover{background:#b8975a;border-color:#b8975a;}
/* 방명록 2차: 골드 외곽선 */
#card.t-black .guest-submit,#card.t-black .guest-sec .hk-open-btn{background:transparent;color:#d2b478;border:1px solid #b89559;opacity:1;}
#card.t-black .guest-submit:hover,#card.t-black .guest-sec .hk-open-btn:hover{background:rgba(201,168,106,.1);}
/* 계좌 보조: 약한 외곽선 */
#card.t-black .acc-toggle{box-sizing:border-box;list-style:none;display:flex;align-items:center;justify-content:center;width:min(100%,180px);min-height:44px;padding:11px 16px;margin:0 auto;border:1px solid rgba(201,168,106,.55);background:transparent;border-radius:3px;color:#c9a86a;font-size:13.5px;font-weight:500;letter-spacing:.3px;opacity:.92;box-shadow:none;cursor:pointer;}
#card.t-black .acc-toggle:hover{opacity:1;background:rgba(201,168,106,.08);}
#card.t-black .acc-toggle::-webkit-details-marker{display:none;}
/* 푸터 대비 강화 (저채도 골드, 읽히게) */
#card.t-black .iv-foot{color:rgba(224,202,156,.95);}

/* 6. flower 야외스냅형 — 자연광 야외 웨딩스냅: 웜 화이트, 올리브 포인트, 부드러운 타이포, 장식 최소 */
#card.t-flower{background:#ffffff;}
.t-flower .iv-sec{background:#fff;border-top:1px solid #ededed;padding:52px 34px;}
.t-flower .iv-sec-t{font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;letter-spacing:2px;font-size:11px;text-transform:none;}
.t-flower .iv-msg,.t-flower .iv-info{color:#2a2a2a;line-height:1.8;letter-spacing:.2px;}
.t-flower .iv-msg{line-height:1.9;}
.t-flower .iv-div{background:#1a1a1a;opacity:.18;width:30px;}
.t-flower .iv-chip{border:1px solid #1a1a1a;color:#1a1a1a;opacity:.75;border-radius:0;font-family:'Noto Sans KR',sans-serif;}

/* 푸터: 전체 opacity 대신 글자색만 반투명 (아이보리 배경 유지, 회색 띠 방지) */

/* 호텔형 → 럭셔리 초대장: 이름보다 여백, 자간 극대, 정확한 중앙정렬 */

/* flower 야외스냅형 → 자연광 야외 웨딩스냅: 좌측정렬 유지, 장식 최소 */

#card.t-flower .fl-hero{height:calc(100vh - 24px);height:calc(100svh - 24px);min-height:600px;max-height:900px;background:#f5f2e9;}

#card.t-flower .fl-names .fl-dot{font-family:'Cormorant Garamond',serif;font-style:italic;color:#74785f;margin:0 8px;font-weight:400;}
#card.t-flower .fl-when{display:flex;flex-direction:column;align-items:flex-start;gap:5px;margin-top:9px;}
#card.t-flower .fl-date{font-family:var(--cover-date-font-family,'Cormorant Garamond',serif);font-size:var(--cover-date-font-size,13.5px);font-weight:var(--cover-date-font-weight,500);letter-spacing:var(--cover-date-letter-spacing,1.6px);color:#65694f;text-transform:uppercase;white-space:var(--cover-date-white-space,nowrap);}
#card.t-flower .fl-time{font-family:var(--cover-time-font-family,'Noto Serif KR',serif);font-size:var(--cover-time-font-size,12px);font-weight:var(--cover-time-font-weight,400);letter-spacing:var(--cover-time-letter-spacing,.7px);color:#797a6d;white-space:var(--cover-time-white-space,nowrap);}

/* ===== flower 야외스냅형 갤러리 2차 — 비대칭 자연광 화보 배열 ===== */
/* 갤러리 섹션 좌우 패딩 소폭 축소(사진 호흡) */
#card.t-flower .iv-sec.iv-gal-sec{padding-left:24px;padding-right:24px;}
/* masonry → 12열 비대칭 그리드 (HTML 불변, grid-column/nth-child만) */
#card.t-flower .iv-gal-masonry{grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-flow:row dense;gap:8px;align-items:start;}
/* 공통 3n+1 비율 규칙 무력화 + 6n 패턴 재정의 (구체성 우위) */
#card.t-flower .iv-gal-masonry .g{border-radius:6px;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+1){grid-column:span 7;aspect-ratio:4/5;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+2){grid-column:span 5;aspect-ratio:1;margin-top:20px;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+3){grid-column:span 12;aspect-ratio:3/2;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+4){grid-column:span 5;aspect-ratio:1;margin-top:20px;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+5){grid-column:span 7;aspect-ratio:4/5;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+6){grid-column:span 12;aspect-ratio:5/4;}
/* 마지막 사진이 6n+1/6n+4(단독 잔류)면 가로 전체로 채움 */
#card.t-flower .iv-gal-masonry .g:last-child:nth-child(6n+1),#card.t-flower .iv-gal-masonry .g:last-child:nth-child(6n+4){grid-column:span 12;margin-top:0;aspect-ratio:3/2;}
/* grid(정사각 .iv-gal)/full 선택 시에도 flower 팔레트 유지 */
#card.t-flower .iv-gal{gap:8px;}
#card.t-flower .iv-gal .g,#card.t-flower .iv-gal-full .g{border-radius:6px;}
#card.t-flower .iv-gal-full{gap:10px;}
/* 더보기·접기 버튼: 올리브 팔레트 + 중앙 짧은 장식선 */
#card.t-flower .gal-more-btn{color:#65694f;padding-top:16px;}
#card.t-flower .gal-more-btn::before{content:'';display:block;width:38px;height:1px;background:rgba(116,120,95,.28);margin:0 auto 14px;}
#card.t-flower .gal-more-btn:hover{color:#797a6d;}
/* 시네마 → 영화 타이틀: 자간 크게, 제목 존재감 강하게 */
#card.t-fullscreen .cn-names{font-size:var(--cover-name-font-size,29px);letter-spacing:var(--cover-name-letter-spacing,.5px);font-weight:var(--cover-name-font-weight,450);line-height:var(--cover-name-line-height,1.15);}
#card.t-fullscreen .cn-date{font-size:var(--cover-date-font-size,12px);letter-spacing:var(--cover-date-letter-spacing,7px);}
/* 레터 → 실제 초대장: 이름과 문구 균형(크기 차이 축소), 자간 절제 */
#card.t-gold-serif .lt-names{font-size:var(--cover-name-font-size,29px);letter-spacing:var(--cover-name-letter-spacing,4px);font-weight:var(--cover-name-font-weight,400);line-height:var(--cover-name-line-height,1.3);}
#card.t-gold-serif .lt-msg{font-size:14px;line-height:1.85;}
#card.t-gold-serif .lt-date{font-size:var(--cover-date-font-size,14px);letter-spacing:var(--cover-date-letter-spacing,3px);}
/* ===== 배경 연출 (배경 연출 엔진, 첫 화면 한정) ===== */
.ambient-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;opacity:1;transition:opacity .6s ease;}
.ambient-layer.amb-hidden{opacity:0;}
.ambient-layer.amb-hidden .ambient-particle{animation-play-state:paused;}
.ambient-particle{position:absolute;top:-10%;border-radius:50%;will-change:top,transform,opacity;}
/* 겨울눈: 작은 흰 원, top 기반으로 첫 화면 전체 낙하 + 좌우 흔들림 */
.ambient-winter-snow .ambient-particle{background:radial-gradient(circle,rgba(255,255,255,.92),rgba(255,255,255,.4));box-shadow:0 0 3px rgba(255,255,255,.4);animation:ambSnowFall linear infinite,ambSnowSway ease-in-out infinite alternate;}
@keyframes ambSnowFall{0%{top:-10%;opacity:0;}10%{opacity:var(--amb-op,.5);}90%{opacity:var(--amb-op,.5);}100%{top:110%;opacity:0;}}
@keyframes ambSnowSway{0%{transform:translateX(calc(var(--amb-sway,6px) * -1));}100%{transform:translateX(var(--amb-sway,6px));}}
/* 골드 더스트: 입자는 이동+fade(opacity), 반짝임은 ::after의 scale/brightness만 (opacity 충돌 제거) */
.ambient-gold-dust .ambient-particle{background:none;animation:ambDustFloat linear infinite;}
.ambient-gold-dust .ambient-particle::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,var(--amb-core,rgba(255,225,145,.95)) 0%,var(--amb-edge,rgba(196,136,44,.35)) 70%,transparent 100%);box-shadow:0 0 var(--amb-glow,5px) var(--amb-glowc,rgba(212,170,90,.5));animation:ambDustTwinkle ease-in-out infinite;transform-origin:center;}
@keyframes ambDustFloat{0%{top:-10%;transform:translateX(0);opacity:0;}14%{opacity:var(--amb-op,.6);}86%{opacity:var(--amb-op,.6);}100%{top:110%;transform:translateX(var(--amb-drift,8px));opacity:0;}}
@keyframes ambDustTwinkle{0%,100%{transform:scale(.82);filter:brightness(.9);}50%{transform:scale(1.08);filter:brightness(1.15);}}
/* 배경 연출: gold-serif 카드 프레임 내부 텍스트는 입자 위 */
.t-gold-serif .lt-frame>*{position:relative;z-index:2;}
.t-gold-serif .lt-frame>.ambient-layer.ambient-layer{z-index:1;}
/* === 진주 보케: 큰 원형 blur, 느리게 부유 === */
.ambient-pearl-bokeh .ambient-particle{background:radial-gradient(circle,var(--amb-core,rgba(255,252,248,.5)),var(--amb-edge,rgba(238,230,224,.18)) 60%,transparent 75%);box-shadow:var(--amb-ring,none);filter:blur(1.5px);animation:ambBokehFloat linear infinite,ambBokehPulse ease-in-out infinite;}
@keyframes ambBokehFloat{0%{top:-12%;transform:translateX(0);opacity:0;}20%{opacity:var(--amb-op,.4);}80%{opacity:var(--amb-op,.4);}100%{top:112%;transform:translateX(var(--amb-drift,8px));opacity:0;}}
@keyframes ambBokehPulse{0%,100%{transform:scale(.9);}50%{transform:scale(1.06);}}
/* === 필름 더스트: 미세 그레인, 거의 정적 === */
.ambient-film-dust .ambient-particle{background:var(--amb-core,rgba(255,250,240,.6));border-radius:50%;animation:ambGrainDrift linear infinite,ambGrainFlick steps(3) infinite;}
@keyframes ambGrainDrift{0%{top:-6%;opacity:0;}25%{opacity:var(--amb-op,.3);}75%{opacity:var(--amb-op,.3);}100%{top:106%;opacity:0;}}
@keyframes ambGrainFlick{0%{transform:translateX(0);}33%{transform:translateX(1.5px);}66%{transform:translateX(-1.5px);}100%{transform:translateX(0);}}
@media (prefers-reduced-motion:reduce){.ambient-layer{display:none!important;}}

.motion-cover-replay{position:absolute;right:12px;top:calc(12px + env(safe-area-inset-top,0px));z-index:6;width:31px;height:31px;padding:0;border:1px solid rgba(255,255,255,.32);border-radius:50%;background:rgba(10,8,6,.24);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);color:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;cursor:pointer;opacity:.62;box-shadow:0 3px 12px rgba(0,0,0,.12);transition:opacity .18s,transform .18s,background .18s;}

/* FEATURE27: 승인형 하객 사진 공유 */
.guest-photo-sec{--gp-accent:#8d7049;--gp-line:rgba(141,112,73,.24);--gp-soft:rgba(141,112,73,.08);text-align:center;}
.guest-photo-lead{max-width:330px;margin:8px auto 0;font-size:13px;line-height:1.75;opacity:.72;word-break:keep-all;}
.guest-photo-approved{display:none;margin:17px auto 16px;max-width:620px;}
.guest-photo-approved.show{display:block;}
.guest-photo-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
.guest-photo-tile{position:relative;overflow:hidden;border:0;padding:0;background:var(--gp-soft);cursor:pointer;aspect-ratio:4/5;}
.guest-photo-tile:nth-child(3n+1){aspect-ratio:5/6;}
.guest-photo-tile img{display:block;width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.guest-photo-tile:hover img{transform:scale(1.018);}
.guest-photo-open-btn{display:inline-flex;align-items:center;justify-content:center;margin-top:15px;padding:11px 18px;border:1px solid var(--gp-line);border-radius:999px;background:transparent;color:inherit;font:inherit;font-size:13px;cursor:pointer;}
.guest-photo-form{display:none;max-width:430px;margin:15px auto 0;padding:17px;border:1px solid var(--gp-line);border-radius:16px;background:var(--gp-soft);text-align:left;}
.guest-photo-form.show{display:block;}
.guest-photo-form input[type="text"]{width:100%;box-sizing:border-box;border:1px solid var(--gp-line);border-radius:10px;background:rgba(255,255,255,.88);padding:11px 12px;font:inherit;font-size:13px;color:#332b23;}
.guest-photo-file-btn{display:flex;align-items:center;justify-content:center;min-height:74px;margin-top:10px;border:1px dashed var(--gp-line);border-radius:12px;background:rgba(255,255,255,.54);font-size:13px;line-height:1.55;cursor:pointer;text-align:center;}
.guest-photo-previews{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px;}
.guest-photo-preview{position:relative;overflow:hidden;border-radius:8px;aspect-ratio:1;background:#eee;}
.guest-photo-preview img{display:block;width:100%;height:100%;object-fit:cover;}
.guest-photo-consent{display:flex;align-items:flex-start;gap:8px;margin:11px 0 0;font-size:11px;line-height:1.55;opacity:.78;}
.guest-photo-consent input{margin-top:3px;}
.guest-photo-submit{position:relative;width:100%;margin-top:12px;border:0;border-radius:10px;background:var(--gp-accent);color:#fff;padding:12px 12px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:opacity .18s ease,transform .18s ease;}
.guest-photo-submit:active{transform:scale(.992);}
.guest-photo-submit:disabled{opacity:.72;cursor:wait;}
.guest-photo-submit.is-busy::before{content:'';display:inline-block;width:12px;height:12px;margin-right:7px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;vertical-align:-2px;animation:guestPhotoSpin .72s linear infinite;}
.guest-photo-progress{display:none;height:3px;margin-top:9px;overflow:hidden;border-radius:999px;background:var(--gp-line);}
.guest-photo-progress.show{display:block;}
.guest-photo-progress>span{display:block;width:var(--gp-progress,0%);height:100%;border-radius:inherit;background:var(--gp-accent);transition:width .22s ease;}
.guest-photo-status{min-height:20px;margin-top:8px;text-align:center;font-size:11.5px;line-height:1.55;opacity:.82;word-break:keep-all;}
.guest-photo-status.is-error{color:#a43f36;opacity:1;font-weight:600;}
.guest-photo-status.is-success{color:#5d704f;opacity:1;font-weight:600;}
