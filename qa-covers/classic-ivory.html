/* FEATURE29 — 첫 화면 공통 높이 엔진
   - 8개 판매 템플릿의 첫 화면을 동일한 안정 viewport 기준으로 통일
   - 모바일 주소창 변화에 즉시 반응하는 dvh는 사용하지 않음
   - 작은 화면에서 min-height 강제 초과, 긴 화면에서 고정 px 공백을 제거 */
/* FEATURE41: 카드와 오프닝이 동일한 안정 viewport 높이를 공유한다.
   카카오톡 등 인앱 브라우저에서 100svh가 실제 WebView보다 작게 계산되는 경우가 있어
   CSS fallback은 100vh로 두고, JS가 실제 viewport 후보 중 가장 큰 정상값을 px로 고정한다. */
:root{--invitation-cover-height:100vh;}
#card>.iv-cover{overflow-anchor:none;}
#card .sig-hero,
#card .civ-stage,
#card .bk-stage,
#card .fl-hero,
#card .hk-stage,
#card .stl-stage,
#card .cn-stage,
#card .lt-stage{
  box-sizing:border-box;
  height:var(--invitation-cover-height) !important;
  min-height:0 !important;
  max-height:none !important;
}
/* 커버 바깥 여백이 viewport 높이에 더해지지 않게 한다.
   Gold Serif의 장식/여백은 다음 정밀 보정에서도 모두 stage 내부에 유지한다. */
#card.t-gold-serif>.iv-cover{
  padding:0;
  border-bottom:0;
}
#card.t-gold-serif>.iv-cover::before{display:none;}
/* 낮은 스마트폰에서 정보 블록이 사진에 눌리지 않도록 이미 확정된 안전 비율을 유지 */
@media (max-height:680px){
  #card.t-flower .fl-photo-area{flex-basis:82%;}
  #card.t-hanok .hk-photo-area{flex-basis:80%;}
  #card.t-black .bk-photo-area{flex-basis:82%;}
}

/* ===== V67-2A 공통 콘텐츠 레이아웃 토큰 레이어 =====
   현재 단계에서는 변수만 선언하며 기존 선택자를 덮어쓰지 않는다.
   V67-2B 이후 검수된 프리셋 CSS가 이 토큰을 소비한다. */
.cl-layout-scope{
  --cl-engine-version:1;
  --cl-columns:1;
  --cl-column-gap:0px;
  --cl-row-gap:0px;
  --cl-photo-ratio:auto;
  --cl-photo-radius:0px;
  --cl-copy-align:inherit;
  --cl-section-inline:0px;
  --cl-hero-min-height:0px;
  --cl-track-size:auto;
  --cl-flow:normal;
}
.cl-layout-couple[data-cl-preset="balanced"]{--cl-columns:2;--cl-column-gap:14px;--cl-row-gap:18px;--cl-photo-ratio:4 / 5;--cl-copy-align:center;--cl-flow:balanced;}
.cl-layout-couple[data-cl-preset="alternating"]{--cl-columns:1;--cl-column-gap:0px;--cl-row-gap:24px;--cl-photo-ratio:4 / 5;--cl-copy-align:left;--cl-flow:alternating;}
.cl-layout-couple[data-cl-preset="editorial"]{--cl-columns:12;--cl-column-gap:8px;--cl-row-gap:20px;--cl-photo-ratio:3 / 4;--cl-copy-align:left;--cl-flow:editorial;}
.cl-layout-family[data-cl-preset="balanced-grid"]{--cl-columns:2;--cl-column-gap:12px;--cl-row-gap:18px;--cl-photo-ratio:4 / 5;--cl-copy-align:center;--cl-flow:balanced-grid;}
.cl-layout-family[data-cl-preset="alternating-list"]{--cl-columns:1;--cl-column-gap:0px;--cl-row-gap:20px;--cl-photo-ratio:1 / 1;--cl-copy-align:left;--cl-flow:alternating-list;}
.cl-layout-family[data-cl-preset="editorial-grid"]{--cl-columns:12;--cl-column-gap:8px;--cl-row-gap:18px;--cl-photo-ratio:3 / 4;--cl-copy-align:left;--cl-flow:editorial-grid;}
.cl-layout-gallery[data-cl-preset="classic-grid"]{--cl-columns:2;--cl-column-gap:8px;--cl-row-gap:8px;--cl-photo-ratio:4 / 5;--cl-flow:classic-grid;}
.cl-layout-gallery[data-cl-preset="editorial-magazine"]{--cl-columns:12;--cl-column-gap:6px;--cl-row-gap:6px;--cl-photo-ratio:auto;--cl-flow:editorial-magazine;}
.cl-layout-gallery[data-cl-preset="hero-slider"]{--cl-columns:1;--cl-column-gap:0px;--cl-row-gap:10px;--cl-photo-ratio:4 / 5;--cl-hero-min-height:420px;--cl-track-size:84px;--cl-flow:hero-slider;}
.cl-layout-gallery[data-cl-preset="fullscreen-story"]{--cl-columns:1;--cl-column-gap:0px;--cl-row-gap:0px;--cl-photo-ratio:auto;--cl-hero-min-height:100svh;--cl-flow:fullscreen-story;}
/* ===== V67-2A 공통 콘텐츠 레이아웃 토큰 레이어 끝 ===== */


/* FEATURE36 — 8개 판매 템플릿 첫 화면 정밀 보정
   구조와 기능은 유지하고, 사진 존재감·타이포 위계·하단 안전영역만 미세 조정한다. */

/* 1. Signature — 사진을 해치지 않는 하단 화보 캡션 */
#card.t-signature .sig-scrim{
  background:linear-gradient(to bottom,rgba(8,6,4,.10) 0%,transparent 28%,transparent 55%,rgba(8,6,4,.26) 76%,rgba(8,6,4,.66) 100%);
}
#card.t-signature .sig-overlay{padding:0 28px calc(clamp(64px,9.5vh,92px) + env(safe-area-inset-bottom,0px));}
#card.t-signature .sig-textwrap::before{inset:-10px -24px;background:radial-gradient(ellipse 78% 105% at 50% 60%,rgba(6,4,3,.44),transparent 76%);}
#card.t-signature .sig-names{font-size:var(--cover-name-font-size,clamp(25px,7vw,29px));max-width:var(--cover-name-max-width,80%);gap:5px;letter-spacing:var(--cover-name-letter-spacing,.015em);}
#card.t-signature .sig-date{margin-top:var(--cover-date-margin-top,10px);font-size:var(--cover-date-font-size,12.5px);letter-spacing:var(--cover-date-letter-spacing,.13em);}
#card.t-signature .sig-time{margin-top:var(--cover-time-margin-top,7px);font-size:var(--cover-time-font-size,11.5px);}

/* 2. Classic Ivory — 사진 비중은 높이고 정보 패널은 정갈하게 */
#card.t-classic-ivory .civ-photo-area{flex-basis:78%;}
#card.t-classic-ivory .civ-photo-fade{height:13%;}
#card.t-classic-ivory .civ-info{gap:9px;padding:0 26px calc(6px + env(safe-area-inset-bottom,0px));}
#card.t-classic-ivory .civ-names{font-size:var(--cover-name-font-size,29px);letter-spacing:var(--cover-name-letter-spacing,3.4px);}
#card.t-classic-ivory .civ-date{font-size:var(--cover-date-font-size,12.5px);letter-spacing:var(--cover-date-letter-spacing,.11em);}
#card.t-classic-ivory .civ-time{font-size:var(--cover-time-font-size,11.5px);}

/* 3. Hanok — 사진은 유지하고 이름 자간과 정보 패널 밀도만 절제 */
#card.t-hanok .hk-photo-fade{height:13%;}
#card.t-hanok .hk-info{gap:6px;padding:0 24px calc(8px + env(safe-area-inset-bottom,0px));}
#card.t-hanok .hk-names{font-size:var(--cover-name-font-size,28px);letter-spacing:var(--cover-name-letter-spacing,4.5px);}
#card.t-hanok .hk-names .hk-dot{margin:0 10px;}
#card.t-hanok .hk-date{font-size:var(--cover-date-font-size,13px);letter-spacing:var(--cover-date-letter-spacing,2.4px);}
#card.t-hanok .hk-time{font-size:var(--cover-time-font-size,11.5px);}

/* 4. Black — 호텔 포스터형의 검정 정보 패널을 더 얇고 또렷하게 */
#card.t-black .bk-photo-fade{height:17%;}
#card.t-black .bk-info{gap:6px;padding:0 24px calc(12px + env(safe-area-inset-bottom,0px));}
#card.t-black .bk-rule{width:38px;opacity:.82;}
#card.t-black .bk-names{font-size:var(--cover-name-font-size,28px);letter-spacing:var(--cover-name-letter-spacing,5px);}
#card.t-black .bk-names .bk-dot{margin:0 9px;font-size:14px;}
#card.t-black .bk-date{font-size:var(--cover-date-font-size,12px);letter-spacing:var(--cover-date-letter-spacing,4.5px);}
#card.t-black .bk-time{font-size:var(--cover-time-font-size,11.5px);}

/* 5. Fullscreen — 영화 포스터의 중심 타이포를 한 단계 강화 */
#card.t-fullscreen .cn-stage::before,#card.t-fullscreen .cn-stage::after{height:clamp(48px,9.5vh,82px);}
#card.t-fullscreen .cn-frame{inset:clamp(82px,15vh,138px) 22px;}
#card.t-fullscreen .cn-inner{transform:translateY(-1%);padding:0 28px;}
#card.t-fullscreen .cn-filmlbl{font-size:9.5px;letter-spacing:7px;margin-bottom:12px;}
#card.t-fullscreen .cn-titlebox{width:min(100%,350px);padding:12px 8px 13px;}
#card.t-fullscreen .cn-names{font-size:var(--cover-name-font-size,clamp(27px,7.8vw,32px));letter-spacing:var(--cover-name-letter-spacing,.6px);}
#card.t-fullscreen .cn-date{font-size:var(--cover-date-font-size,11.5px);letter-spacing:var(--cover-date-letter-spacing,3.5px);}
#card.t-fullscreen .cn-weekday{font-size:8.5px;letter-spacing:3.2px;}
#card.t-fullscreen .cn-time{font-size:var(--cover-time-font-size,9.5px);}

/* 6. Fine Art Editorial — 사진 면적을 조금 더 확보하고 하단 정보를 한 덩어리로 */
#card.t-minimal .stl-stage{grid-template-rows:30px minmax(0,1fr) 140px;padding:13px 15px 0;}
#card.t-minimal .stl-pagehead{font-size:8px;letter-spacing:2.7px;}
#card.t-minimal .stl-info{padding:14px 3px calc(12px + env(safe-area-inset-bottom,0px));}
#card.t-minimal .stl-meta{margin-top:10px;gap:12px;}
#card.t-minimal .stl-names{font-size:var(--cover-name-font-size,22px);letter-spacing:var(--cover-name-letter-spacing,.9px);max-width:var(--cover-name-max-width,calc(100% - 112px));}
#card.t-minimal .stl-folio{font-size:7px;letter-spacing:1.9px;}
#card.t-minimal .stl-when{margin-top:7px;gap:8px;}
#card.t-minimal .stl-date{font-size:var(--cover-date-font-size,12px);letter-spacing:var(--cover-date-letter-spacing,1.7px);}
#card.t-minimal .stl-time{font-size:var(--cover-time-font-size,9.5px);}

/* 7. Flower — 작은 정보영역에서도 캡션·이름·날짜의 위계를 선명하게 */
#card.t-flower .fl-info{padding:9px 23px calc(11px + env(safe-area-inset-bottom,0px));}
#card.t-flower .fl-caption{font-size:7.5px;letter-spacing:2.2px;padding-bottom:4px;margin-bottom:5px;}
#card.t-flower .fl-names{font-size:var(--cover-name-font-size,27px);line-height:var(--cover-name-line-height,1.16);}
#card.t-flower .fl-when{margin-top:4px;gap:2px;}
#card.t-flower .fl-date{font-size:var(--cover-date-font-size,12.5px);letter-spacing:var(--cover-date-letter-spacing,1.45px);}
#card.t-flower .fl-time{font-size:var(--cover-time-font-size,11.5px);}

/* 8. Gold Serif — 레터 콘셉트는 유지하면서 종이 자체의 존재감을 확대 */
#card.t-gold-serif .lt-frame{
  width:92%;max-width:430px;min-height:clamp(350px,62%,560px);
  padding:clamp(38px,6.5vh,58px) 28px;
  box-shadow:0 12px 38px rgba(108,82,42,.13);
}
#card.t-gold-serif .lt-frame::before{inset:10px;}
#card.t-gold-serif .lt-frame::after{inset:15px;}
#card.t-gold-serif .lt-mono{width:42px;height:42px;margin-bottom:15px;}
#card.t-gold-serif .lt-label{margin-bottom:15px;}
#card.t-gold-serif .lt-names{font-size:var(--cover-name-font-size,28px);letter-spacing:var(--cover-name-letter-spacing,2.7px);}
#card.t-gold-serif .lt-rule{margin:15px auto;}
#card.t-gold-serif .lt-msg{font-size:13.5px;line-height:1.82;}
#card.t-gold-serif .lt-when{margin-top:13px;}

/* 짧은 화면: 정보가 잘리지 않도록 사진 비율만 한 단계 낮춘다. */
@media (max-height:680px){
  #card.t-classic-ivory .civ-photo-area{flex-basis:76%;}
  #card.t-signature .sig-overlay{padding-bottom:calc(58px + env(safe-area-inset-bottom,0px));}
  #card.t-fullscreen .cn-frame{inset:78px 20px;}
  #card.t-gold-serif .lt-frame{min-height:340px;padding:34px 26px;}
}
@media (max-width:380px){
  #card.t-classic-ivory .civ-names{font-size:var(--cover-name-font-size,27px);letter-spacing:var(--cover-name-letter-spacing,3px);}
  #card.t-hanok .hk-names{font-size:var(--cover-name-font-size,27px);letter-spacing:var(--cover-name-letter-spacing,4px);}
  #card.t-black .bk-names{font-size:var(--cover-name-font-size,26px);letter-spacing:var(--cover-name-letter-spacing,4.5px);}
  #card.t-flower .fl-names{font-size:var(--cover-name-font-size,25px);}
  #card.t-gold-serif .lt-names{font-size:var(--cover-name-font-size,26px);letter-spacing:var(--cover-name-letter-spacing,2.3px);}
}



/* ===== V57-2 DEV: 프로필·우리 가족 템플릿 아트디렉션 보정 ===== */
/* Classic Ivory — 앱 카드가 아닌 밝은 스튜디오 앨범 페이지 */
#card.t-classic-ivory .couple-profile-grid{gap:22px;max-width:366px;align-items:start;}

#card.t-classic-ivory .couple-profile-copy{padding:15px 5px 0;}
#card.t-classic-ivory .couple-profile-kicker{font-size:8px;letter-spacing:.2em;}
#card.t-classic-ivory .couple-profile-name{font-size:17px;letter-spacing:.06em;}
#card.t-classic-ivory .family-profile-grid{gap:18px;max-width:366px;}
#card.t-classic-ivory .family-profile-item{padding:0;border:0;border-radius:0;background:transparent;box-shadow:none;text-align:center;}
#card.t-classic-ivory .family-profile-item::after{display:none;}
#card.t-classic-ivory .family-profile-photo{aspect-ratio:4/5;border:6px solid rgba(255,255,255,.84);border-radius:2px;outline:1px solid rgba(130,107,71,.11);box-shadow:0 15px 34px -29px rgba(75,57,35,.40);}
#card.t-classic-ivory .family-profile-copy{padding:12px 5px 0;}
#card.t-classic-ivory .family-profile-grid.count-1{max-width:270px;}
#card.t-classic-ivory .family-profile-grid.count-3 .family-profile-item:first-child{grid-column:1/-1;display:grid;grid-template-columns:43% minmax(0,1fr);gap:18px;align-items:center;text-align:left;}
#card.t-classic-ivory .family-profile-grid.count-3 .family-profile-item:first-child .family-profile-copy{padding:0;}
#card.t-classic-ivory .family-profile-grid.count-3 .family-profile-item:first-child .family-profile-photo{aspect-ratio:4/5;}
#card.t-classic-ivory .family-profile-grid.count-3 .family-profile-item:last-child{grid-column:auto;max-width:none;width:auto;justify-self:stretch;}

/* Flower — 둥근 카드 반복을 제거한 자연광 에디토리얼 */
#card.t-flower .couple-profile-grid{grid-template-columns:1.12fr .88fr;gap:24px;max-width:366px;align-items:start;}
#card.t-flower .couple-profile-grid.single{grid-template-columns:1fr;max-width:272px;}
#card.t-flower .couple-profile-item{padding:0;border:0;border-radius:0;background:transparent;box-shadow:none;text-align:left;transform:none;}
#card.t-flower .couple-profile-item:nth-child(1),#card.t-flower .couple-profile-item:nth-child(2){transform:none;}
#card.t-flower .couple-profile-item:nth-child(2){margin-top:38px;}
#card.t-flower .couple-profile-grid.single .couple-profile-item{margin-top:0;}
#card.t-flower .couple-profile-photo{aspect-ratio:4/5;border-radius:3px;box-shadow:0 19px 40px -33px rgba(51,55,39,.52);}
#card.t-flower .couple-profile-item:nth-child(2) .couple-profile-photo{aspect-ratio:3/4;}
#card.t-flower .couple-profile-copy{margin-top:11px;padding:12px 1px 0;border-top:1px solid rgba(109,114,88,.18);}
#card.t-flower .couple-profile-kicker{font-size:8px;letter-spacing:.2em;}
#card.t-flower .couple-profile-name{font-size:17px;}
#card.t-flower .family-profile-grid{gap:22px;max-width:366px;align-items:start;}
#card.t-flower .family-profile-item{padding:0;border:0;border-radius:0;background:transparent;text-align:left;transform:none;}
#card.t-flower .family-profile-item::before{display:none;}
#card.t-flower .family-profile-photo{border-radius:3px;box-shadow:0 19px 40px -33px rgba(51,55,39,.50);}
#card.t-flower .family-profile-copy{margin-top:10px;padding:11px 1px 0;border-top:1px solid rgba(109,114,88,.16);}
#card.t-flower .family-profile-grid.count-1{max-width:275px;}
#card.t-flower .family-profile-grid.count-2{grid-template-columns:1.12fr .88fr;}
#card.t-flower .family-profile-grid.count-2 .family-profile-item:nth-child(2){margin-top:32px;}

/* =====================================================================
   V69 PHASE 2 — 8 TEMPLATE COVER PRODUCT DIFFERENTIATION
   목적: 공통 하단 패널 수렴을 해소하고 각 템플릿을 독립 상품으로 보이게 한다.
   기능/데이터/렌더 함수는 변경하지 않고 시각 레이어만 최종 보정한다.
   ===================================================================== */
:is(#card,#ivRoot) .iv-cover{isolation:isolate;}
:is(#card,#ivRoot) .sig-hero,
:is(#card,#ivRoot) .civ-stage,
:is(#card,#ivRoot) .hk-stage,
:is(#card,#ivRoot) .bk-stage,
:is(#card,#ivRoot) .cn-stage,
:is(#card,#ivRoot) .stl-stage,
:is(#card,#ivRoot) .fl-hero,
:is(#card,#ivRoot) .lt-stage{min-height:560px;}

/* 1 SIGNATURE — full-bleed editorial portrait / 좌측 하단 크레딧 */
:is(#card,#ivRoot).t-signature .sig-scrim{background:linear-gradient(180deg,rgba(7,5,4,.18),transparent 28%,transparent 55%,rgba(6,4,3,.74) 100%);}
:is(#card,#ivRoot).t-signature .sig-hero::before{content:'MEMORY RETOUCH  ·  SIGNATURE';position:absolute;z-index:3;top:calc(24px + env(safe-area-inset-top,0px));left:24px;font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:.24em;color:rgba(255,255,255,.78);}
:is(#card,#ivRoot).t-signature .sig-hero::after{content:'';position:absolute;z-index:3;left:24px;top:calc(45px + env(safe-area-inset-top,0px));width:42px;height:1px;background:rgba(255,255,255,.55);}
:is(#card,#ivRoot).t-signature .sig-overlay{left:24px;right:24px;padding:0 0 calc(54px + env(safe-area-inset-bottom,0px));text-align:left;}
:is(#card,#ivRoot).t-signature .sig-textwrap{display:block;width:min(82%,330px);margin:0;}
:is(#card,#ivRoot).t-signature .sig-textwrap::before{inset:-18px -28px;background:radial-gradient(ellipse 80% 90% at 18% 55%,rgba(5,3,2,.58),transparent 76%);}
:is(#card,#ivRoot).t-signature .sig-names{align-items:flex-start!important;margin:0!important;font-size:clamp(28px,7.6vw,34px);letter-spacing:.015em;text-align:left!important;text-shadow:0 2px 18px rgba(0,0,0,.32);}
:is(#card,#ivRoot).t-signature .sig-date,
:is(#card,#ivRoot).t-signature .sig-time{text-align:left!important;}

/* 2 CLASSIC IVORY — 밝은 스튜디오 인화지 / 사진 액자 + 하단 인쇄면 */
:is(#card,#ivRoot).t-classic-ivory .civ-stage{padding:18px 18px 0;background:#eee5d5;}
:is(#card,#ivRoot).t-classic-ivory .civ-photo-area{flex:0 0 72%;border:1px solid rgba(91,71,43,.16);box-shadow:0 18px 42px -34px rgba(56,39,19,.58);}
:is(#card,#ivRoot).t-classic-ivory .civ-photo-area::before{content:'STUDIO PORTRAIT';position:absolute;z-index:2;top:14px;left:16px;font:500 8px/1 'Cormorant Garamond',serif;letter-spacing:.26em;color:rgba(255,255,255,.9);text-shadow:0 1px 8px rgba(0,0,0,.22);}
:is(#card,#ivRoot).t-classic-ivory .civ-photo img{object-position:center 30%;}
:is(#card,#ivRoot).t-classic-ivory .civ-info{margin:0 -18px;min-height:28%;padding:22px 30px calc(22px + env(safe-area-inset-bottom,0px));gap:10px;background:#fbf8f1;border-top:1px solid rgba(115,88,51,.14);}
:is(#card,#ivRoot).t-classic-ivory .civ-info::after{content:'';position:absolute;top:12px;left:50%;width:34px;height:1px;transform:translateX(-50%);background:#b79a62;opacity:.6;}
:is(#card,#ivRoot).t-classic-ivory .civ-names{font-size:clamp(25px,7vw,31px);letter-spacing:.11em;}

/* 3 HANOK — 한지 액자 / 세로 낙관선 / 절제된 한국적 여백 */
:is(#card,#ivRoot).t-hanok .hk-stage{padding:22px 22px 18px;background:#e8ddc9;}
:is(#card,#ivRoot).t-hanok .hk-stage::before{content:'囍';position:absolute;z-index:4;right:11px;top:26%;font-family:serif;font-size:15px;color:#8b4b3e;opacity:.72;}
:is(#card,#ivRoot).t-hanok .hk-stage::after{content:'';position:absolute;z-index:3;right:18px;top:12%;bottom:12%;width:1px;background:linear-gradient(transparent,rgba(117,77,47,.32) 16%,rgba(117,77,47,.32) 84%,transparent);}
:is(#card,#ivRoot).t-hanok .hk-photo-area{flex:1;border:1px solid rgba(91,62,35,.2);box-shadow:inset 0 0 0 8px rgba(247,240,226,.48);}
:is(#card,#ivRoot).t-hanok .hk-photo img{object-position:center 35%;filter:sepia(.12) saturate(.9) contrast(1.02) brightness(1.01);}
:is(#card,#ivRoot).t-hanok .hk-info{position:absolute;left:38px;right:58px;bottom:38px;display:block!important;padding:15px 18px!important;text-align:left!important;background:rgba(241,232,214,.9)!important;border:0!important;border-left:2px solid rgba(132,77,59,.52)!important;box-shadow:none!important;backdrop-filter:blur(6px);}
:is(#card,#ivRoot).t-hanok .hk-names{font-size:clamp(24px,6.8vw,29px);letter-spacing:.08em;text-align:left!important;}
:is(#card,#ivRoot).t-hanok .hk-when{align-items:flex-start!important;margin-top:8px;}

/* 4 BLACK — 호텔 나이트 / 전면 사진 + 비대칭 블랙 타이틀 바 */
:is(#card,#ivRoot).t-black .bk-photo-area{position:absolute!important;inset:0!important;width:100%;height:100%;}
:is(#card,#ivRoot).t-black .bk-photo img{object-position:center 38%;filter:contrast(1.1) brightness(.72) saturate(.92);}
:is(#card,#ivRoot).t-black .bk-photo-fade{height:68%;background:linear-gradient(180deg,transparent 0%,rgba(5,4,3,.12) 28%,rgba(5,4,3,.92) 100%);}
:is(#card,#ivRoot).t-black .bk-stage::before{content:'NOIR  /  WEDDING NIGHT';position:absolute;z-index:4;top:calc(26px + env(safe-area-inset-top,0px));right:22px;font:500 8px/1 'Cormorant Garamond',serif;letter-spacing:.26em;color:rgba(214,186,132,.78);writing-mode:vertical-rl;}
:is(#card,#ivRoot).t-black .bk-info{position:absolute!important;z-index:3;left:0!important;right:46px!important;bottom:0!important;min-height:31%;align-items:flex-start!important;justify-content:center!important;text-align:left!important;padding:28px 24px calc(42px + env(safe-area-inset-bottom,0px))!important;background:linear-gradient(105deg,rgba(7,6,5,.98),rgba(12,9,7,.84) 72%,transparent)!important;border:0!important;box-shadow:none!important;backdrop-filter:none!important;}
:is(#card,#ivRoot).t-black .bk-rule{width:64px;}
:is(#card,#ivRoot).t-black .bk-names{font-size:clamp(29px,8vw,36px);letter-spacing:.08em;text-align:left!important;}
:is(#card,#ivRoot).t-black .bk-when{align-items:flex-start!important;margin:0;}

/* 5 FULLSCREEN — 영화 포스터 타이포 / 무사진 정적 긴장감 */
:is(#card,#ivRoot).t-fullscreen .cn-stage{background:radial-gradient(ellipse 70% 54% at 66% 38%,#33271d 0%,#15100d 48%,#050403 100%);}
:is(#card,#ivRoot).t-fullscreen .cn-word{top:43%;font-size:clamp(70px,20vw,94px);letter-spacing:.08em;-webkit-text-stroke:1px rgba(214,186,132,.13);}
:is(#card,#ivRoot).t-fullscreen .cn-frame{inset:14% 20px 13%;}
:is(#card,#ivRoot).t-fullscreen .cn-inner{position:absolute!important;left:24px!important;right:24px!important;bottom:calc(72px + env(safe-area-inset-bottom,0px))!important;width:auto!important;padding:0!important;text-align:left!important;transform:none!important;}
:is(#card,#ivRoot).t-fullscreen .cn-filmlbl{text-align:left;margin:0 0 18px;letter-spacing:.34em;text-indent:0;}
:is(#card,#ivRoot).t-fullscreen .cn-titlebox{width:100%!important;margin:0!important;padding:14px 0 16px!important;border-top:1px solid rgba(214,186,132,.22);border-bottom:1px solid rgba(214,186,132,.22);background:none!important;}
:is(#card,#ivRoot).t-fullscreen .cn-names{font-size:clamp(30px,8.5vw,38px);text-align:left!important;letter-spacing:.03em;}
:is(#card,#ivRoot).t-fullscreen .cn-when{justify-content:flex-start;margin-top:14px;}

/* 6 MINIMAL — 파인아트 에디토리얼 / 넓은 백지 + 작은 정보 */
:is(#card,#ivRoot).t-minimal .stl-stage{display:grid!important;grid-template-rows:34px minmax(0,1fr) 142px!important;padding:16px 20px 0!important;background:#f3f1ec;}
:is(#card,#ivRoot).t-minimal .stl-pagehead{position:relative!important;left:auto!important;right:auto!important;top:auto!important;}
:is(#card,#ivRoot).t-minimal .stl-photo-area{position:relative!important;left:auto!important;right:auto!important;top:auto!important;bottom:auto!important;margin-right:18%;box-shadow:none;border-left:1px solid rgba(38,32,25,.18);}
:is(#card,#ivRoot).t-minimal .stl-photo img{object-position:center 36%;filter:contrast(1.08) saturate(.78);}
:is(#card,#ivRoot).t-minimal .stl-info{position:relative!important;left:auto!important;right:auto!important;bottom:auto!important;padding:18px 0 calc(18px + env(safe-area-inset-bottom,0px))!important;text-align:left!important;background:transparent!important;border:0!important;box-shadow:none!important;backdrop-filter:none!important;}
:is(#card,#ivRoot).t-minimal .stl-rule{display:block!important;}
:is(#card,#ivRoot).t-minimal .stl-meta{display:flex!important;margin-top:13px!important;}
:is(#card,#ivRoot).t-minimal .stl-folio{display:block!important;}
:is(#card,#ivRoot).t-minimal .stl-names{max-width:calc(100% - 104px)!important;text-align:left!important;font-size:clamp(20px,5.8vw,24px);}
:is(#card,#ivRoot).t-minimal .stl-when{justify-content:flex-start!important;margin-top:9px!important;}

/* 7 FLOWER — 모던 갤러리 포스터 / 흰 벽, 작품 캡션, 비대칭 하단 */
:is(#card,#ivRoot).t-flower .fl-hero{padding:16px;background:#f0eee8;}
:is(#card,#ivRoot).t-flower .fl-photo-area{flex:1;border:10px solid #fff;box-shadow:0 20px 46px -34px rgba(44,41,34,.62);}
:is(#card,#ivRoot).t-flower .fl-photo-main{padding:0;object-fit:cover;object-position:center 34%;}
:is(#card,#ivRoot).t-flower .fl-photo-bg{display:none;}
:is(#card,#ivRoot).t-flower .fl-info{margin:0 0 0 14%;padding:17px 2px calc(20px + env(safe-area-inset-bottom,0px));align-items:flex-start!important;text-align:left!important;background:transparent!important;border:0!important;box-shadow:none!important;backdrop-filter:none!important;}
:is(#card,#ivRoot).t-flower .fl-caption{width:100%!important;justify-content:space-between!important;padding-bottom:8px!important;margin:0 0 11px!important;border-bottom:1px solid rgba(54,50,42,.18)!important;}
:is(#card,#ivRoot).t-flower .fl-names,
:is(#card,#ivRoot).t-flower .fl-when{align-self:flex-start!important;text-align:left!important;}
:is(#card,#ivRoot).t-flower .fl-names{font-size:clamp(24px,6.8vw,29px);font-weight:500;}

/* 8 GOLD SERIF — 레터 미니 / 봉투 속 인쇄 카드 */
:is(#card,#ivRoot).t-gold-serif .lt-stage{padding:30px 22px;background:linear-gradient(145deg,#ddd0b8,#eee5d5 55%,#d6c7ad);}
:is(#card,#ivRoot).t-gold-serif .lt-stage::after{content:'';position:absolute;inset:18px;border:1px solid rgba(117,88,47,.16);pointer-events:none;}
:is(#card,#ivRoot).t-gold-serif .lt-frame{width:100%;min-height:74%;padding:56px 30px 50px;background:#fffdf8;box-shadow:0 24px 58px -38px rgba(70,49,24,.62);transform:rotate(-.35deg);}
:is(#card,#ivRoot).t-gold-serif .lt-frame::before{inset:11px;border-color:rgba(176,140,75,.46);}
:is(#card,#ivRoot).t-gold-serif .lt-frame::after{inset:17px;border-color:rgba(176,140,75,.18);}
:is(#card,#ivRoot).t-gold-serif .lt-mono{width:46px;height:46px;margin-bottom:18px;}
:is(#card,#ivRoot).t-gold-serif .lt-names{font-size:clamp(27px,7.6vw,33px);letter-spacing:.09em;}
:is(#card,#ivRoot).t-gold-serif .lt-msg{font-size:13.5px;line-height:1.95;}

@media(max-width:380px){
  :is(#card,#ivRoot).t-signature .sig-overlay{left:20px;right:20px;}
  :is(#card,#ivRoot).t-hanok .hk-info{left:32px;right:50px;bottom:32px;}
  :is(#card,#ivRoot).t-black .bk-info{right:38px!important;padding-left:21px!important;}
  :is(#card,#ivRoot).t-flower .fl-hero{padding:12px;}
  :is(#card,#ivRoot).t-gold-serif .lt-stage{padding:24px 17px;}
}
@media(min-width:421px){
  :is(#card,#ivRoot).t-classic-ivory .civ-stage{padding-left:24px;padding-right:24px;}
  :is(#card,#ivRoot).t-classic-ivory .civ-info{margin-left:-24px;margin-right:-24px;}
  :is(#card,#ivRoot).t-flower .fl-hero{padding:20px;}
}


/* Phase 9 T102 - 430px cover safe-width guardrail */
@media(max-width:430px){
  :is(#card,#ivRoot).t-fullscreen .cn-word{left:0;width:100%;transform:translateY(-55%);overflow:hidden;text-align:center;font-size:clamp(60px,17.5vw,74px)!important;letter-spacing:.065em!important;}
}

/* Phase 9 T101 - 390px cover safe-width guardrails */
@media(max-width:390px){
  :is(#card,#ivRoot).t-hanok .hk-info{left:30px!important;right:38px!important;padding:15px 15px!important;}
  :is(#card,#ivRoot).t-hanok .hk-names{font-size:clamp(23px,6.4vw,26px)!important;letter-spacing:.055em!important;max-width:100%!important;}
  :is(#card,#ivRoot).t-hanok .hk-names .hk-dot{margin-left:7px!important;margin-right:7px!important;}
  :is(#card,#ivRoot).t-fullscreen .cn-word{left:0;width:100%;transform:translateY(-55%);overflow:hidden;text-align:center;font-size:clamp(58px,17vw,70px)!important;letter-spacing:.055em!important;}
  :is(#card,#ivRoot).t-gold-serif .lt-stage{padding-left:20px!important;padding-right:20px!important;}
  :is(#card,#ivRoot).t-gold-serif .lt-frame{width:100%!important;padding-left:22px!important;padding-right:22px!important;}
  :is(#card,#ivRoot).t-gold-serif .lt-names{font-size:clamp(23px,6.6vw,26px)!important;letter-spacing:.055em!important;max-width:100%!important;}
}

/* Phase 9 T100 - 360px cover safe-width guardrails */
@media(max-width:360px){
  :is(#card,#ivRoot).t-hanok .hk-info{left:26px!important;right:30px!important;padding:14px 14px!important;}
  :is(#card,#ivRoot).t-hanok .hk-names{font-size:clamp(22px,6.2vw,24px)!important;letter-spacing:.045em!important;max-width:100%!important;}
  :is(#card,#ivRoot).t-hanok .hk-names .hk-dot{margin-left:6px!important;margin-right:6px!important;}
  :is(#card,#ivRoot).t-fullscreen .cn-word{left:0;width:100%;transform:translateY(-55%);overflow:hidden;text-align:center;font-size:clamp(54px,16vw,62px)!important;letter-spacing:.045em!important;}
  :is(#card,#ivRoot).t-gold-serif .lt-stage{padding-left:18px!important;padding-right:18px!important;}
  :is(#card,#ivRoot).t-gold-serif .lt-frame{width:100%!important;padding-left:20px!important;padding-right:20px!important;}
  :is(#card,#ivRoot).t-gold-serif .lt-names{font-size:clamp(22px,6.4vw,24px)!important;letter-spacing:.045em!important;max-width:100%!important;}
}html,body{margin:0;background:#ddd}body{width:100%;overflow-x:hidden}#card{width:100%;max-width:none;margin:0} .iv-cover{box-sizing:border-box} </style></head><body><div id="card" class="t-classic-ivory"><div class="iv-cover t-classic-ivory"><div class="civ-stage"><div class="civ-photo-area"><div class="civ-photo"><img src="../samples/tpl-classic-ivory.webp"></div><div class="civ-photo-fade"></div></div><div class="civ-info"><div class="civ-names"><span class="nm-person">김도윤</span><span class="civ-dot nm-sep">&amp;</span><span class="nm-person">이서연</span></div><div class="civ-when"><span class="civ-date">2027. 05. 22 SAT</span><span class="civ-time">오후 1시</span></div></div></div></div></div></body></html>
