<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>모바일 청첩장</title>
<!-- SNS/카톡 공유 OG 태그 -->
<!-- 기본값은 og-default.jpg, 카드 로드 후 대표사진(main_photo_url)이 있으면 JS로 갱신 -->
<meta property="og:type" content="website"/>
<meta property="og:title" id="og-title" content="모바일 청첩장"/>
<meta property="og:description" id="og-desc" content="저희 결혼식에 초대합니다"/>
<meta property="og:image" id="og-image" content="https://kkacmn-cpu.github.io/wedding/og-default.jpg"/>
<meta property="og:image:secure_url" id="og-image-secure" content="https://kkacmn-cpu.github.io/wedding/og-default.jpg"/>
<meta property="og:image:width" content="800"/>
<meta property="og:image:height" content="800"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" id="tw-title" content="모바일 청첩장"/>
<meta name="twitter:image" id="tw-image" content="https://kkacmn-cpu.github.io/wedding/og-default.jpg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700;800&family=Noto+Sans+JP:wght@300;400&family=Noto+Sans+Thai:wght@300;400&family=Gowun+Batang:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ivory:#fcf9f4;--ivory-2:#f7f1e8;--brown:#3a2f26;--brown-soft:#5c4e42;
  --brown-mute:#8a7a6a;--gold:#b8945f;--gold-deep:#9a7740;--gold-pale:#e9dcc4;
  --gold-wash:#f5eedf;--line:#e8ddcc;--white:#ffffff;--ok:#6f8f6a;--sand:#d9c8af;
  --sh-sm:0 4px 18px -8px rgba(58,47,38,.18);
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--ivory);color:var(--brown);min-height:100vh;font-weight:300;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word;}

/* 로딩 */
#loading{position:fixed;inset:0;background:var(--ivory);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s;}
#loading.hide{opacity:0;pointer-events:none;}
.loading-logo{font-family:var(--serif);font-size:22px;color:var(--gold-deep);margin-bottom:20px;letter-spacing:2px;}
.loading-dots{display:flex;gap:8px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dot .9s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}

/* 청첩장 전체 */
#card{max-width:480px;margin:0 auto;background:var(--white);min-height:100vh;position:relative;overflow:hidden;animation:cardFadeIn .9s .85s ease both;}
@keyframes cardFadeIn{0%{opacity:0;}100%{opacity:1;}}

/* 오프닝 */
.op-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
.op-overlay.done{display:none;}
.op-names{font-family:var(--serif);font-size:28px;letter-spacing:3px;color:inherit;margin-bottom:12px;}
.op-sub{font-size:13px;letter-spacing:2px;opacity:.7;}

/* ===== theme별 오프닝 커버 (1.2~1.6초 자동, opacity+transform만) ===== */
.op-overlay.op-theme{animation:opThemeOut .5s 1.05s ease forwards;}
.op-overlay.op-theme .op-names{font-family:var(--serif);letter-spacing:4px;white-space:nowrap;}
.op-overlay.op-theme .op-sub{font-size:12px;letter-spacing:3px;margin-top:14px;opacity:.85;}
.op-overlay.op-theme .op-lbl{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;opacity:.7;margin-bottom:16px;}
@keyframes opThemeOut{to{opacity:0;visibility:hidden;}}
@keyframes opRiseFade{0%{opacity:0;transform:translateY(6px);}100%{opacity:1;transform:translateY(0);}}
@keyframes opSoftFade{0%{opacity:0;}100%{opacity:1;}}
@keyframes opVerySoft{0%{opacity:0;}100%{opacity:1;}}
@keyframes opCardRise{0%{opacity:0;transform:translateY(8px) scale(.98);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes opCardIn{0%{opacity:0;transform:scale(.98);}100%{opacity:1;transform:scale(1);}}
@keyframes opZoomBg{0%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes opLineExpand{0%{transform:scaleX(0);}100%{transform:scaleX(1);}}
@keyframes opBoxIn{0%{opacity:0;}100%{opacity:1;}}
@keyframes opGoldGlow{0%{opacity:0;box-shadow:0 0 0 rgba(201,168,106,0);}100%{opacity:1;box-shadow:0 0 14px rgba(201,168,106,.5);}}
@keyframes opCutIn{0%{opacity:0;}18%{opacity:0;}19%{opacity:1;}100%{opacity:1;}}

/* 1. signature → VOGUE 화보: 사진이 주인공. 이름은 작은 자막. 날짜 없음 */
.op-overlay.theme-signature{color:#fff;background:#2a231d;overflow:hidden;}
.op-overlay.theme-signature .op-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(1px) brightness(.85);transform:scale(1.04);z-index:-1;}
.op-overlay.theme-signature .op-shade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,rgba(0,0,0,.4));z-index:-1;}
.op-overlay.theme-signature .op-names{font-size:16px;font-weight:400;letter-spacing:5px;animation:opRiseFade 1.1s .25s ease both;text-shadow:0 1px 14px rgba(0,0,0,.7);}

/* 2. classic-ivory → 밝은 스튜디오: 종이 테두리 + Wedding Invitation 문구가 주인공. 이름은 작은 보조 */
.op-overlay.theme-classic-ivory{background:#fbf6ec;color:#241c14;animation:opSoftFade .5s ease,opThemeOut .5s 1.15s ease forwards;}
.op-overlay.theme-classic-ivory .op-box{border:1px solid rgba(176,140,75,.5);padding:30px 40px;animation:opBoxIn .5s ease forwards;}
.op-overlay.theme-classic-ivory .op-lbl{font-family:'Cormorant Garamond',serif;text-transform:none;font-size:15px;letter-spacing:4px;color:#9a7740;opacity:0;animation:opSoftFade .6s .3s ease forwards;margin-bottom:10px;}
.op-overlay.theme-classic-ivory .op-names{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:400;letter-spacing:3px;color:#6a5f4d;opacity:0;animation:opSoftFade .7s .5s ease forwards;}

/* 3. hanok → 전통 청첩: 먹선이 주인공. 전통감은 색/여백/선으로. 글꼴은 절제(Song Myung 미사용) */
.op-overlay.theme-hanok{background:linear-gradient(170deg,#f2e8d2,#e4d4b6);color:#1a1109;animation:opSoftFade .5s ease,opThemeOut .5s 1.15s ease forwards;}
.op-overlay.theme-hanok .op-line{width:64px;height:2px;margin:0 auto 18px;background:linear-gradient(to right,transparent,#6a2f24,#8a4538,#6a2f24,transparent);transform:scaleX(0);animation:opLineExpand .7s .1s cubic-bezier(.4,0,.2,1) forwards;}
.op-overlay.theme-hanok .op-lbl{font-family:'Noto Serif KR',serif;font-weight:500;text-transform:none;color:#8a4538;letter-spacing:14px;font-size:20px;opacity:0;animation:opSoftFade .6s .4s ease forwards;margin-bottom:14px;text-indent:14px;}
.op-overlay.theme-hanok .op-names{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:400;letter-spacing:5px;color:#3a2418;opacity:0;animation:opSoftFade .7s .6s ease forwards;}

/* 4. black → 럭셔리 호텔: 골드 라인 + 이름이 주인공. 회색 글씨 금지 */
.op-overlay.theme-black{background:#0a0807;color:#f4ecdb;overflow:hidden;}
.op-overlay.theme-black .op-bg{position:absolute;inset:0;background-size:cover;background-position:center 32%;filter:brightness(.92) contrast(1.04);transform:scale(1.02);z-index:-1;}
.op-overlay.theme-black .op-shade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,8,7,.45),rgba(10,8,7,.35) 45%,rgba(10,8,7,.72));z-index:-1;}
.op-overlay.theme-black .op-gline{width:54px;height:1px;margin:0 auto 22px;background:linear-gradient(to right,transparent,#c9a86a,transparent);opacity:0;animation:opGoldGlow .8s .1s ease forwards;}
.op-overlay.theme-black .op-names{display:inline-block;font-family:'Cormorant Garamond','Noto Serif KR',serif;font-size:24px;font-weight:400;letter-spacing:7px;color:#f4ecdb;opacity:0;animation:opRiseFade 1s .4s ease forwards;text-shadow:0 1px 2px rgba(0,0,0,.4);max-width:88vw;white-space:nowrap;text-align:center;}
.op-overlay.theme-black .op-sub{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:4.5px;color:#e0c184;opacity:0;animation:opSoftFade .8s .6s ease forwards;text-shadow:0 1px 3px rgba(0,0,0,.45);}

/* 5. fullscreen → 영화 오프닝: A WEDDING FILM + 이름 컷인. 산세리프+넓은 자간으로 영화 타이틀(세리프 호텔형과 차별) */
.op-overlay.theme-fullscreen{background:radial-gradient(ellipse 70% 55% at 50% 42%,#2c2620,#0c0a08);color:#fdf8f0;}
.op-overlay.theme-fullscreen .op-lbl{font-family:'Cormorant Garamond',serif;color:rgba(255,248,238,.68);letter-spacing:8px;font-size:12px;animation:opCutIn .6s ease forwards;margin-bottom:20px;}
.op-overlay.theme-fullscreen .op-vnames{display:flex;flex-direction:row;align-items:center;justify-content:center;font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:500;letter-spacing:.5px;line-height:1.15;white-space:nowrap;animation:opCutIn .7s .1s ease forwards;}
.op-overlay.theme-fullscreen .op-vand{color:rgba(212,184,130,.78);font-weight:400;margin:0 8px;font-size:.7em;vertical-align:middle;}
.op-overlay.theme-fullscreen .op-subwd{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:4px;color:rgba(212,184,130,.7);text-transform:uppercase;opacity:0;animation:opSoftFade .8s .7s ease forwards;margin-top:6px;}

/* 6. minimal(Fine Art) → 화보집 첫 페이지: 여백 + 작은 Editorial. 이름/날짜 아주 작게 */
.op-overlay.theme-minimal{background:#faf9f6;color:#241c14;padding:96px 48px 60px;justify-content:center;animation:opThemeOut .5s 1.2s ease forwards;}
.op-overlay.theme-minimal .op-lbl{font-family:'Cormorant Garamond',serif;text-transform:none;font-size:15px;letter-spacing:5px;color:#9a8568;opacity:0;animation:opVerySoft .9s .15s ease forwards;margin-bottom:18px;}
.op-overlay.theme-minimal .op-names{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:400;letter-spacing:2px;color:#2d2218;opacity:0;animation:opVerySoft .9s .15s ease forwards;}
.op-overlay.theme-minimal .op-names .nm-sep{color:#b09870;margin:0 5px;font-size:.62em;vertical-align:middle;}
.op-overlay.theme-minimal .op-sub{font-size:11px;letter-spacing:3.5px;opacity:0;animation:opVerySoft .9s .15s ease forwards;color:#6e5a47;margin-top:14px;}

/* 7. flower(야외 스냅형) → 자연광 화보 오프닝: 이름 + 날짜 중앙, 베이지 톤 */
.op-overlay.theme-flower{background:linear-gradient(165deg,#f3ead8,#e4d4b6);color:#2a2018;align-items:center;justify-content:center;padding:0;animation:opThemeOut .5s 1.5s ease forwards;}
.op-overlay.theme-flower .op-names{font-family:'Noto Serif KR',serif;font-size:30px;font-weight:600;letter-spacing:.5px;line-height:1.2;color:#2a2018;opacity:0;animation:opSoftFade .8s .4s ease forwards;text-align:center;}
.op-overlay.theme-flower .op-sub{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:500;letter-spacing:3px;color:#a08458;margin-top:14px;opacity:0;animation:opSoftFade .8s .6s ease forwards;text-align:center;}

/* 8. gold-serif(레터) → 실제 초대장: 카드/봉투 오브젝트 상승. Invitation+이름. 프레임 안 안정(Gowun Batang 미사용) */
.op-overlay.theme-gold-serif{background:linear-gradient(168deg,#f0e8d8,#e4d8c2);}
.op-overlay.theme-gold-serif .op-card{background:linear-gradient(172deg,#fffdf8,#f7f0e2);box-shadow:0 14px 44px rgba(120,96,58,.26);padding:36px 32px;position:relative;max-width:80%;animation:opCardRise 1s ease forwards;}
.op-overlay.theme-gold-serif .op-card::before{content:'';position:absolute;inset:8px;border:1px solid rgba(176,140,75,.4);}
.op-overlay.theme-gold-serif .op-card::after{content:'';position:absolute;top:8px;left:8px;right:8px;height:26px;background:linear-gradient(180deg,rgba(176,140,75,.12),transparent);clip-path:polygon(0 0,100% 0,50% 100%);}
.op-overlay.theme-gold-serif .op-lbl{font-family:'Cormorant Garamond',serif;text-transform:none;font-size:13px;color:#9a7740;letter-spacing:4px;margin-bottom:12px;position:relative;}
.op-overlay.theme-gold-serif .op-names{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:400;letter-spacing:3px;color:#241c12;position:relative;max-width:100%;}
.op-overlay.theme-gold-serif .op-names .nm-sep{margin:0 6px;color:#9a7740;}
/* ===== 이름 길이 대응 (자간→구분자→간격 우선, font-size 최소 축소) ===== */
/* 이름 그룹은 inline-block(콘텐츠 폭) + 템플릿별 max-width 상한 → 너무 넓게 퍼져 찢어져 보이는 것 방지 */
#card.t-signature .sig-names{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;max-width:84%;margin:0 auto;white-space:normal;font-family:'Noto Serif KR',serif;font-size:28px;font-weight:500;line-height:1.12;letter-spacing:.02em;text-align:center;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.28);}
#card.t-signature .sig-names .nm-person{display:block;white-space:nowrap;}
#card.t-classic-ivory .civ-names{display:inline-block;max-width:88%;}
#card.t-black .bk-names{display:inline-block;max-width:88%;}
#card.t-flower .fl-names{display:inline-block;max-width:88%;}
#card.t-hanok .hk-names{display:inline-block;max-width:88%;}
#card.t-minimal .stl-names{display:inline-block;max-width:86%;}
#card.t-gold-serif .lt-names{display:inline-block;max-width:96%;}
#card.t-fullscreen .cn-names{display:inline-block;max-width:100%;}
/* 사람 이름은 절대 글자 단위로 쪼개지지 않음(span 단위 nowrap), 줄바꿈은 사람 단위로만 */
#card .nm-person{white-space:nowrap;display:inline-block;}
#card .nm-sep{white-space:nowrap;display:inline-block;}
/* 측정 기반 폭 맞춤: 이름 그룹은 기본 한 줄(nowrap), JS(fitName)가 overflow 시 단계적 축소 */
#card .sig-names,#card .civ-names,#card .bk-names,#card .fl-names,#card .hk-names,#card .stl-names,#card .lt-names{white-space:nowrap;}
/* JS가 2줄로 전환 시: 사람 단위로만 줄바꿈 */
#card .nm-twoline{white-space:normal !important;line-height:1.34 !important;word-break:keep-all;}
#card .nm-twoline .nm-person{display:block;}
/* A그룹(signature/classic-ivory/hanok/black/minimal/flower): 2줄 시 구분자 완전 제거 → "양군재식\n남궁소영" */
#card.t-signature .nm-twoline .nm-sep,
#card.t-classic-ivory .nm-twoline .nm-sep,
#card.t-hanok .nm-twoline .nm-sep,
#card.t-black .nm-twoline .nm-sep,
#card.t-minimal .nm-twoline .nm-sep,
#card.t-flower .nm-twoline .nm-sep{display:none !important;}
/* B그룹(gold-serif): 2줄 시 구분자 유지하되 작고 보조적으로 → "양재식 / and / 독고소영" */
#card.t-gold-serif .nm-twoline .nm-sep{display:block;margin:5px 0;font-size:11px;opacity:.6;font-style:italic;}
/* 오프닝 오버레이(#card 밖)용 2줄 전환: op-names도 메인과 동일 규칙 */
.op-overlay .nm-twoline{white-space:normal !important;line-height:1.34 !important;word-break:keep-all;}
.op-overlay .nm-twoline .nm-person{display:block;}
.op-overlay .nm-twoline .nm-sep{display:none !important;}
.op-overlay.theme-gold-serif .nm-twoline .nm-sep{display:block !important;margin:5px 0;font-size:11px;opacity:.6;font-style:italic;color:#9a7740;}

/* 커버 */
.iv-cover{padding:64px 30px 48px;text-align:center;position:relative;}
.iv-eyebrow{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;opacity:.55;margin-bottom:18px;font-weight:400;}
.iv-names{font-size:27px;letter-spacing:3px;font-weight:400;line-height:1.55;margin-bottom:6px;}
.iv-amp{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;margin:0 8px;}
.iv-photo{width:182px;height:226px;margin:26px auto 0;border-radius:120px 120px 10px 10px;background:var(--gold-wash);display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden;border:1px solid var(--line);box-shadow:0 12px 36px -18px rgba(58,47,38,.4);}
.iv-photo img{width:100%;height:100%;object-fit:cover;}
.iv-div{width:36px;height:1px;margin:24px auto;background:var(--gold);opacity:.4;}
.iv-date{font-size:14px;letter-spacing:1.5px;line-height:1.7;}
.sub-lang{display:block;font-size:.82em;font-weight:300;opacity:.55;margin-top:4px;font-family:'Noto Sans KR','Noto Sans JP','Noto Sans Thai',sans-serif;letter-spacing:.5px;}

/* 섹션 */
.iv-sec{padding:46px 30px;text-align:center;border-top:1px solid rgba(0,0,0,.05);content-visibility:auto;contain-intrinsic-size:1px 420px;}
.iv-sec-t{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.55;margin-bottom:18px;font-weight:400;}
.iv-msg{font-size:14.5px;line-height:2.15;font-weight:400;white-space:pre-line;margin-top:4px;letter-spacing:.2px;}
.iv-info{font-size:14px;line-height:1.95;margin-top:4px;}
.iv-info b{font-weight:500;}
.iv-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.iv-map{margin-top:18px;}
.iv-map-label{font-size:11px;letter-spacing:2px;opacity:.65;text-transform:uppercase;}
.iv-map .iv-chips{margin-top:10px;}
.iv-map .iv-chip{min-width:84px;text-align:center;}
.iv-chip{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;padding:11px 20px;border-radius:999px;border:1px solid currentColor;opacity:.6;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;display:inline-block;letter-spacing:.3px;}
.iv-chip:hover{opacity:1;transform:translateY(-1px);}
.iv-gal{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.iv-gal .g{aspect-ratio:1;border-radius:8px;background:var(--ivory-2);overflow:hidden;cursor:pointer;}
.iv-gal .g img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.iv-gal .g:hover img{transform:scale(1.06);}
/* 매거진형: 2열, 3n+1만 세로(3/4), 나머지 정사각 (editor gal-masonry와 동일) */
.iv-gal-masonry{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;}
.iv-gal-masonry .g{border-radius:8px;background:var(--ivory-2);overflow:hidden;cursor:pointer;}
.iv-gal-masonry .g:nth-child(3n+1){aspect-ratio:3/4;}
.iv-gal-masonry .g:not(:nth-child(3n+1)){aspect-ratio:1;}
.iv-gal-masonry .g img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.iv-gal-masonry .g:hover img{transform:scale(1.06);}
/* 가로전체: 세로 1열, 4/3 비율 (editor gal-full과 동일) */
.iv-gal-full{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.iv-gal-full .g{width:100%;aspect-ratio:4/3;border-radius:8px;background:var(--ivory-2);overflow:hidden;cursor:pointer;}
.iv-gal-full .g img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
.iv-gal-full .g:hover img{transform:scale(1.06);}
/* 더보기: 10번째부터 숨김, 펼치면 표시 */
.iv-gal-wrap .g-more{display:none;}
.iv-gal-wrap.gal-expanded .g-more{display:block;}
.gal-more-btn{display:block;width:100%;margin:28px 0 8px;padding:0;background:transparent;border:none;cursor:pointer;text-align:center;font-family:'Noto Serif KR','Cormorant Garamond',serif;color:#9a7740;}
.gal-more-btn .gm-1{display:block;font-size:14px;font-weight:500;letter-spacing:1px;}
.gal-more-btn .gm-2{display:block;font-size:11.5px;letter-spacing:.5px;opacity:.55;margin-top:5px;}
.gal-more-btn:hover .gm-1{opacity:.7;}
/* 기본: 장식/설명줄 숨김 (gold-serif 외 템플릿은 기존 텍스트형 유지) */
.gal-more-btn .gm-deco,.gal-more-btn .gm-3{display:none;}
/* ===== gold-serif 전용: 갤러리 전환 카드 ===== */
.t-gold-serif .gal-more-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:84%;max-width:300px;min-height:48px;margin:18px auto 8px;padding:14px 20px;background:#fffdf8;border:1px solid rgba(176,140,75,.5);border-radius:3px;text-align:center;}
.t-gold-serif .gal-more-btn .gm-deco{display:block;width:4px;height:4px;margin:0;transform:rotate(45deg);border:1px solid #b08c4b;flex:0 0 auto;}
.t-gold-serif .gal-more-btn .gm-1{display:none;}
.t-gold-serif .gal-more-btn .gm-2{font-size:13px;font-weight:400;letter-spacing:.3px;color:#7a6230;opacity:1;text-transform:none;margin:0;}
.t-gold-serif .gal-more-btn .gm-count{font-weight:600;color:#5a4a30;}
#card.t-hanok .gal-more-btn{color:#8a4538;}
#card.t-hanok .gal-more-btn .gm-2{opacity:.72;}
.t-gold-serif .gal-more-btn:hover{border-color:rgba(176,140,75,.75);background:#fffaf0;}
.dday-box{display:flex;justify-content:center;gap:20px;margin-top:6px;}
.dday-unit{text-align:center;}
.dday-num{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;line-height:1;letter-spacing:1px;}
/* D-DAY 에디토리얼 (위젯 느낌 제거) */
.dday-figure{font-family:'Cormorant Garamond',serif;font-size:34.5px;font-weight:300;letter-spacing:2px;line-height:1;margin-top:2px;}
.dday-date{font-family:'Cormorant Garamond',serif;font-size:14.5px;letter-spacing:3px;opacity:.58;margin-top:11px;}
.dday-sec .iv-sec-t{margin-bottom:10px;}
.dday-lbl{font-size:11px;letter-spacing:1.5px;opacity:.55;margin-top:8px;}
.iv-foot{padding:42px 30px;text-align:center;font-size:11px;opacity:.45;letter-spacing:1.5px;line-height:1.9;}


/* 계좌 */
.acc-box{margin-top:6px;text-align:left;}
.acc-toggle{cursor:pointer;list-style:none;text-align:center;font-size:12px;letter-spacing:1px;padding:13px 0;border:1px solid currentColor;border-radius:999px;opacity:.45;transition:opacity .25s;width:100%;}
.acc-toggle:hover{opacity:.7;}
.acc-toggle::-webkit-details-marker{display:none;}
.acc-list{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.acc-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:15px 16px;border-radius:12px;background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.04);}
.acc-info{display:flex;flex-direction:column;gap:3px;}
.acc-side{font-size:10px;letter-spacing:1px;opacity:.5;text-transform:uppercase;}
.acc-bank{font-size:13px;font-weight:500;}
.acc-num{font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:400;opacity:.85;letter-spacing:.5px;}
.acc-copy{flex-shrink:0;font-size:11px;padding:9px 15px;border-radius:999px;background:rgba(0,0,0,.06);color:inherit;cursor:pointer;border:none;transition:all .25s;opacity:.7;}
.acc-copy:hover{opacity:1;background:rgba(0,0,0,.1);}
.acc-copy.done{background:var(--ok);color:#fff;opacity:1;}

/* 방명록 */
.guest-form{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.guest-form input,.guest-form textarea{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:var(--ivory);font-size:13.5px;font-family:inherit;color:var(--brown);outline:none;resize:none;transition:border-color .25s;}
.guest-form input:focus,.guest-form textarea:focus{border-color:var(--gold);background:#fff;}
.guest-submit{background:var(--gold);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;cursor:pointer;width:100%;transition:background .25s;letter-spacing:.5px;}
.guest-submit:hover{background:var(--gold-deep);}
.guest-list{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.guest-item{background:var(--ivory-2);border-radius:12px;padding:16px 18px;text-align:left;}
.guest-item .gi-name{font-size:13px;font-weight:500;color:var(--brown);margin-bottom:5px;}
.guest-item .gi-msg{font-size:13.5px;color:var(--brown-soft);line-height:1.8;}
.guest-item .gi-date{font-size:11px;color:var(--brown-mute);margin-top:8px;letter-spacing:.5px;}

/* RSVP */
.rsvp-form{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.rsvp-opts{display:flex;gap:10px;}
.rsvp-opt{flex:1;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:13.5px;text-align:center;cursor:pointer;transition:all .25s;background:var(--white);letter-spacing:.5px;}
.rsvp-opt.on{background:var(--gold);color:#fff;border-color:var(--gold);}
.rsvp-form input,.rsvp-form select,.rsvp-form textarea{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:var(--ivory);font-size:13.5px;font-family:inherit;color:var(--brown);outline:none;transition:border-color .25s;}
.rsvp-form input:focus,.rsvp-form select:focus{border-color:var(--gold);background:#fff;}
.rsvp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rsvp-submit{background:var(--brown);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;cursor:pointer;width:100%;transition:background .25s;letter-spacing:.5px;}
.rsvp-submit:hover{background:var(--gold-deep);}
.privacy{font-size:11px;color:var(--brown-mute);line-height:1.7;margin-top:10px;text-align:center;opacity:.8;}

/* 갤러리 라이트박스 */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:800;display:none;align-items:center;justify-content:center;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;z-index:2;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;z-index:2;-webkit-tap-highlight-color:transparent;}
.lb-nav:hover{background:rgba(255,255,255,.22);}
.lb-prev{left:14px;}
.lb-next{right:14px;}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:2px;z-index:2;}
@media(max-width:480px){.lb-nav{width:38px;height:38px;font-size:22px;}.lb-prev{left:8px;}.lb-next{right:8px;}}

/* ================================================================
   12종 템플릿 CSS
   각 템플릿은 색감 + 폰트 느낌 + 커버 레이아웃이 모두 다릅니다
   ================================================================ */

/* ============================================================
   1. SIGNATURE PHOTO — 거의 풀스크린 사진 (웨딩 매거진 첫 장)
   ============================================================ */
.t-signature{background:#0c0a08;color:#3a2f26;}
.t-signature .iv-cover{padding:0;}
/* 풀스크린 포토형 — 사진이 주인공, 텍스트 최소 */
.sig-hero{position:relative;width:100%;height:100svh;min-height:560px;max-height:1000px;overflow:hidden;background:#0c0a08;}
.sig-photo{position:absolute;inset:0;width:100%;height:100%;}
.sig-photo img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;}
@keyframes sigKenburns{from{transform:scale(1.035);}to{transform:scale(1);}}
/* 하단 안전영역만 살짝 어둡게 — 사진 대부분은 그대로 */
.sig-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,6,4,.16) 0%,transparent 24%,transparent 52%,rgba(8,6,4,.34) 78%,rgba(8,6,4,.62) 100%);}
/* 텍스트는 하단 안전영역에 작고 얇게 + 국소 보강으로 어떤 사진이든 가독 */
.sig-overlay{position:absolute;left:0;right:0;bottom:0;padding:0 30px calc(82px + env(safe-area-inset-bottom,0px));text-align:center;z-index:2;}
.sig-textwrap{display:inline-block;max-width:100%;padding:0;position:relative;}
.sig-textwrap::before{content:'';position:absolute;inset:-8px -20px;background:radial-gradient(ellipse 75% 100% at 50% 60%,rgba(6,4,3,.5),transparent 75%);z-index:-1;filter:blur(2px);}
.sig-names{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:500;letter-spacing:.02em;color:#fff;line-height:1.12;text-align:center;text-shadow:0 1px 8px rgba(0,0,0,.28);}
.sig-date{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;line-height:1;letter-spacing:.14em;margin-top:11px;color:rgba(255,255,255,.92);text-shadow:0 1px 6px rgba(0,0,0,.25);text-align:center;white-space:nowrap;}
@media (max-width:380px){
  #card.t-signature .sig-names{font-size:26px;letter-spacing:.02em;}
  .sig-date{font-size:12px;letter-spacing:.12em;}
}
@keyframes sigScroll{0%{transform:translateY(-12px);opacity:0;}40%{opacity:1;}100%{transform:translateY(34px);opacity:0;}}
.t-signature .iv-sec{border-top:1px solid rgba(184,148,95,.14);}
.t-signature .iv-sec-t{color:#9a7740;}
.t-signature .iv-names{font-family:'Cormorant Garamond',serif;}

/* ============================================================
   2. CLASSIC IVORY — 고급 종이청첩장 첫 장 (골드 더블라인 + 명조)
   ============================================================ */
.t-classic-ivory{background:#f6efe0;color:#3a2f26;}
.t-classic-ivory .iv-cover{padding:0;}
/* B안 안전형: 사진(72%) + 아이보리 정보 패널(28%) */
.civ-stage{position:relative;width:100%;height:100vh;min-height:600px;max-height:1000px;display:flex;flex-direction:column;background:#f6efe0;overflow:hidden;}
.civ-photo-area{position:relative;flex:0 0 75%;overflow:hidden;background:#e8dcc6;}
.civ-photo{position:absolute;inset:0;width:100%;height:100%;}
.civ-photo img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;}
.civ-photo-fade{position:absolute;left:0;right:0;bottom:0;height:15%;background:linear-gradient(to bottom,transparent,rgba(253,252,248,.35) 65%,#fdfcf8);pointer-events:none;}
.civ-info{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;background:linear-gradient(170deg,#fdfcf8,#f3ead8);padding:0 28px calc(0px + env(safe-area-inset-bottom,0px));position:relative;z-index:2;}
.civ-info::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 38%,rgba(255,255,255,.5),transparent 70%);pointer-events:none;}
.civ-info>*{position:relative;}
.civ-names{font-family:'Noto Serif KR','Cormorant Garamond',serif;font-size:30px;font-weight:500;letter-spacing:4px;color:#241c14;line-height:1.2;white-space:nowrap;}
.civ-names .civ-dot{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:400;font-style:italic;color:#b79a62;margin:0 5px;vertical-align:middle;}
.civ-when{display:flex;flex-direction:column;align-items:center;gap:5px;}
.civ-date{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;line-height:1;letter-spacing:.12em;color:#4a3c2c;white-space:nowrap;}
.civ-time{font-family:'Noto Serif KR',serif;font-size:11px;font-weight:400;line-height:1;letter-spacing:.08em;color:#6a5a46;white-space:nowrap;}

/* ===== 묶음2: black/flower/hanok/minimal 사진형 커버 (실제 카드 100vh) ===== */
.t-black .bk-stage{position:relative;width:100%;height:100vh;min-height:600px;max-height:1000px;display:flex;flex-direction:column;background:#100d0a;overflow:hidden;}
.t-black .bk-photo-area{position:relative;flex:0 0 76%;overflow:hidden;background:#0a0807;}
.t-black .bk-photo{position:absolute;inset:0;width:100%;height:100%;}
.t-black .bk-photo img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;}
.t-black .bk-photo-fade{position:absolute;left:0;right:0;bottom:0;height:20%;background:linear-gradient(to bottom,transparent,rgba(16,13,10,.35) 70%,#100d0a);pointer-events:none;}
.t-black .bk-info{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#100d0a;padding:0 28px calc(48px + env(safe-area-inset-bottom,0px));z-index:2;}
.t-black .bk-names{font-family:'Cormorant Garamond','Noto Serif KR',serif;font-size:32px;font-weight:400;letter-spacing:4px;color:#f4ecdb;line-height:1;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.45);}
.t-black .bk-names .bk-dot{margin:0 10px;color:#c9a86a;font-size:16px;}
.t-black .bk-when{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:14px;}
.t-black .bk-date{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:3px;color:rgba(240,231,214,.96);white-space:nowrap;}
.t-black .bk-time{font-family:'Noto Serif KR',serif;font-size:12.5px;letter-spacing:1px;color:rgba(220,190,135,.85);white-space:nowrap;}
.t-flower .fl-hero{position:relative;width:100%;height:100vh;min-height:600px;max-height:1000px;overflow:hidden;background:#fff;display:flex;flex-direction:column;}
.t-flower .fl-photo-area{position:relative;flex:0 0 78%;overflow:hidden;background:#cabfae;}
.t-flower .fl-photo{position:absolute;inset:0;width:100%;height:100%;}
.t-flower .fl-photo img{width:100%;height:100%;object-fit:cover;object-position:center 38%;display:block;animation:sigKenburns 22s ease-out forwards;}
.t-flower .fl-info{position:relative;flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:24px 30px calc(36px + env(safe-area-inset-bottom,0px));background:#fff;z-index:2;}
.t-flower .fl-names{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:600;letter-spacing:.5px;color:#2a2018;line-height:1.2;white-space:nowrap;}
.t-flower .fl-names .fl-dot{font-family:'Cormorant Garamond',serif;font-style:italic;color:#9a8a76;margin:0 9px;font-weight:400;}
.t-flower .fl-when{display:flex;flex-direction:column;align-items:flex-start;gap:3px;margin-top:6px;}
.t-flower .fl-date{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:2px;color:#6a5e50;text-transform:uppercase;white-space:nowrap;}
.t-flower .fl-time{font-family:'Noto Serif KR',serif;font-size:12px;font-weight:400;letter-spacing:1px;color:#8a7a66;white-space:nowrap;}
.t-hanok .hk-stage{position:relative;box-sizing:border-box;width:100%;height:100vh;height:100svh;height:100dvh;min-height:600px;max-height:1000px;display:flex;flex-direction:column;background:#efe6d4;overflow:hidden;}
.t-hanok .hk-photo-area{position:relative;flex:0 0 70%;overflow:hidden;background:#d8cab0;}
.t-hanok .hk-photo{position:absolute;inset:0;width:100%;height:100%;}
.t-hanok .hk-photo img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;}
.t-hanok .hk-photo-fade{position:absolute;left:0;right:0;bottom:0;height:16%;background:linear-gradient(to bottom,transparent,rgba(239,230,212,.42) 65%,#efe6d4);pointer-events:none;}
.t-hanok .hk-info{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;background:linear-gradient(170deg,#f2e8d2,#e4d4b6);padding:0 28px calc(0px + env(safe-area-inset-bottom,0px));z-index:2;}
.t-hanok .hk-names{font-family:'Noto Serif KR',serif;font-size:29px;font-weight:500;letter-spacing:6px;color:#1a1109;line-height:1;white-space:nowrap;}
.t-hanok .hk-names .hk-dot{margin:0 13px;color:#8a3a2a;}
.t-hanok .hk-when{display:flex;flex-direction:column;align-items:center;gap:5px;}
.t-hanok .hk-date{font-family:'Noto Serif KR',serif;font-size:14px;letter-spacing:3px;color:#4a3820;white-space:nowrap;}
.t-hanok .hk-time{font-family:'Noto Serif KR',serif;font-size:12px;letter-spacing:1px;color:#8a7450;white-space:nowrap;}
.t-minimal .stl-stage{position:relative;width:100%;height:100vh;min-height:600px;max-height:1000px;display:flex;flex-direction:column;background:#fbf6ec;overflow:hidden;}
.t-minimal .stl-photo-area{position:relative;flex:0 0 78%;overflow:hidden;background:#cabfae;}
.t-minimal .stl-photo{position:absolute;inset:0;width:100%;height:100%;}
.t-minimal .stl-photo img{width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;}
.t-minimal .stl-info{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:0 22px calc(28px + env(safe-area-inset-bottom,0px));background:#fbf6ec;z-index:2;}
.t-minimal .stl-names{font-family:'Cormorant Garamond','Noto Serif KR',serif;font-size:20px;font-weight:400;letter-spacing:1.2px;color:#241c14;line-height:1.3;white-space:nowrap;}
.t-minimal .stl-names .stl-amp{font-style:normal;color:#b09870;margin:0 5px;font-weight:400;font-size:.62em;vertical-align:middle;}
.t-minimal .stl-when{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:10px;}
.t-minimal .stl-date{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:1.8px;color:#4a3c2c;white-space:nowrap;}
.t-minimal .stl-time{font-family:'Noto Sans KR',sans-serif;font-size:13.5px;font-weight:400;letter-spacing:.3px;color:#6a5a48;white-space:nowrap;}
/* flower 자연광 강조 */
.t-flower .fl-glow{display:none;}
/* 시네마 타이포형 (무사진, 100vh) */
.t-fullscreen .cn-stage{position:relative;width:100%;height:100vh;min-height:600px;max-height:1000px;background:radial-gradient(ellipse 70% 55% at 50% 40%,#2c2620,#16120e 70%,#0c0a08 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.t-fullscreen .cn-inner{position:relative;z-index:2;text-align:center;padding:0 32px;transform:translateY(4%);}
.t-fullscreen .cn-names{font-family:'Noto Sans KR',sans-serif;font-size:29px;font-weight:450;letter-spacing:.5px;color:#fdf8f0;line-height:1.15;white-space:nowrap;}
.t-fullscreen .cn-mid{color:rgba(212,184,130,.78);font-weight:400;margin:0 8px;font-size:.7em;vertical-align:middle;}
.t-fullscreen .cn-filmlbl{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:4px;color:rgba(255,248,238,.62);text-transform:uppercase;margin-bottom:18px;}
.t-fullscreen .cn-when{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:18px;}
.t-fullscreen .cn-date{font-family:'Cormorant Garamond',serif;font-size:15.5px;letter-spacing:4px;color:rgba(255,248,238,.96);}
.t-fullscreen .cn-weekday{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:3px;color:rgba(212,184,130,.85);text-transform:uppercase;}
.t-fullscreen .cn-time{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:400;letter-spacing:1px;color:rgba(212,184,130,.82);}
/* 레터 미니멀형 (무사진, 100vh) */
.t-gold-serif .lt-stage{position:relative;width:100%;height:100vh;min-height:600px;max-height:1000px;background:linear-gradient(168deg,#f0e8d8,#e4d8c2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.t-gold-serif .lt-stage::before{content:'';position:absolute;inset:0;opacity:.5;background:repeating-linear-gradient(0deg,rgba(180,160,120,.04) 0,rgba(180,160,120,.04) 1px,transparent 1px,transparent 3px),radial-gradient(ellipse 66% 48% at 50% 30%,rgba(255,252,244,.7),transparent 62%);pointer-events:none;}
.t-gold-serif .lt-frame{position:relative;width:90%;background:linear-gradient(172deg,#fffdf8,#f7f0e2);box-shadow:0 6px 30px rgba(120,96,58,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 28px;text-align:center;z-index:2;}
.t-gold-serif .lt-frame::before{content:'';position:absolute;inset:9px;border:1.5px solid rgba(176,140,75,.4);pointer-events:none;}
.t-gold-serif .lt-frame::after{content:'';position:absolute;inset:14px;border:.5px solid rgba(176,140,75,.22);pointer-events:none;}

/* ===== 묶음2: 사진형 6개 약한 톤 보정 filter (원본 불변, 표시용) ===== */
.sig-photo img{filter:contrast(1.05) saturate(1.03) brightness(1.02) sepia(.04);}
.civ-photo img{filter:brightness(1.05) contrast(.97) saturate(.98);}

.t-flower .fl-photo img{filter:sepia(.08) saturate(1.04) brightness(1.03) contrast(.98);}

.t-minimal .stl-photo img{filter:contrast(1.1) saturate(.9);}
@media (max-width:380px){
  .t-black .bk-names,.t-flower .fl-names,.t-hanok .hk-names{font-size:25px;letter-spacing:3px;}

}

.t-classic-ivory .cls-paper{position:relative;text-align:center;}

.cls-names{font-family:'Noto Serif KR',serif;font-size:30px;font-weight:400;letter-spacing:6px;line-height:1.75;color:#2c2218;margin-top:18px;}

/* 5. minimal — 타이포 중심, 사진 적어도 예쁨 */
.t-minimal{background:#ffffff;color:#1a1a1a;}
.t-minimal .iv-cover{padding:84px 34px 64px;text-align:left;}
.t-minimal .iv-eyebrow{font-size:10px;letter-spacing:7px;color:#aaa;text-transform:uppercase;margin-bottom:24px;}
.t-minimal .iv-names{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;letter-spacing:-.5px;line-height:1.15;}

.t-minimal .iv-div{background:#1a1a1a;width:36px;height:1px;margin:28px 0;}
.t-minimal .iv-date{font-size:12px;letter-spacing:2.5px;color:#999;}

/* 6. gold-serif — 세리프 + 골드 포인트 */

.t-gold-serif .iv-names{font-family:'Noto Serif KR',serif;font-size:25px;font-weight:500;letter-spacing:5px;}
.t-gold-serif .iv-amp{font-family:'Cormorant Garamond',serif;font-style:italic;color:#b8945f;}
.t-gold-serif .iv-photo{width:148px;height:148px;border-radius:50%;border:2px solid #b8945f;padding:4px;background:var(--ivory);box-shadow:0 12px 36px -18px rgba(184,148,95,.6);}
.t-gold-serif .iv-photo img{border-radius:50%;}
.t-gold-serif .iv-div{background:linear-gradient(90deg,transparent,#b8945f,transparent);width:64px;}

.t-gold-serif .iv-sec-t{color:#9a7740;letter-spacing:5px;}

/* 7. fullscreen — 풀스크린 사진 + 오버레이 */
.t-fullscreen{background:#161616;color:#fff;}

.t-fullscreen .iv-cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.08) 52%,rgba(0,0,0,.2) 100%);}
.t-fullscreen .iv-cover-text{position:absolute;bottom:0;left:0;right:0;padding:34px 30px 40px;text-align:center;color:#fff;}
.t-fullscreen .iv-eyebrow{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:6px;opacity:.75;}
.t-fullscreen .iv-names{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;letter-spacing:2px;color:#fff;}
.t-fullscreen .iv-amp{font-style:italic;opacity:.85;}
.t-fullscreen .iv-div{background:rgba(255,255,255,.35);width:34px;}
.t-fullscreen .iv-date{font-size:12px;opacity:.7;letter-spacing:1.5px;}
.t-fullscreen .iv-sec{border-top:1px solid rgba(255,255,255,.08);background:#1a1a1a;}
.t-fullscreen .iv-sec-t{color:rgba(255,255,255,.45);letter-spacing:5px;}

.t-fullscreen .guest-item{background:rgba(255,255,255,.05);}
.t-fullscreen .guest-form input,.t-fullscreen .guest-form textarea,
.t-fullscreen .rsvp-form input,.t-fullscreen .rsvp-form select{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#eee;}
.t-fullscreen .rsvp-opt{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);}

/* 9. hanok — 한국적 차분한 무드 */
.t-hanok{background:linear-gradient(180deg,#f9f5ed,#efe6d2);color:#1e1a14;}
.t-hanok .iv-cover{padding:54px 30px 46px;text-align:center;position:relative;}
.t-hanok .iv-cover::before,.t-hanok .iv-cover::after{content:'';position:absolute;left:26px;right:26px;height:1px;background:linear-gradient(90deg,transparent,#8a7a50,transparent);}

.t-hanok .iv-cover::after{bottom:26px;}
.t-hanok .iv-eyebrow{font-family:'Noto Serif KR',serif;font-size:11px;letter-spacing:5px;color:#8a7a50;}
.t-hanok .iv-names{font-family:'Noto Serif KR',serif;font-size:27px;font-weight:500;letter-spacing:7px;}
.t-hanok .iv-amp{font-size:.68em;vertical-align:middle;letter-spacing:0;color:#8a7a50;}
.t-hanok .iv-photo{width:156px;height:156px;border-radius:4px;border:1px solid #c4b080;}
.t-hanok .iv-div{background:linear-gradient(90deg,transparent,#8a7a50,transparent);width:54px;}
.t-hanok .iv-sec-t{font-family:'Noto Serif KR',serif;letter-spacing:5px;color:#8a7a50;}

/* 10. flower 야외스냅형 — 자연광 야외 웨딩스냅 */

.t-flower .iv-eyebrow{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:6px;color:#c49080;}
.t-flower .iv-names{font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:700;letter-spacing:1px;}

.t-flower .iv-div{background:linear-gradient(90deg,transparent,#e0998a,transparent);width:54px;}
.t-flower .iv-sec{border-top:1px solid rgba(224,153,138,.22);}
.t-flower .iv-sec-t{color:#c49080;letter-spacing:4px;}

/* 11. black-premium — 블랙/골드 프리미엄 */
.t-black{background:linear-gradient(180deg,#141414,#080808);color:#d4c4a0;}
.t-black .iv-cover{padding:56px 30px 44px;text-align:center;}
.t-black .iv-eyebrow{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:7px;color:#a07840;text-transform:uppercase;}
.t-black .iv-names{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;letter-spacing:3px;color:#e8d8b0;}
.t-black .iv-amp{font-style:italic;color:#b8945f;}
.t-black .iv-photo{border:1px solid #b8945f;border-radius:4px;box-shadow:0 16px 44px -20px rgba(184,148,95,.5);}
.t-black .iv-div{background:linear-gradient(90deg,transparent,#b8945f,transparent);width:54px;}
.t-black .iv-date{color:#a0906a;font-size:12px;letter-spacing:2px;}
.t-black .iv-sec{border-top:1px solid rgba(184,148,95,.13);}
.t-black .iv-sec-t{color:#9a7440;letter-spacing:6px;}
.t-black .iv-msg,.t-black .iv-info{color:#f0e8d8;line-height:1.8;letter-spacing:.3px;}
.t-black .acc-row{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07);}
.t-black .guest-item{background:rgba(255,255,255,.04);}
.t-black .guest-form input,.t-black .guest-form textarea,
.t-black .rsvp-form input,.t-black .rsvp-form select{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#d4c4a0;}
.t-black .rsvp-opt{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);}

/* 공통 - 섹션 구분선 */
.iv-sec-divider{width:24px;height:1px;margin:0 auto 6px;opacity:.3;background:currentColor;}

/* 404 */
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;}
.not-found h2{font-family:var(--serif);font-size:24px;color:var(--brown);margin-bottom:12px;}
.not-found p{font-size:14px;color:var(--brown-mute);}

/* 워터마크 */
.watermark{position:static;transform:none;z-index:auto;margin:22px auto calc(20px + env(safe-area-inset-bottom,0px));width:fit-content;background:rgba(252,249,244,.92);border:1px solid var(--line);border-radius:999px;padding:9px 18px;display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--brown-mute);letter-spacing:.3px;}
.watermark b{color:var(--gold-deep);font-weight:500;}
.watermark a{color:var(--gold-deep);text-decoration:none;font-weight:500;}
.watermark.hidden{display:none;}

/* 플로팅 액션 버튼 */
.fab-wrap{position:fixed;bottom:20px;right:18px;z-index:100;display:flex;flex-direction:column;align-items:flex-end;gap:11px;}
.fab-main{width:54px;height:54px;border-radius:50%;background:var(--brown);color:var(--ivory);font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 26px -8px rgba(58,47,38,.5);transition:all .3s;cursor:pointer;border:none;}
.fab-main:hover{background:var(--gold-deep);transform:translateY(-2px);}
.fab-menu{display:flex;flex-direction:column;align-items:flex-end;gap:9px;opacity:0;pointer-events:none;transform:translateY(12px);transition:all .3s cubic-bezier(.2,.7,.2,1);}
.fab-menu.open{opacity:1;pointer-events:all;transform:none;}
.fab-item{display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:11px 18px;font-size:13px;color:var(--brown);box-shadow:var(--sh-sm);cursor:pointer;white-space:nowrap;transition:all .25s;letter-spacing:.3px;}
.fab-item:hover{background:var(--gold-wash);border-color:var(--gold);transform:translateX(-2px);}
.fab-item .fi{font-size:16px;}

/* QR 모달 */
.qr-ov{position:fixed;inset:0;background:rgba(20,16,12,.65);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s;}
.qr-ov.show{opacity:1;pointer-events:all;}
.qr-modal{background:var(--white);border-radius:24px;padding:36px 30px;text-align:center;max-width:320px;width:100%;box-shadow:0 26px 70px rgba(58,47,38,.16);}
.qr-modal h3{font-family:var(--serif);font-size:20px;color:var(--brown);margin-bottom:6px;font-weight:400;}
.qr-modal p{font-size:13px;color:var(--brown-mute);margin-bottom:20px;line-height:1.7;}
#qrCanvas{border-radius:12px;margin:0 auto 18px;display:block;}
.qr-modal .qr-url{font-size:11px;color:var(--brown-mute);background:var(--ivory-2);padding:10px;border-radius:8px;word-break:break-all;margin-bottom:18px;}
.qr-btns{display:flex;gap:10px;}
.qr-btns button{flex:1;padding:12px;border-radius:999px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
.qr-dl{background:var(--gold);color:#fff;border:none;}
.qr-dl:hover{background:var(--gold-deep);}
.qr-close-btn{background:transparent;border:1px solid var(--sand);color:var(--brown-soft);}
.qr-close-btn:hover{border-color:var(--gold);}

/* 달력 추가 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--brown);color:var(--ivory);padding:12px 24px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* === theme별 상세영역 디자인: 모든 theme 오버라이드보다 뒤(우선 적용) === */
/* ================================================================
   theme별 상세영역 디자인 (배경/글자/제목/구분선/버튼/카드 차별화)
   레이아웃·기능 불변, 색·스타일만
   ================================================================ */
/* 1. signature — 고급 웨딩 매거진: 화이트크림 배경, 진회색, 채움 버튼, 여백 넓게 */
#card.t-signature{background:#fdfbf7;}
.t-signature .iv-sec{background:#fdfbf7;border-top:none;padding:54px 32px;}
.t-signature .iv-sec-t{font-family:'Noto Serif KR',serif;color:#b89a6a;letter-spacing:6px;font-size:11px;}
.t-signature .iv-msg,.t-signature .iv-info{color:#3a352e;line-height:1.9;letter-spacing:.3px;}
.t-signature .iv-div{background:#d8c8a8;opacity:.5;width:28px;}
.t-signature .iv-chip{background:#3a352e;color:#fdfbf7;border:none;opacity:1;padding:12px 22px;}
.t-signature .iv-chip:hover{background:#5a5248;}
.t-signature .dday-num{color:#b89a6a;}

/* 2. classic-ivory — 깨끗한 스튜디오: 오프화이트, 다크그레이, 정석형 */
#card.t-classic-ivory{background:#f8f5ef;}
.t-classic-ivory .iv-sec{background:#f8f5ef;border-top:1px solid rgba(168,138,88,.14);padding:48px 32px;}
.t-classic-ivory .iv-sec-t{font-family:'Gowun Batang','Noto Serif KR',serif;color:#8a7350;letter-spacing:5px;font-size:13px;}
.t-classic-ivory .iv-msg,.t-classic-ivory .iv-info{color:#3c3630;line-height:1.95;letter-spacing:.2px;}
.t-classic-ivory .iv-div{background:#c0a878;opacity:.45;}
.t-classic-ivory .iv-chip{border:1px solid #a8895a;color:#7a6440;opacity:.85;}
.t-classic-ivory .iv-chip:hover{background:#a8895a;color:#fff;opacity:1;}
.t-classic-ivory .dday-num{color:#8a7350;}

/* 3. minimal(Fine Art) — 웨딩 화보집: 화이트, 매우 넓은 여백, 에디토리얼 제목, 본문 작게 */
#card.t-minimal{background:#ffffff;}
.t-minimal .iv-sec{background:#fff;border-top:1px solid #eee;padding:60px 38px;text-align:left;}
.t-minimal .iv-sec-t{font-family:'Noto Serif KR',serif;color:#4a3c2c;letter-spacing:6px;font-size:11px;font-weight:500;}
/* minimal 하단 3섹션: 여백 축소 + 제목 대비 강화 */
#card.t-minimal .rsvp-sec{padding-top:38px;padding-bottom:38px;}
#card.t-minimal .guest-sec{padding-top:36px;padding-bottom:36px;}
#card.t-minimal .acc-sec{padding-top:34px;padding-bottom:34px;}
#card.t-minimal .rsvp-sec .iv-sec-t,#card.t-minimal .guest-sec .iv-sec-t,#card.t-minimal .acc-sec .iv-sec-t{color:#322619;font-size:13px;letter-spacing:4px;text-align:center;}
#card.t-minimal .rsvp-sec .hk-sec-desc,#card.t-minimal .guest-sec .hk-sec-desc,#card.t-minimal .acc-sec .hk-sec-desc{text-align:center;margin-top:15px;margin-bottom:20px;}
/* minimal 하단 버튼 공통 규격 (알약 제거, 44px, radius3, 중앙) */
#card.t-minimal .hk-open-btn,#card.t-minimal .rsvp-submit,#card.t-minimal .guest-submit{box-sizing:border-box;width:min(100%,184px);min-height:44px;margin-left:auto;margin-right:auto;display:flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:3px;font-size:14px;font-weight:500;letter-spacing:.3px;box-shadow:none;cursor:pointer;}
/* RSVP 1차: 브론즈 채움 */
#card.t-minimal .rsvp-submit,#card.t-minimal .rsvp-sec .hk-open-btn{background:#897763;color:#faf6ee;border:1px solid #897763;opacity:1;}

#card.t-flower .iv-sec-t{font-family:'Noto Sans KR',sans-serif;color:#74785f;opacity:1;font-size:11.5px;font-weight:500;letter-spacing:2.4px;line-height:1.45;text-transform:uppercase;margin-bottom:12px;}
#card.t-flower .iv-msg,#card.t-flower .iv-info{color:#3f3d36;}
#card.t-flower .iv-msg{font-family:'Gowun Batang','Noto Serif KR',serif;font-weight:400;line-height:1.9;letter-spacing:.15px;}
#card.t-flower .iv-info{font-family:'Noto Sans KR',sans-serif;font-weight:400;line-height:1.8;letter-spacing:.1px;}
#card.t-flower .iv-map-label{color:#74785f;opacity:.72;}
#card.t-flower .iv-map .iv-chips{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;width:100%;max-width:292px;margin:12px auto 0;}
#card.t-flower .iv-map .iv-chip{width:100%;min-width:0;min-height:42px;display:flex;align-items:center;justify-content:center;padding:10px 5px;border:1px solid rgba(116,120,95,.46);border-radius:10px;background:rgba(255,255,255,.62);color:#5f634d;opacity:1;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:none;}
#card.t-flower .rsvp-submit,#card.t-flower .guest-submit{min-height:44px;padding:12px 18px;border:1px solid #74785f;border-radius:10px;background:#74785f;color:#fffef9;font-size:13.5px;font-weight:500;letter-spacing:.2px;opacity:1;box-shadow:none;}
#card.t-flower .rsvp-submit:hover,#card.t-flower .guest-submit:hover{background:#65694f;border-color:#65694f;}
#card.t-flower .rsvp-opt,#card.t-flower .rsvp-form input,#card.t-flower .rsvp-form select,#card.t-flower .rsvp-form textarea,#card.t-flower .guest-form input,#card.t-flower .guest-form textarea{border:1px solid rgba(116,120,95,.27);border-radius:10px;background:rgba(255,255,255,.66);color:#3f3d36;box-shadow:none;}
#card.t-flower .rsvp-opt.on{background:#74785f;color:#fffef9;border-color:#74785f;}
#card.t-flower .rsvp-form input:focus,#card.t-flower .rsvp-form select:focus,#card.t-flower .rsvp-form textarea:focus,#card.t-flower .guest-form input:focus,#card.t-flower .guest-form textarea:focus{border-color:#8b8f74;background:#fffef9;outline:none;}
#card.t-flower .guest-item{background:#f3f1e9;border:1px solid rgba(116,120,95,.10);border-radius:10px;box-shadow:none;}
#card.t-flower .acc-toggle{width:100%;min-height:44px;border:1px solid rgba(116,120,95,.48);border-radius:10px;background:rgba(255,255,255,.58);color:#5f634d;opacity:1;font-size:13px;font-weight:500;letter-spacing:.2px;box-shadow:none;}
#card.t-flower .acc-row{background:#f3f1e9;border:1px solid rgba(116,120,95,.10);border-radius:10px;box-shadow:none;}
#card.t-flower .acc-copy{border:1px solid rgba(116,120,95,.28);border-radius:8px;background:rgba(116,120,95,.10);color:#5f634d;opacity:1;box-shadow:none;}
#card.t-flower .dday-figure{color:#65694f;}
#card.t-flower .dday-date{color:#797a6d;opacity:.68;}
#card.t-flower .iv-foot{background:#f0eee5;color:rgba(63,61,54,.46);opacity:1;}
/* ===== flower 야외스냅형 갤러리 2차 — 비대칭 자연광 화보 배열 ===== */
/* 갤러리 섹션 좌우 패딩 소폭 축소(사진 호흡) */
#card.t-flower .iv-sec.iv-gal-sec{padding-left:24px;padding-right:24px;}
/* masonry → 12열 비대칭 그리드 (HTML 불변, grid-column/nth-child만) */
#card.t-flower .iv-gal-masonry{grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-flow:row dense;gap:8px;align-items:start;}
/* 공통 3n+1 비율 규칙 무력화 + 6n 패턴 재정의 (구체성 우위) */
#card.t-flower .iv-gal-masonry .g{border-radius:6px;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+1){grid-column:span 7;aspect-ratio:4/5;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+2){grid-column:span 5;aspect-ratio:1;margin-top:20px;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+3){grid-column:span 12;aspect-ratio:3/2;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+4){grid-column:span 5;aspect-ratio:1;margin-top:20px;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+5){grid-column:span 7;aspect-ratio:4/5;}
#card.t-flower .iv-gal-masonry .g:nth-child(6n+6){grid-column:span 12;aspect-ratio:5/4;}
/* 마지막 사진이 6n+1/6n+4(단독 잔류)면 가로 전체로 채움 */
#card.t-flower .iv-gal-masonry .g:last-child:nth-child(6n+1),#card.t-flower .iv-gal-masonry .g:last-child:nth-child(6n+4){grid-column:span 12;margin-top:0;aspect-ratio:3/2;}
/* grid(정사각 .iv-gal)/full 선택 시에도 flower 팔레트 유지 */
#card.t-flower .iv-gal{gap:8px;}
#card.t-flower .iv-gal .g,#card.t-flower .iv-gal-full .g{border-radius:6px;}
#card.t-flower .iv-gal-full{gap:10px;}
/* 더보기·접기 버튼: 올리브 팔레트 + 중앙 짧은 장식선 */
#card.t-flower .gal-more-btn{color:#65694f;padding-top:16px;}
#card.t-flower .gal-more-btn::before{content:'';display:block;width:38px;height:1px;background:rgba(116,120,95,.28);margin:0 auto 14px;}
#card.t-flower .gal-more-btn:hover{color:#797a6d;}
/* 시네마 → 영화 타이틀: 자간 크게, 제목 존재감 강하게 */
#card.t-fullscreen .cn-names{font-size:29px;letter-spacing:.5px;font-weight:450;line-height:1.15;}
#card.t-fullscreen .cn-date{font-size:12px;letter-spacing:7px;}
/* 레터 → 실제 초대장: 이름과 문구 균형(크기 차이 축소), 자간 절제 */
#card.t-gold-serif .lt-names{font-size:29px;letter-spacing:4px;font-weight:400;line-height:1.3;}
#card.t-gold-serif .lt-msg{font-size:14px;line-height:1.85;}
#card.t-gold-serif .lt-date{font-size:14px;letter-spacing:3px;}
/* ===== 배경 연출 (배경 연출 엔진, 첫 화면 한정) ===== */
.ambient-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;opacity:1;transition:opacity .6s ease;}
.ambient-layer.amb-hidden{opacity:0;}
.ambient-layer.amb-hidden .ambient-particle{animation-play-state:paused;}
.ambient-particle{position:absolute;top:-10%;border-radius:50%;will-change:top,transform,opacity;}
/* 겨울눈: 작은 흰 원, top 기반으로 첫 화면 전체 낙하 + 좌우 흔들림 */
.ambient-winter-snow .ambient-particle{background:radial-gradient(circle,rgba(255,255,255,.92),rgba(255,255,255,.4));box-shadow:0 0 3px rgba(255,255,255,.4);animation:ambSnowFall linear infinite,ambSnowSway ease-in-out infinite alternate;}
@keyframes ambSnowFall{0%{top:-10%;opacity:0;}10%{opacity:var(--amb-op,.5);}90%{opacity:var(--amb-op,.5);}100%{top:110%;opacity:0;}}
@keyframes ambSnowSway{0%{transform:translateX(calc(var(--amb-sway,6px) * -1));}100%{transform:translateX(var(--amb-sway,6px));}}
/* 골드 더스트: 입자는 이동+fade(opacity), 반짝임은 ::after의 scale/brightness만 (opacity 충돌 제거) */
.ambient-gold-dust .ambient-particle{background:none;animation:ambDustFloat linear infinite;}
.ambient-gold-dust .ambient-particle::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,var(--amb-core,rgba(255,225,145,.95)) 0%,var(--amb-edge,rgba(196,136,44,.35)) 70%,transparent 100%);box-shadow:0 0 var(--amb-glow,5px) var(--amb-glowc,rgba(212,170,90,.5));animation:ambDustTwinkle ease-in-out infinite;transform-origin:center;}
@keyframes ambDustFloat{0%{top:-10%;transform:translateX(0);opacity:0;}14%{opacity:var(--amb-op,.6);}86%{opacity:var(--amb-op,.6);}100%{top:110%;transform:translateX(var(--amb-drift,8px));opacity:0;}}
@keyframes ambDustTwinkle{0%,100%{transform:scale(.82);filter:brightness(.9);}50%{transform:scale(1.08);filter:brightness(1.15);}}
/* 배경 연출: gold-serif 카드 프레임 내부 텍스트는 입자 위 */
.t-gold-serif .lt-frame>*{position:relative;z-index:2;}
.t-gold-serif .lt-frame>.ambient-layer.ambient-layer{z-index:1;}
/* === 진주 보케: 큰 원형 blur, 느리게 부유 === */
.ambient-pearl-bokeh .ambient-particle{background:radial-gradient(circle,var(--amb-core,rgba(255,252,248,.5)),var(--amb-edge,rgba(238,230,224,.18)) 60%,transparent 75%);box-shadow:var(--amb-ring,none);filter:blur(1.5px);animation:ambBokehFloat linear infinite,ambBokehPulse ease-in-out infinite;}
@keyframes ambBokehFloat{0%{top:-12%;transform:translateX(0);opacity:0;}20%{opacity:var(--amb-op,.4);}80%{opacity:var(--amb-op,.4);}100%{top:112%;transform:translateX(var(--amb-drift,8px));opacity:0;}}
@keyframes ambBokehPulse{0%,100%{transform:scale(.9);}50%{transform:scale(1.06);}}
/* === 필름 더스트: 미세 그레인, 거의 정적 === */
.ambient-film-dust .ambient-particle{background:var(--amb-core,rgba(255,250,240,.6));border-radius:50%;animation:ambGrainDrift linear infinite,ambGrainFlick steps(3) infinite;}
@keyframes ambGrainDrift{0%{top:-6%;opacity:0;}25%{opacity:var(--amb-op,.3);}75%{opacity:var(--amb-op,.3);}100%{top:106%;opacity:0;}}
@keyframes ambGrainFlick{0%{transform:translateX(0);}33%{transform:translateX(1.5px);}66%{transform:translateX(-1.5px);}100%{transform:translateX(0);}}
@media (prefers-reduced-motion:reduce){.ambient-layer{display:none!important;}}

/* ===== 2차 모바일 첫 화면 높이 정상화 (커버 stage만, 데스크톱·크롭·디자인 무변경) =====
   원인1: 100vh가 모바일 주소창 포함 높이라 실표시영역 초과 → dvh/svh 사용(vh fallback 유지)
   원인2: min-height:600px가 작은 화면(예:320×568)에서 화면을 초과 → 모바일에서 완화 */
@media (max-width:768px){
  .sig-hero,
  .t-classic-ivory .civ-stage,
  .t-black .bk-stage,
  .t-flower .fl-hero,
  .t-hanok .hk-stage,
  .t-minimal .stl-stage,
  .t-fullscreen .cn-stage,
  .t-gold-serif .lt-stage{
    box-sizing:border-box;
    height:100vh;        /* fallback */
    height:100svh;       /* 주소창 펼쳐진 안정 높이 */
    min-height:0;        /* 600px 고정 제거: 작은 화면 초과 방지 */
    max-height:none;     /* 1000px 상한이 모바일 dvh 계산을 방해하지 않도록 */
  }
}
/* dvh 지원 브라우저에서는 동적 viewport 높이 사용 (주소창 접힘/펼침 반영) */
@supports (height:100dvh){
  @media (max-width:768px){
    .sig-hero,
    .t-classic-ivory .civ-stage,
    .t-black .bk-stage,
    .t-flower .fl-hero,
    .t-hanok .hk-stage,
    .t-minimal .stl-stage,
    .t-fullscreen .cn-stage,
    .t-gold-serif .lt-stage{ height:100dvh; }
  }
}
/* flower는 #card.t-flower .fl-hero (1019행, #card specificity)가 별도로 적용되므로
   모바일에서 동일 specificity로 높이 정상화 (데스크톱 -24px 여백 규칙은 유지) */
@media (max-width:768px){
  #card.t-flower .fl-hero{
    box-sizing:border-box;
    height:100vh; height:100svh;
    min-height:0; max-height:none;
  }
}
@supports (height:100dvh){
  @media (max-width:768px){
    #card.t-flower .fl-hero{ height:100dvh; }
  }
}

/* ===== 2차 재수정: 모바일 커버 바깥 wrapper(.iv-cover) 충돌 제거 =====
   내부 stage는 100svh/100dvh로 정상화됐으나, 바깥 .iv-cover에 과거 템플릿의
   padding / min-height / max-height / overflow / 장식 pseudo-element가 남아
   outer 높이가 viewport를 초과(black·hanok 100px, minimal 148px, gold-serif 124px,
   flower 24px)하거나 fullscreen은 max-height:520+overflow:hidden로 내부 stage를 잘랐다.
   모바일에서만 outer wrapper를 초기화한다(데스크톱·내부 stage 디자인 무변경). */
@media (max-width:768px){
  #card.t-signature > .iv-cover,
  #card.t-classic-ivory > .iv-cover,
  #card.t-hanok > .iv-cover,
  #card.t-black > .iv-cover,
  #card.t-fullscreen > .iv-cover,
  #card.t-minimal > .iv-cover,
  #card.t-flower > .iv-cover,
  #card.t-gold-serif > .iv-cover{
    box-sizing:border-box;
    width:100%;
    height:auto;
    min-height:0;
    max-height:none;
    padding:0;
    overflow:visible;
  }
  /* gold-serif: 외부 높이를 만들던 border-bottom 제거 */
  #card.t-gold-serif > .iv-cover{ border-bottom:0; }
  /* hanok/gold-serif: 외부 높이에 기여하는 장식 pseudo-element 제거 (내부 stage 디자인엔 영향 없음) */
  #card.t-hanok > .iv-cover::before,
  #card.t-hanok > .iv-cover::after,
  #card.t-gold-serif > .iv-cover::before{
    content:none;
    display:none;
  }
}


/* ===== 공통 모바일 동작 엔진 보강 ===== */
[data-action]{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.acc-list{display:none;}
.acc-box.is-open .acc-list{display:flex;}
.load-retry-btn{margin-top:18px;padding:12px 22px;border:1px solid currentColor;border-radius:999px;background:transparent;color:inherit;font:inherit;cursor:pointer;touch-action:manipulation;}
.tap-active{filter:brightness(.96);}

/* ===== 최종 판매본 기능 안정화: 디자인 비변경 ===== */
.rsvp-sec,.guest-sec,.acc-sec,.iv-gal-sec{content-visibility:visible;contain-intrinsic-size:auto;}
.acc-box{display:block;width:100%;}
.acc-list[hidden]{display:none!important;}
.acc-toggle{appearance:none;-webkit-appearance:none;cursor:pointer;}
.fab-wrap{bottom:max(16px,env(safe-area-inset-bottom,0px));right:max(12px,env(safe-area-inset-right,0px));transition:opacity .2s ease,transform .2s ease;}
.fab-wrap.fab-suppressed{opacity:0;pointer-events:none;transform:translateY(12px);}
.fab-wrap.fab-suppressed .fab-menu{pointer-events:none!important;}
body.modal-open{overflow:hidden;touch-action:none;}
@media(max-width:480px){
  .fab-main{width:46px;height:46px;font-size:19px;}
  .fab-item{min-height:42px;padding:10px 15px;font-size:12.5px;}
  .toast{bottom:max(74px,calc(58px + env(safe-area-inset-bottom,0px)));max-width:calc(100vw - 32px);white-space:normal;text-align:center;}
  .qr-ov{padding:16px max(14px,env(safe-area-inset-right,0px)) max(16px,env(safe-area-inset-bottom,0px)) max(14px,env(safe-area-inset-left,0px));}
  .qr-modal{max-height:calc(100dvh - 32px);overflow:auto;-webkit-overflow-scrolling:touch;}
}
@media(prefers-reduced-motion:reduce){.fab-wrap,.fab-menu,.toast,.qr-ov{transition:none!important;}}
/* editor 최종본과 동일한 Signature 이름 구조: 기본 한 줄, 폭 초과 때만 fitName이 사람 단위 2줄 전환 */
#card.t-signature .sig-textwrap{display:block;width:100%;max-width:100%;}
#card.t-signature .sig-names{display:inline-block;max-width:84%;margin:0 auto;white-space:nowrap;font-family:'Noto Serif KR',serif;font-size:28px;font-weight:500;line-height:1.12;letter-spacing:.02em;text-align:center;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.28);}
#card.t-signature .sig-names .nm-person{display:inline-block;white-space:nowrap;}
#card.t-signature .sig-names .sig-dot{display:inline-block;font-size:8px;line-height:1;opacity:.72;margin:0 10px;vertical-align:middle;}
#card.t-signature .sig-names.nm-twoline .nm-person{display:block;}
/* 320×568급 초소형 화면: black 정보 패널이 하단을 넘지 않도록 사진/여백만 최소 조정 */
@media (max-width:768px) and (max-height:620px){
  #card.t-black .bk-photo-area{flex-basis:74%;}
  #card.t-black .bk-info{gap:11px;padding:0 24px calc(36px + env(safe-area-inset-bottom,0px));}
  #card.t-black .bk-when{margin-bottom:8px;gap:5px;}
}



/* ===== 계좌 정보 중앙 정렬 안정화 =====
   계좌 텍스트는 카드 정중앙, 복사 버튼은 우측 고정.
   버튼 폭 때문에 계좌명이 왼쪽으로 밀리지 않도록 3열 그리드 사용. */
.acc-list{width:100%;max-width:100%;margin-left:auto;margin-right:auto;}
.acc-row{
  display:grid!important;
  grid-template-columns:58px minmax(0,1fr) 58px;
  align-items:center;
  justify-items:center;
  gap:8px;
  width:100%;
}
.acc-info{
  grid-column:2;
  min-width:0;
  width:100%;
  align-items:center!important;
  text-align:center!important;
}
.acc-side,.acc-bank,.acc-num{
  display:block;
  width:100%;
  text-align:center!important;
  overflow-wrap:anywhere;
  word-break:keep-all;
}
.acc-copy{
  grid-column:3;
  justify-self:end;
  margin:0!important;
}
@media(max-width:360px){
  .acc-row{grid-template-columns:50px minmax(0,1fr) 50px;padding-left:10px;padding-right:10px;}
  .acc-copy{padding-left:10px!important;padding-right:10px!important;}
}
</style>

<body>

<!-- 로딩 -->
<div id="loading">
  <div class="loading-logo" aria-hidden="true">✦</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<!-- 오프닝 오버레이 (theme별 내용은 playOpening에서 주입) -->
<div class="op-overlay" id="opOverlay"></div>

<!-- 청첩장 본체 -->
<div id="card"></div>

<!-- 갤러리 라이트박스 -->
<div class="lightbox" id="lb">
  <button type="button" class="lb-close" data-action="close-lightbox" aria-label="닫기">×</button>
  <button type="button" class="lb-nav lb-prev" data-action="lightbox-step" data-delta="-1" aria-label="이전">‹</button>

  <button type="button" class="lb-nav lb-next" data-action="lightbox-step" data-delta="1" aria-label="다음">›</button>

<!-- 플로팅 액션 버튼 -->
<div class="fab-wrap">
  <div class="fab-menu" id="fabMenu">
    <div class="fab-item" id="bgmFabItem" style="display:none" role="button" tabindex="0" data-action="toggle-bgm"><span class="fi">♫</span><span id="bgmFabLabel">음악 재생</span></div>
    <div class="fab-item" role="button" tabindex="0" data-action="share-kakao"><span class="fi">💛</span>카카오톡 공유하기</div>
    <div class="fab-item" role="button" tabindex="0" data-action="copy-link"><span class="fi">🔗</span>링크 복사</div>

    <div class="fab-item" role="button" tabindex="0" data-action="open-edit"><span class="fi">✏️</span>수정하기</div>
  </div>
  <button class="fab-main" id="fabMain" type="button" aria-label="청첩장 메뉴" aria-expanded="false" data-action="toggle-fab">⋯</button>

<script>

/* ===== 내장 Supabase REST 클라이언트 =====
   외부 SDK CDN이 차단되거나 느린 모바일 환경에서도 발행·조회·기능이 멈추지 않도록
   프로젝트에서 실제 사용하는 RPC/insert/storage 기능만 fetch로 직접 제공한다. */
function createWeddingApiClient(baseUrl, apiKey){
  const base=String(baseUrl||'').replace(/\/+$/,'');
  const authHeaders={apikey:apiKey,Authorization:`Bearer ${apiKey}`};
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  async function request(path,options={},retryCount=1){
    const method=options.method||'POST';
    const timeout=Number(options.timeout||15000);
    let lastError=null;
    for(let attempt=0;attempt<=retryCount;attempt++){
      const ctrl=typeof AbortController!=='undefined'?new AbortController():null;
      const timer=ctrl?setTimeout(()=>ctrl.abort(),timeout):null;
      try{
        const headers={...authHeaders,...(options.headers||{})};
        if(options.body!=null && !(options.body instanceof Blob) && !(options.body instanceof FormData) && !headers['Content-Type']) headers['Content-Type']='application/json';
        const res=await fetch(base+path,{method,headers,body:options.body,signal:ctrl?.signal,cache:'no-store'});
        const text=await res.text();
        let data=null;
        if(text){try{data=JSON.parse(text);}catch(e){data=text;}}
        if(!res.ok){
          const msg=(data&&typeof data==='object'&&(data.message||data.error_description||data.error))||`서버 오류 (${res.status})`;
          lastError={message:String(msg),status:res.status,details:data};
          if(res.status>=500 && attempt<retryCount){await sleep(350*(attempt+1));continue;}
          return {data:null,error:lastError};
        }
        return {data,error:null};
      }catch(err){
        lastError={message:err?.name==='AbortError'?'서버 응답 시간이 초과되었습니다.':(err?.message||'네트워크 연결 오류'),cause:err};
        if(attempt<retryCount){await sleep(350*(attempt+1));continue;}
        return {data:null,error:lastError};
      }finally{if(timer)clearTimeout(timer);}
    }
    return {data:null,error:lastError||{message:'알 수 없는 서버 오류'}};
  }
  const encodePath=p=>String(p||'').split('/').map(encodeURIComponent).join('/');
  return {
    rpc(name,args){return request(`/rest/v1/rpc/${encodeURIComponent(name)}`,{body:JSON.stringify(args||{}),timeout:18000},2);},
    from(table){
      const t=encodeURIComponent(table);
      return {
        insert(payload){return request(`/rest/v1/${t}`,{body:JSON.stringify(payload),headers:{Prefer:'return=minimal'},timeout:15000},1);}
      };
    },
    storage:{
      from(bucket){
        const b=encodeURIComponent(bucket);
        return {
          upload(path,file,opts={}){
            const headers={'Content-Type':opts.contentType||file?.type||'application/octet-stream','x-upsert':opts.upsert?'true':'false','cache-control':opts.cacheControl||'31536000'};
            return request(`/storage/v1/object/${b}/${encodePath(path)}`,{method:'POST',headers,body:file,timeout:60000},1);
          },
          getPublicUrl(path){return {data:{publicUrl:`${base}/storage/v1/object/public/${b}/${encodePath(path)}`}};}
        };
      }
    }
  };
}

  const sep=el.querySelector('.nm-sep');
  if(sep){sep.style.margin='';sep.style.fontSize='';}
  const over=()=>el.scrollWidth>el.clientWidth+1;
  if(!over())return;
  const baseFs=parseFloat(getComputedStyle(el).fontSize)||30;
  const baseLs=parseFloat(getComputedStyle(el).letterSpacing)||0;
  for(const ls of [baseLs*0.6,baseLs*0.3,0,baseFs*-0.02,baseFs*-0.04]){el.style.letterSpacing=ls+'px';if(!over())return;}
  if(isVertical){
    /* 세로구조: 구분자 간격/2줄 단계 없이 font-size만 단계 축소(최대 ~18%) */
    for(const f of [0.94,0.88,0.82]){el.style.fontSize=(baseFs*f)+'px';if(!over())return;}

}
