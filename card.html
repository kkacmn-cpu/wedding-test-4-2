/* 갤러리 */
var _lbIndex=0;
var _lbPrevOverflow=null; /* 라이트박스 열기 전 body overflow 저장 */
function openLb(arg){
  var urls=window._lbUrls||[];
  var idx=0;
  if(typeof arg==='number')idx=arg;
  else { var f=urls.indexOf(arg); idx=f>=0?f:0; } /* src 호환 */
  if(!urls.length)return;
  _lbIndex=(idx+urls.length)%urls.length;
  _lbRender();
  document.getElementById('lb').classList.add('show');
  /* 배경 페이지 스크롤 잠금 (현재 overflow 저장 후 hidden) */
  if(_lbPrevOverflow===null){ _lbPrevOverflow=document.body.style.overflow||''; }
  document.body.style.overflow='hidden';
}
function _lbRender(){
  var urls=window._lbUrls||[];
  if(!urls.length)return;
  var img=document.getElementById('lbImg');
  if(img)img.src=urls[_lbIndex];
  var c=document.getElementById('lbCounter');
  if(c)c.textContent=(_lbIndex+1)+' / '+urls.length;
  var multi=urls.length>1;
  var p=document.querySelector('.lb-prev'), n=document.querySelector('.lb-next');
  if(p)p.style.display=multi?'flex':'none';
  if(n)n.style.display=multi?'flex':'none';
}
function lbStep(dir){
  var urls=window._lbUrls||[];
  if(!urls.length)return;
  _lbIndex=(_lbIndex+dir+urls.length)%urls.length; /* 순환 */
  _lbRender();
}
function closeLb(){
  var lb=document.getElementById('lb');
  if(lb)lb.classList.remove('show');
  /* 배경 스크롤 복원 (저장된 값으로, 누적·재진입 안전) */
  if(_lbPrevOverflow!==null){ document.body.style.overflow=_lbPrevOverflow; _lbPrevOverflow=null; }
  else { document.body.style.overflow=''; }
}
/* 키보드 ←/→/ESC */
document.addEventListener('keydown',function(e){
  var lb=document.getElementById('lb');
  if(!lb||!lb.classList.contains('show'))return;
  if(e.key==='ArrowLeft')lbStep(-1);
  else if(e.key==='ArrowRight')lbStep(1);
  else if(e.key==='Escape')closeLb();
});
/* 모바일 좌우 스와이프 */
(function(){
  var sx=0,sy=0,tracking=false;
  var lb=document.getElementById('lb');
  if(!lb)return;
  lb.addEventListener('touchstart',function(e){
    if(e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;
  },{passive:true});
  lb.addEventListener('touchend',function(e){
    if(!tracking)return;tracking=false;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){ lbStep(dx<0?1:-1); }
  },{passive:true});
})();
/* 배경 클릭 시 닫기 (이미지/버튼 클릭은 제외) */
(function(){
  var lb=document.getElementById('lb');
  if(!lb)return;
  lb.addEventListener('click',function(e){ if(e.target===lb)closeLb(); });
})();
/* 갤러리 하이드레이션: 저장된 URL을 즉시 렌더하고, 실패한 이미지만 개별 제거한다.
   - 8초 일괄 타임아웃 제거: 느린 정상 사진을 실패로 오판하지 않음
   - 최초 9장은 즉시 로드, 나머지는 더보기 후 지연 로드
   - 더보기 숫자와 라이트박스 목록은 현재 정상 URL 기준으로 유지 */
var _galGen=0;
var _galleryActiveItems=[];
function _renderGalleryActive(myGen){
  if(myGen!==_galGen)return;
  var sec=document.getElementById('galSec');
  var wrap=document.getElementById('galWrap');
  if(!sec||!wrap||!document.body.contains(wrap))return;
  if(!_galleryActiveItems.length){sec.style.display='none';window._lbUrls=[];return;}

  window._lbUrls=_galleryActiveItems.map(function(it){return it.url;});
  wrap.innerHTML=_galleryActiveItems.map(function(it,i){
    var loading=i<9?'eager':'lazy';
    var priority=i<3?' fetchpriority="high"':'';
    return '<div class="g'+(i>=9?' g-more':'')+'" data-gkey="'+it.key+'" onclick="openLb('+i+')">'
      +'<img src="'+esc(it.url)+'" alt="갤러리" loading="'+loading+'" decoding="async"'+priority+'/></div>';
  }).join('');

  var oldBtn=sec.querySelector('.gal-more-btn');
  if(oldBtn)oldBtn.parentNode.removeChild(oldBtn);
  var moreN=_galleryActiveItems.length-9;
  if(moreN>0){
    var btn=document.createElement('button');
    btn.type='button';btn.className='gal-more-btn';
    var moreHtml="<span class='gm-deco'></span><span class='gm-1'>사진 더보기</span><span class='gm-2'>사진 <span class='gm-count'>"+moreN+"장</span> 더 보기</span>";
    var lessHtml="<span class='gm-deco'></span><span class='gm-1'>사진 접기</span><span class='gm-2'>처음 화면으로 돌아갑니다</span>";
    btn.setAttribute('data-more',moreHtml);
    btn.setAttribute('data-less',lessHtml);
    btn.setAttribute('onclick','galMore(this)');
    btn.innerHTML=moreHtml;
    sec.appendChild(btn);
  }

  wrap.querySelectorAll('img').forEach(function(img){
    img.addEventListener('error',function(){
      if(myGen!==_galGen)return;
      var cell=img.closest('.g');
      var key=cell&&cell.getAttribute('data-gkey');
      var before=_galleryActiveItems.length;
      _galleryActiveItems=_galleryActiveItems.filter(function(it){return it.key!==key;});
      if(_galleryActiveItems.length!==before)_renderGalleryActive(myGen);
    },{once:true});
  });
  sec.style.display='';
}
function hydrateGallery(){
  var myGen=++_galGen;
  var sec=document.getElementById('galSec');
  var wrap=document.getElementById('galWrap');
  if(!sec||!wrap)return;
  var urls;
  try{urls=JSON.parse(sec.getAttribute('data-gallery')||'[]');}catch(e){urls=[];}
  if(!Array.isArray(urls)){urls=[];}
  var seen={};
  _galleryActiveItems=[];
  urls.forEach(function(u,i){
    if(typeof u!=='string'||!/^https?:\/\//i.test(u))return;
    if(seen[u])return;
    seen[u]=1;
    _galleryActiveItems.push({key:'g'+myGen+'_'+i,url:u});
  });
  _renderGalleryActive(myGen);
}
function galMore(btn){
  var w=btn.parentNode.querySelector('.iv-gal-wrap');if(!w)return;
  var expanded=w.classList.toggle('gal-expanded');
  if(expanded){ btn.innerHTML=btn.getAttribute('data-less'); }
  else { btn.innerHTML=btn.getAttribute('data-more'); var sec=btn.closest('.iv-sec'); if(sec&&sec.scrollIntoView)sec.scrollIntoView({behavior:'smooth',block:'start'}); }
}

/* 공유용 URL: Vercel SSR API 주소.
   정적 card.html이 아니라 서버가 카드별 OG 태그를 먼저 응답한 뒤 실제 카드로 이동한다. */
function getCardOptions(data){
  const raw=data&&data.options;
  if(raw&&typeof raw==='object')return raw;
  if(typeof raw==='string'){try{return JSON.parse(raw)||{};}catch(_){return {};}}
  return {};
}
function getShareVersion(data){
  const opts=getCardOptions(data);
  if(opts.share_image_version)return String(opts.share_image_version);
  const raw=data?.updated_at||data?.created_at||'';
  if(raw){
    const t=Date.parse(raw);
    if(Number.isFinite(t))return String(t);
  }
  /* 대표사진 파일명에 포함된 업로드 시각(main_171234...)을 캐시 버전으로 재사용 */
  const photo=String(data?.main_photo_url||'');
  const m=photo.match(/(?:main_|gal_)(\d{10,})/);
  return m?m[1]:'';
}
function getShareUrl(){
  if(!slug)return location.href;
  const u=new URL('/api/wedding-share',SHARE_API_BASE);
  u.searchParams.set('slug',slug);
  const version=getShareVersion(window._cardData);
  if(version)u.searchParams.set('v',version);
  return u.href;
}

/* ===== 카카오 공유 (SDK 방식) =====
   원칙:
   - og:image는 HTML 고정값 (JS로 변경 안 함)
   - 카카오 공유 썸네일은 sendDefault의 imageUrl로만 결정
   - imageUrl 우선순위: 대표사진 → 갤러리 → 기본 썸네일(og-default.jpg)
*/
/* 카카오 공유 이미지: 검증된 http URL만 사용, 아니면 기본 썸네일
   - http/https 아니면 제외
   - null/undefined/빈값 → 기본 썸네일
   - blob/data/상대경로/DOM이미지/signed URL 사용 안 함 */
function getSafeImageUrl(data){
  const DEFAULT=new URL('/og-default.jpg',SHARE_API_BASE).href;
  const opts=getCardOptions(data);
  const firstGallery=Array.isArray(data?.gallery_urls)?data.gallery_urls.find(u=>typeof u==='string'&&/^https?:\/\//i.test(u)):'';
  const url=opts.share_image_url||data?.main_photo_url||data?.cover_image||firstGallery||DEFAULT;
  if(typeof url!=='string'||!/^https?:\/\//i.test(url))return DEFAULT;
  return url;
}

/* ===== 달력 저장 (.ics) ===== */
function _icsEsc(v){return String(v||'').replace(/\\/g,'\\\\').replace(/\r?\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');}
function _icsLocalStamp(date){
  const z=n=>String(n).padStart(2,'0');
  return date.getFullYear()+z(date.getMonth()+1)+z(date.getDate())+'T'+z(date.getHours())+z(date.getMinutes())+z(date.getSeconds());
}
function _icsUtcStamp(date){
  const z=n=>String(n).padStart(2,'0');
  return date.getUTCFullYear()+z(date.getUTCMonth()+1)+z(date.getUTCDate())+'T'+z(date.getUTCHours())+z(date.getUTCMinutes())+z(date.getUTCSeconds())+'Z';
}
function _parseWeddingDateTime(dateText,timeText){
  const dm=/^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateText||''));
  const tm=/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.exec(String(timeText||'12:00'));
  if(!dm||!tm)return null;
  const y=Number(dm[1]),m=Number(dm[2]),d=Number(dm[3]);
  const hh=Number(tm[1]),mm=Number(tm[2]),ss=Number(tm[3]||0);
  if(m<1||m>12||d<1||d>31||hh<0||hh>23||mm<0||mm>59||ss<0||ss>59)return null;
  const out=new Date(y,m-1,d,hh,mm,ss);
  if(out.getFullYear()!==y||out.getMonth()!==m-1||out.getDate()!==d||out.getHours()!==hh||out.getMinutes()!==mm||out.getSeconds()!==ss)return null;
  return out;
}
function addCalendar(){
  const d=window._cardData;
  if(!d||!d.wedding_date){showToast('예식 날짜 정보가 없어요');return;}
  const start=_parseWeddingDateTime(d.wedding_date,d.wedding_time||'12:00');
  if(!start){showToast('예식 날짜 정보를 확인해 주세요');return;}
  const end=new Date(start.getTime()+60*60*1000);
  const title=`${d.groom_name||'신랑'} ♥ ${d.bride_name||'신부'} 결혼식`;
  const loc=(d.venue_name||'')+(d.venue_address?' '+d.venue_address:'');
  const uid=(d.id||d.slug||'wedding')+'@memoryretouch';
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN','METHOD:PUBLISH','PRODID:-//MemoryRetouch//Wedding//KO',
    'BEGIN:VEVENT',
    `UID:${_icsEsc(uid)}`,`DTSTAMP:${_icsUtcStamp(new Date())}`,
    `DTSTART:${_icsLocalStamp(start)}`,`DTEND:${_icsLocalStamp(end)}`,
    `SUMMARY:${_icsEsc(title)}`,`LOCATION:${_icsEsc(loc)}`,
    `DESCRIPTION:${_icsEsc(getShareUrl())}`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='wedding.ics';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(a.href);
  showToast('달력 파일이 다운로드됐어요 📅');
  if(_fabOpen)toggleFab();
}

/* ===== QR 코드 생성 (안정화) ===== */
/* qrcodejs는 내부적으로 canvas 또는 img를 동적 생성함
   → canvas 고정 ID 대신 div 컨테이너를 사용해 안정적으로 처리 */
function showQR(){
  const url=getShareUrl();
  const urlEl=document.getElementById('qrUrl');
  if(urlEl)urlEl.textContent=url;
  const container=document.getElementById('qrContainer');
  if(!container)return;
  /* 이전 QR 초기화 */
  container.innerHTML='';
  if(!window.QRCode){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=()=>_drawQR(url,container);
    s.onerror=()=>showToast('QR 라이브러리 로드 실패');
    document.head.appendChild(s);
  }else{
    _drawQR(url,container);
  }
  const ov=document.getElementById('qrOv');
  if(ov)ov.classList.add('show');
  toggleFab();
}

function _drawQR(url,container){
  try{
    new QRCode(container,{
      text:url,width:200,height:200,
      colorDark:'#3a2f26',colorLight:'#fcf9f4',
      correctLevel:QRCode.CorrectLevel.M
    });
  }catch(e){
    container.textContent='QR 생성 실패';
    console.error('QR 생성 오류:',e);
  }
}

function closeQR(){
  const ov=document.getElementById('qrOv');if(ov)ov.classList.remove('show');
}

  const code=(inp?.value||'').replace(/\D/g,'').trim();
  if(err)err.textContent='';
  if(code.length!==6){if(err)err.textContent='6자리 숫자를 입력해주세요.';return;}
  if(!slug){if(err)err.textContent='청첩장 정보를 찾을 수 없어요.';return;}

  if(btn){btn.disabled=true;btn.textContent='확인 중...';}
  try{
    const{data,error}=await sb.rpc('verify_edit_code',{p_slug:slug,p_edit_code:code});
    if(error){if(err)err.textContent='확인 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';}
    else if(data&&data.ok){
      /* 검증 성공 → editor 진입 (editCode 전달) */
      location.href='editor.html?slug='+encodeURIComponent(slug)+'&editCode='+encodeURIComponent(code);
      return;
    }else{
      if(err)err.textContent=(data&&data.error)||'수정번호가 일치하지 않습니다.';
    }
  }catch(e){
    if(err)err.textContent='확인 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';
  }
  if(btn){btn.disabled=false;btn.textContent='수정하기';}
}

function downloadQR(){
  const container=document.getElementById('qrContainer');
  if(!container){showToast('QR 컨테이너를 찾을 수 없어요');return;}
  /* qrcodejs는 canvas 또는 img를 생성함 */
  const canvas=container.querySelector('canvas');
  const img=container.querySelector('img');
  const a=document.createElement('a');
  a.download='청첩장_QR.png';
  if(canvas){
    try{
      a.href=canvas.toDataURL('image/png');
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      showToast('QR 코드가 저장됐어요 ✓');
    }catch(e){showToast('QR 저장 실패 — 길게 눌러서 저장해주세요');}
  }else if(img&&img.src){
    a.href=img.src;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    showToast('QR 코드가 저장됐어요 ✓');
  }else{
    showToast('QR 코드를 먼저 생성해주세요');
  }
}

main();

/* ===== 배경 연출 엔진 (첫 화면 한정, 공통) ===== */
var AMB_GOLD_THEMES={black:1,'gold-serif':1};
/* 밝은 배경 템플릿 (pearl_bokeh/film_dust 가시성 보정 대상) */
var AMB_LIGHT_THEMES={'classic-ivory':1,minimal:1,flower:1,hanok:1};
/* 허용 효과 값 (8종 + none) */
var AMB_EFFECTS={none:1,winter_snow:1,gold_dust:1,film_dust:1,pearl_bokeh:1};
/* 템플릿별 자동 추천 매핑 */
var AMB_AUTO_MAP={signature:'film_dust','classic-ivory':'pearl_bokeh',hanok:'pearl_bokeh',black:'gold_dust',fullscreen:'film_dust',minimal:'pearl_bokeh',flower:'pearl_bokeh','gold-serif':'gold_dust'};
/* effect → ambient CSS 클래스 매핑 */
var AMB_CLASS_MAP={winter_snow:'ambient-winter-snow',gold_dust:'ambient-gold-dust',film_dust:'ambient-film-dust',pearl_bokeh:'ambient-pearl-bokeh'};
/* 템플릿별 첫 화면 스테이지 셀렉터 (gold-serif는 findAmbientStage에서 .lt-frame 우선) */
var AMB_STAGE_SEL={signature:'.sig-hero','classic-ivory':'.civ-stage',black:'.bk-stage',flower:'.fl-hero',hanok:'.hk-stage',minimal:'.stl-stage',fullscreen:'.cn-stage','gold-serif':'.lt-stage'};
/* 스테이지 내 그라데이션(이 앞에 ambient 삽입) */
var AMB_FADE_SEL=['.sig-scrim','.civ-photo-fade','.bk-photo-fade','.fl-photo-fade','.hk-photo-fade'];
function resolveAmbientEffect(theme, sel){
  var v=sel||'auto';
  if(v!=='auto'&&!AMB_EFFECTS[v])v='auto';
  if(v==='auto'){ return AMB_AUTO_MAP[theme]||'none'; }
  return v;
}
function ambParticleCount(effect,theme,stageW){
  var w=stageW||390, small=w<=390;
  if(effect==='winter_snow') return small?9:12;
  if(effect==='gold_dust'){
    if(theme==='gold-serif') return small?14:16;
    return small?17:19;
  }
  if(effect==='film_dust') return AMB_LIGHT_THEMES[theme]?(small?27:36):(small?23:31);
  if(effect==='pearl_bokeh') return AMB_LIGHT_THEMES[theme]?(small?8:11):(small?7:10);
  return 0;
}
function findAmbientStage(theme, coverEl){
  /* gold-serif: 프레임 뒤에 가려지지 않도록 카드 프레임 내부를 무대로 사용 (editor/card 통일) */
  if(theme==='gold-serif'){ var fr=coverEl.querySelector('.lt-frame'); if(fr) return fr; }
  var sel=AMB_STAGE_SEL[theme];
  if(sel){ var st=coverEl.querySelector(sel); if(st) return st; }
  return coverEl;
}
function removeAmbientLayer(root){
  if(!root)return;
  var L=root.querySelectorAll('.ambient-layer');
  for(var i=0;i<L.length;i++){ if(L[i].parentNode) L[i].parentNode.removeChild(L[i]); }
}
function createAmbientLayer(effect, theme, coverEl){
  if(!coverEl)return null;
  var stage=findAmbientStage(theme, coverEl);
  removeAmbientLayer(coverEl);
  if(effect==='none'||!AMB_EFFECTS[effect])return null;
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)return null;
  /* 입자 밀도는 stage 실제 폭 기준 (editor/card 강도 일치) */
  var stageW=(stage&&stage.clientWidth)?stage.clientWidth:(coverEl.clientWidth||390);
  var layer=document.createElement('div');
  var _ambCls=AMB_CLASS_MAP[effect];
  if(!_ambCls)return null;
  layer.className='ambient-layer '+_ambCls;
  var n=ambParticleCount(effect,theme,stageW);
  var isGS=(theme==='gold-serif');
  var isLight=!!AMB_LIGHT_THEMES[theme];   /* 밝은 배경 가시성 보정 */
  for(var i=0;i<n;i++){
    var p=document.createElement('div');p.className='ambient-particle';
    var size,dur,left,op,style;
    if(effect==='winter_snow'){
      /* === 겨울눈: 변경 금지 (기존 값 그대로) === */
      left=((i+Math.random())/n*100).toFixed(1);
      size=2+Math.random()*3; dur=10+Math.random()*8;
      op=(.35+Math.random()*.35).toFixed(3);
      var sway=(4+Math.random()*6).toFixed(1);
      var swayDur=(2.5+Math.random()*2.5).toFixed(2);
      style='left:'+left+'%;width:'+size+'px;height:'+size+'px;'
           +'--amb-op:'+op+';--amb-sway:'+sway+'px;'
           +'animation-duration:'+dur.toFixed(2)+'s,'+swayDur+'s;'
           +'animation-delay:'+(-Math.random()*dur).toFixed(2)+'s,'+(-Math.random()*swayDur).toFixed(2)+'s;';
    }else if(effect==='gold_dust'){
      /* === 골드 더스트 (재설계) === */
      var isPoint=(i % 5 === 0);                          /* 약 20%만 포인트 입자 */
      if(isGS){
        /* gold-serif: 중앙(38~62%) 최소화, 약 62% 좌우 / 38% 중앙외곽 */
        if(i % 10 < 6){ var side=(i%2===0); left=(side?(Math.random()*34):(66+Math.random()*34)).toFixed(1); }
        else { var seg=Math.random(); left=(seg<.5?(34+seg*8):(58+(seg-.5)*8)).toFixed(1); }
        size=(isPoint?(3+Math.random()*.5):(1.5+Math.random()*1.5)).toFixed(2);  /* 1.5~3 / 포인트 ~3.5 */
        dur=11+Math.random()*7;                            /* 11~18초 */
        var maxOpG=isPoint?(.44+Math.random()*.04):(.36+Math.random()*.10);     /* 포인트 0.44~0.48 / 일반 0.36~0.46 */
        op=Math.min(.48,maxOpG).toFixed(3);
        var glowG=(isPoint?(4+Math.random()*1):(2+Math.random()*2)).toFixed(1); /* 2~5px (유지) */
        var driftG=(4+Math.random()*6).toFixed(1);
        style='left:'+left+'%;width:'+size+'px;height:'+size+'px;'
             +'--amb-op:'+op+';--amb-drift:'+driftG+'px;'
             +'--amb-core:rgba(170,116,34,'+(.92+Math.random()*.06).toFixed(2)+');'
             +'--amb-edge:rgba(201,151,67,'+(.25+Math.random()*.10).toFixed(2)+');'
             +'--amb-glow:'+glowG+'px;--amb-glowc:rgba(150,108,40,.45);'
             +'animation-duration:'+dur.toFixed(2)+'s;'
             +'animation-delay:'+(-Math.random()*dur).toFixed(2)+'s;';
      }else{
        /* black: 구간 분할 분산, 명확히 보이는 따뜻한 골드 */
        left=((i+Math.random())/n*100).toFixed(1);
        size=(isPoint?(4+Math.random()):(2+Math.random()*2)).toFixed(2);         /* 2~4 / 포인트 4~5 */
        dur=9+Math.random()*6;                             /* 9~15초 */
        var maxOpB=isPoint?(.78+Math.random()*.07):(.58+Math.random()*.12);      /* 포인트 0.78~0.85 / 일반 0.58~0.70 */
        op=Math.min(.85,maxOpB).toFixed(3);
        var glowB=(isPoint?(7+Math.random()*3):(4+Math.random()*2)).toFixed(1);  /* 포인트 7~10px / 일반 4~6px */
        var driftB=(4+Math.random()*8).toFixed(1);                               /* 4~12px */
        style='left:'+left+'%;width:'+size+'px;height:'+size+'px;'
             +'--amb-op:'+op+';--amb-drift:'+driftB+'px;'
             +'--amb-core:rgba(255,225,145,'+(.92+Math.random()*.06).toFixed(2)+');'
             +'--amb-edge:rgba(196,136,44,'+(.30+Math.random()*.10).toFixed(2)+');'
             +'--amb-glow:'+glowB+'px;--amb-glowc:rgba(220,175,95,.55);'
             +'animation-duration:'+dur.toFixed(2)+'s;'
             +'animation-delay:'+(-Math.random()*dur).toFixed(2)+'s;';
      }
    }else if(effect==='pearl_bokeh'){
      left=((i+Math.random())/n*100).toFixed(1);
      var pbSz=isLight?(12+Math.random()*14):(10+Math.random()*12);  /* 밝은배경 12~26px / 기본 10~22px */
      size=pbSz.toFixed(2);
      dur=14+Math.random()*8;
      var pbOp=isLight?(.34+Math.random()*.16):(.27+Math.random()*.16); /* 밝은배경 opacity↑ */
      op=pbOp.toFixed(3);
      var driftPB=(6+Math.random()*5).toFixed(1); var pulseDur=(4+Math.random()*3).toFixed(2);
      var dlyPB=(i%5<2)?(-(.2+Math.random()*.6)*dur):(-Math.random()*dur);
      style='left:'+left+'%;width:'+size+'px;height:'+size+'px;--amb-op:'+op+';--amb-drift:'+driftPB+'px;'
           +(isLight?'--amb-ring:inset 0 0 0 1px rgba(206,184,150,.28);':'')  /* 연한 베이지/샴페인 테두리 */
           +'animation-duration:'+dur.toFixed(2)+'s,'+pulseDur+'s;'
           +'animation-delay:'+dlyPB.toFixed(2)+'s,'+(-Math.random()*pulseDur).toFixed(2)+'s;';
    }else if(effect==='film_dust'){
      left=((i+Math.random())/n*100).toFixed(1);
      size=(1+Math.random()).toFixed(2);                   /* 1~2px (유지) */
      dur=14+Math.random()*10;
      var fdOp=isLight?(.22+Math.random()*.12):(.18+Math.random()*.12); /* 밝은배경 opacity↑ */
      op=fdOp.toFixed(3);
      var flickDur=(.6+Math.random()*.6).toFixed(2);
      var dlyF=(i%4<2)?(-(.2+Math.random()*.6)*dur):(-Math.random()*dur);
      /* 밝은배경: 흰점 대신 옅은 브라운/세피아 */
      var fdCore=isLight?('rgba('+(122+Math.floor(Math.random()*24))+','+(92+Math.floor(Math.random()*20))+','+(64+Math.floor(Math.random()*18))+',.55)'):'';
      style='left:'+left+'%;width:'+size+'px;height:'+size+'px;--amb-op:'+op+';'
           +(fdCore?('--amb-core:'+fdCore+';'):'')
           +'animation-duration:'+dur.toFixed(2)+'s,'+flickDur+'s;'
           +'animation-delay:'+dlyF.toFixed(2)+'s,'+(-Math.random()*parseFloat(flickDur)).toFixed(2)+'s;';
    }
    p.style.cssText=style;
    layer.appendChild(p);
  }
  /* 레이어 순서: 사진/배경 → ambient → 그라데이션 → 텍스트. 그라데이션 앞에 삽입 */
  var fade=null;
  for(var ff=0; ff<AMB_FADE_SEL.length; ff++){ var fe=stage.querySelector(AMB_FADE_SEL[ff]); if(fe&&fe.parentNode===stage){ fade=fe; break; } }
  if(fade){ stage.insertBefore(layer, fade); }
  else if(stage.firstChild){ stage.insertBefore(layer, stage.firstChild.nextSibling); }
  else { stage.appendChild(layer); }
  return layer;
}
var _ambObserver=null, _ambVisHandler=null;
function setupAmbientVisibility(coverEl){
  if(_ambObserver){_ambObserver.disconnect();_ambObserver=null;}
  if(!coverEl)return;
  var layer=coverEl.querySelector('.ambient-layer');
  if(!layer)return;
  if('IntersectionObserver' in window){
    _ambObserver=new IntersectionObserver(function(ents){
      ents.forEach(function(e){
        if(e.isIntersecting&&e.intersectionRatio>=0.35){ layer.classList.remove('amb-hidden'); }
        else if(e.intersectionRatio<0.15){ layer.classList.add('amb-hidden'); }
      });
    },{threshold:[0,0.15,0.35,1]});
    _ambObserver.observe(coverEl);
  }
  if(_ambVisHandler)document.removeEventListener('visibilitychange',_ambVisHandler);
  _ambVisHandler=function(){
    if(document.hidden){ layer.classList.add('amb-hidden'); return; }
    /* 재활성화: 첫 화면이 viewport 안에 충분히 보일 때만 재개 */
    var r=coverEl.getBoundingClientRect();
    var vh=window.innerHeight||document.documentElement.clientHeight;
    var visible=Math.min(r.bottom,vh)-Math.max(r.top,0);
    var ratio=r.height>0?visible/r.height:0;
    if(ratio>=0.35){ layer.classList.remove('amb-hidden'); }
    else { layer.classList.add('amb-hidden'); }
  };
  document.addEventListener('visibilitychange',_ambVisHandler);
}
function applyAmbient(theme, selected, coverEl){
  if(!coverEl)return;
  var effect=resolveAmbientEffect(theme, selected);
  createAmbientLayer(effect, theme, coverEl);
  setupAmbientVisibility(coverEl);
}
