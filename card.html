      </div>
    </div>`;
  }
  if(tpl==='minimal'){
    let stlDate=dateStr||'';
    if(weddingDateRaw){const _d=new Date(weddingDateRaw+'T00:00:00');if(!isNaN(_d.getTime())){const _wd=['SUN','MON','TUE','WED','THU','FRI','SAT'][_d.getDay()];stlDate=`${_d.getFullYear()}. ${String(_d.getMonth()+1).padStart(2,'0')}. ${String(_d.getDate()).padStart(2,'0')} ${_wd}`;}}
    return`<div class="iv-cover t-minimal">
      <div class="stl-stage">
        <div class="stl-photo-area"><div class="stl-photo">${phFallback}</div></div>
        <div class="stl-info">
          <div class="stl-names"><span class="nm-person">${_first}</span><span class="stl-amp nm-sep">·</span><span class="nm-person">${_second}</span></div>
          <div class="stl-when">
            <span class="stl-date">${stlDate}</span>
            ${timeStr?`<span class="stl-time">${timeStr}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }
  if(tpl==='gold-serif'){
    let ltDate=dateStr||'';
    if(weddingDateRaw){const _d=new Date(weddingDateRaw+'T00:00:00');if(!isNaN(_d.getTime())){ltDate=`${_d.getFullYear()}. ${String(_d.getMonth()+1).padStart(2,'0')}. ${String(_d.getDate()).padStart(2,'0')}`;}}
    const _mi=(_first||'민').trim().charAt(0), _mj=(_second||'준').trim().charAt(0);
    const _ltMsg=esc((card.message||'서로 마주보며 다져온 사랑을\n이제 함께 한 곳을 바라보며\n걸어가고자 합니다.').split('\n').slice(0,3).join('\n'));
    return`<div class="iv-cover t-gold-serif">
      <div class="lt-stage">
        <div class="lt-frame">
          <div class="lt-mono">${esc(_mi)}&amp;${esc(_mj)}</div>
          <div class="lt-label">Invitation</div>
          <div class="lt-names"><span class="nm-person">${_first}</span><span class="lt-and nm-sep">&amp;</span><span class="nm-person">${_second}</span></div>
          <div class="lt-when">
            <span class="lt-date">${ltDate}</span>
            ${timeStr?`<span class="lt-time">${timeStr}</span>`:''}
          </div>
          <div class="lt-rule"></div>
          <div class="lt-msg">${_ltMsg}</div>
        </div>
      </div>
    </div>`;
  }
  if(tpl==='fullscreen'){
    let cnDate=dateStr||'';
    let cnWeekday='';
    if(weddingDateRaw){const _d=new Date(weddingDateRaw+'T00:00:00');if(!isNaN(_d.getTime())){cnDate=`${_d.getFullYear()}.${String(_d.getMonth()+1).padStart(2,'0')}.${String(_d.getDate()).padStart(2,'0')}`;cnWeekday=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'][_d.getDay()];}}
    return`<div class="iv-cover t-fullscreen">
      <div class="cn-stage">
        <div class="cn-inner">
          <div class="cn-filmlbl">A WEDDING FILM</div>
          <div class="cn-names"><span class="nm-person">${_first}</span><span class="cn-mid nm-sep">·</span><span class="nm-person">${_second}</span></div>
          <div class="cn-when">
            <span class="cn-date">${cnDate}</span>
            ${cnWeekday?`<span class="cn-weekday">${cnWeekday}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }
  if(tpl==='hanok'){
    let hkDate=dateStr||'';
    if(weddingDateRaw){const _d=new Date(weddingDateRaw+'T00:00:00');if(!isNaN(_d.getTime())){hkDate=`${_d.getFullYear()}. ${String(_d.getMonth()+1).padStart(2,'0')}. ${String(_d.getDate()).padStart(2,'0')}`;}}
    return`<div class="iv-cover t-hanok">
      <div class="hk-stage">
        <div class="hk-photo-area"><div class="hk-photo">${phFallback}</div><div class="hk-photo-fade"></div></div>
        <div class="hk-info">
          <div class="hk-names"><span class="nm-person">${_first}</span><span class="hk-dot nm-sep">·</span><span class="nm-person">${_second}</span></div>
          <div class="hk-when">
            <span class="hk-date">${hkDate}</span>
            ${timeStr?`<span class="hk-time">${timeStr}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }
  if(tpl==='flower'){
    let flDate=dateStr||'';
    if(weddingDateRaw){const _d=new Date(weddingDateRaw+'T00:00:00');if(!isNaN(_d.getTime())){flDate=`${_d.getFullYear()} · ${String(_d.getMonth()+1).padStart(2,'0')} · ${String(_d.getDate()).padStart(2,'0')}`;}}
    return`<div class="iv-cover t-flower">
      <div class="fl-hero">
        <div class="fl-photo-area"><div class="fl-photo">${phFallback}</div></div>
        <div class="fl-info">
          <div class="fl-names"><span class="nm-person">${_first}</span><span class="fl-dot nm-sep">&amp;</span><span class="nm-person">${_second}</span></div>
          <div class="fl-when">
            <span class="fl-date">${flDate}</span>
            ${timeStr?`<span class="fl-time">${timeStr}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }
  if(tpl==='black'){
    let bkDate=dateStr||'';
    if(weddingDateRaw){const _d=new Date(weddingDateRaw+'T00:00:00');if(!isNaN(_d.getTime())){bkDate=`${_d.getFullYear()}. ${String(_d.getMonth()+1).padStart(2,'0')}. ${String(_d.getDate()).padStart(2,'0')}`;}}
    return`<div class="iv-cover t-black">
      <div class="bk-stage">
        <div class="bk-photo-area"><div class="bk-photo">${phFallback}</div><div class="bk-photo-fade"></div></div>
        <div class="bk-info">
          <div class="bk-names"><span class="nm-person">${_first}</span><span class="bk-dot nm-sep">·</span><span class="nm-person">${_second}</span></div>
          <div class="bk-when">
            <span class="bk-date">${bkDate}</span>
            ${timeStr?`<span class="bk-time">${timeStr}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }
  /* default: classic-ivory — 사진 + 하단 정보 패널 (안전형, 어떤 사진이든 안정) */
  let civDate=dateStr||'';
  if(weddingDateRaw){
    const _d=new Date(weddingDateRaw+'T00:00:00');
    if(!isNaN(_d.getTime())){
      const _mm=String(_d.getMonth()+1).padStart(2,'0');
      const _dd=String(_d.getDate()).padStart(2,'0');
      const _wd=['SUN','MON','TUE','WED','THU','FRI','SAT'][_d.getDay()];
      civDate=`${_d.getFullYear()}. ${_mm}. ${_dd} ${_wd}`;
    }
  }
  return`<div class="iv-cover t-classic-ivory">
    <div class="civ-stage">
      <div class="civ-photo-area">
        <div class="civ-photo">${phFallback}</div>
        <div class="civ-photo-fade"></div>
      </div>
      <div class="civ-info">
        <div class="civ-names"><span class="nm-person">${_first}</span><span class="civ-dot nm-sep">&amp;</span><span class="nm-person">${_second}</span></div>
        <div class="civ-when">
          <span class="civ-date">${civDate}</span>
          ${timeStr?`<span class="civ-time">${timeStr}</span>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

/* 카드 렌더링 */
function renderCard(card){
  /* BGM — 자동재생 실패 후에도 메뉴에서 재생/정지 가능 */
  initBgm(card);

  const card_el=document.getElementById('card');
  const rawTheme=card.theme||'ivory';
  const tpl=normalizeTheme(rawTheme);
  const font=FONTS[card.font]||FONTS.serif;
  const opts=card.options||{};

  /* 모든 텍스트 escape */
  const g=esc(card.groom_name||'신랑'), b=esc(card.bride_name||'신부');
  const venueN=esc(card.venue_name||'');
  const venueH=esc(card.venue_hall||'');
  const venueA=esc(card.venue_address||'');
  const msg=esc(card.message||'');
  const msgL2=esc(card.message_lang2||'');
  const gParentRaw=esc(opts.groom_parents||'');
  const bParentRaw=esc(opts.bride_parents||'');
  const gParent=gParentRaw?((opts.groom_parent_deceased?'故 ':'')+gParentRaw):'';
  const bParent=bParentRaw?((opts.bride_parent_deceased?'故 ':'')+bParentRaw):'';
  const venueL2=esc(card.venue_lang2||'');
  const addressL2=esc(card.address_lang2||'');
  const groomBank=esc(card.groom_bank||'');
  const groomHolder=esc(card.groom_holder||'');
  const groomAcc=esc(card.groom_account||'');
  const brideBank=esc(card.bride_bank||'');
  const brideHolder=esc(card.bride_holder||'');
  const brideAcc=esc(card.bride_account||'');
  /* 혼주 계좌: 전용 컬럼 우선, options JSON fallback */
  const gpBank=esc(card.groom_parent_bank??opts.groom_parent_bank??'');
  const gpHolder=esc(card.groom_parent_holder??opts.groom_parent_holder??'');
  const gpAcc=esc(card.groom_parent_account??opts.groom_parent_account??'');
  const bpBank=esc(card.bride_parent_bank??opts.bride_parent_bank??'');
  const bpHolder=esc(card.bride_parent_holder??opts.bride_parent_holder??'');
  const bpAcc=esc(card.bride_parent_account??opts.bride_parent_account??'');
  /* 신랑/신부 표시 순서: options.order_gb===false 이면 신부 먼저 */
  const orderGb=card.options?.order_gb!==false;
  const names=orderGb
    ?`${g}<span class="iv-amp">&amp;</span>${b}`
    :`${b}<span class="iv-amp">&amp;</span>${g}`;
  const namesPlain=orderGb?`${g} ♥ ${b}`:`${b} ♥ ${g}`;
  const lang2=card.lang2;
  const weddingDateRaw=card.wedding_date||'';   /* ISO 원본값 (YYYY-MM-DD) */
  const dateStr=fmtDate(weddingDateRaw);
  const timeStr=card.wedding_time?fmtTime(card.wedding_time):'';
  const langDate=fmtDateLang(weddingDateRaw,card.wedding_time,lang2);
  const mainPhoto=safeUrl(card.main_photo_url);
  const galleryUrls=(Array.isArray(card.gallery_urls)?card.gallery_urls:[]).map(safeUrl).filter(Boolean).slice(0,40);

  /* 테마 클래스 설정 */
  card_el.className=`t-${tpl}`;
  card_el.style.fontFamily=font;

  let html='';

  /* ① 커버 (템플릿별 레이아웃) */
  html+=buildCoverHtml(tpl,g,b,names,dateStr,timeStr,mainPhoto,lang2,langDate,weddingDateRaw);

  /* ② 인사말 */
  if(msg){
    html+=`<div class="iv-sec">
      <div class="iv-sec-t">${tpl==='hanok'?'초대합니다':'Invitation'}</div>
      <div class="iv-msg" style="white-space:pre-line;margin-top:12px;">${msg}
        ${lang2&&msgL2?`<span class="sub-lang" style="display:block;margin-top:10px;font-style:italic;">${msgL2}</span>`:''}
      </div>
    </div>`;
  }

  /* ②-b 혼주 (선택 — 비어있으면 영역 숨김) */
  if(gParent||bParent){
    html+=`<div class="iv-sec">
      <div class="iv-sec-t">${tpl==='hanok'?'양가 부모님':'With Parents'}</div>
      <div class="iv-parents" style="margin-top:12px;display:flex;flex-direction:column;gap:14px;text-align:center;">
        ${gParent?`<div><div class="${tpl==='hanok'?'hk-parent-label':''}" style="font-size:11px;letter-spacing:1.5px;${tpl==='hanok'?'':(tpl==='fullscreen'?'color:rgba(214,186,132,.85);':(tpl==='gold-serif'?'color:#8a6a38;':'color:var(--brown-mute);'))}margin-bottom:4px;">신랑측 혼주</div><div style="font-size:14.25px;word-break:keep-all;line-height:1.6;">${gParent}</div></div>`:''}
        ${bParent?`<div><div class="${tpl==='hanok'?'hk-parent-label':''}" style="font-size:11px;letter-spacing:1.5px;${tpl==='hanok'?'':(tpl==='fullscreen'?'color:rgba(214,186,132,.85);':(tpl==='gold-serif'?'color:#8a6a38;':'color:var(--brown-mute);'))}margin-bottom:4px;">신부측 혼주</div><div style="font-size:14.25px;word-break:keep-all;line-height:1.6;">${bParent}</div></div>`:''}
      </div>
    </div>`;
  }

  /* ③ 날짜·장소 (인사말 바로 다음) */
  if(venueN||dateStr){
    const addrQ=encodeURIComponent(((card.venue_address||card.venue_name||'')).trim());
    html+=`<div class="iv-sec">
      <div class="iv-sec-t">예식 안내</div>
      <div class="iv-info" style="margin-top:12px;">
        ${dateStr?`<div style="font-size:16px;font-family:'Noto Serif KR',serif;font-weight:500;margin-bottom:6px;">${dateStr}${timeStr?` <span style="font-weight:300;">${timeStr}</span>`:''}</div>`:''}
        ${venueN?`<div><b>${venueN}</b>${venueH?' '+venueH:''}</div>`:''}
        ${venueA?`<div class="bk-addr" style="color:${(tpl==='black'||tpl==='fullscreen')?'rgba(232,222,202,.82)':(tpl==='gold-serif'?'rgba(58,48,32,.82)':'rgba(58,53,46,.65)')};opacity:1;font-size:12px;margin-top:4px;word-break:keep-all;line-height:1.6;">${tpl==='hanok'?venueA.replace(/\s+(\S{1,4})\s*$/,'\u00a0$1'):venueA}</div>`:''}
        ${lang2&&venueL2?`<div class="sub-lang" style="margin-top:6px;">${venueL2}</div>`:''}
        ${lang2&&addressL2?`<div class="sub-lang" style="margin-top:4px;word-break:keep-all;line-height:1.6;">${addressL2}</div>`:''}
      </div>
      ${venueA?`<div class="iv-map">
        <div class="iv-map-label">길 찾기</div>
        <div class="iv-chips" style="margin-top:10px;">
        <a class="iv-chip" href="https://map.naver.com/v5/search/${addrQ}" target="_blank" rel="noopener noreferrer">네이버</a>
        <a class="iv-chip" href="https://map.kakao.com/link/search/${addrQ}" target="_blank" rel="noopener noreferrer">카카오</a>
        <a class="iv-chip" href="https://www.google.com/maps/search/?api=1&query=${addrQ}" target="_blank" rel="noopener noreferrer">구글</a>
        </div>
      </div>`:''}
    </div>`;
  }

  /* ④ D-Day */
  if(opts.dday!==false&&card.wedding_date){
    const dd=dday(card.wedding_date);
    if(dd!==null&&dd>=0){
      const _dd=new Date(card.wedding_date);
      const _valid=!isNaN(_dd.getTime());
      if(tpl==='hanok'){
        const _kDate=_valid?`${_dd.getFullYear()}년 ${_dd.getMonth()+1}월 ${_dd.getDate()}일`:'';
        const _kBody=(dd===0)
          ?`<div class="hk-dday-num">D-DAY</div><div class="hk-dday-unit">두 사람이 부부가 되는 날입니다</div>`
          :`<div class="hk-dday-num">D-${dd}</div><div class="hk-dday-unit">두 사람의 예식이 다가옵니다</div>`;
        html+=`<div class="iv-sec dday-sec">
        <div class="iv-sec-t">예식일까지</div>
        ${_kBody}
        ${_kDate?`<div class="hk-dday-date">${_kDate}</div>`:''}
      </div>`;
      }else{
      const _M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const _ddStr=_valid?`${_M[_dd.getMonth()]} ${_dd.getDate()}, ${_dd.getFullYear()}`:'';
      html+=`<div class="iv-sec dday-sec">
        <div class="iv-sec-t">Until Our Wedding</div>
        <div class="dday-figure">${dd===0?'D-DAY':'D-'+dd}</div>
        ${_ddStr?`<div class="dday-date">${_ddStr}</div>`:''}
      </div>`;
      }
    }
  }

  /* ⑤ 갤러리 — 빈 자리표시로 렌더, DOM 삽입 후 preload로 성공 이미지만 채움 */
  if(opts.gallery!==false&&galleryUrls.length){
    const layoutClass={grid:'iv-gal',masonry:'iv-gal-masonry',full:'iv-gal-full'}[opts.gallery_layout||'masonry']||'iv-gal';
    /* 성공 이미지 기준 재계산은 hydrateGallery()가 처리. 여기선 컨테이너만 생성 */
    html+=`<div class="iv-sec iv-gal-sec" id="galSec" data-gallery='${esc(JSON.stringify(galleryUrls))}' data-layout="${layoutClass}" data-hanok="${tpl==='hanok'?1:0}" style="display:none;">
      <div class="iv-sec-t">${tpl==='hanok'?'우리의 순간':'Gallery'}</div>
      <div class="${layoutClass} iv-gal-wrap" id="galWrap" style="margin-top:14px;"></div>
    </div>`;
  }

  /* ⑥ RSVP */
  if(opts.rsvp!==false){
    html+=`<div class="iv-sec rsvp-sec">
      <div class="iv-sec-t">참석 안내</div>
      <div class="hk-sec-desc" style="font-size:13px;color:inherit;opacity:.7;margin-top:8px;margin-bottom:14px;">귀한 발걸음을 기다립니다</div>
      ${(tpl==='hanok'||tpl==='black'||tpl==='minimal'||tpl==='fullscreen'||tpl==='gold-serif')?`<button type="button" class="hk-open-btn" data-action="open-rsvp">참석 여부 남기기</button>`:''}
      <div class="rsvp-form" id="rsvpForm"${(tpl==='hanok'||tpl==='black'||tpl==='minimal'||tpl==='fullscreen'||tpl==='gold-serif')?' style="display:none;"':''}>
        <div class="rsvp-opts">
          <div class="rsvp-opt on" data-action="rsvp-pick">참석</div>
          <div class="rsvp-opt" data-action="rsvp-pick">불참</div>
        </div>
        <div class="rsvp-row">
          <select id="rv_side"><option value="groom">신랑측</option><option value="bride">신부측</option></select>
          <input id="rv_name" placeholder="성함" maxlength="20"/>
        </div>
        <div class="rsvp-row">
          <select id="rv_meal"><option value="yes">식사 함</option><option value="no">식사 안 함</option></select>
          <select id="rv_plus"><option value="0">동반 0명</option><option value="1">1명</option><option value="2">2명</option><option value="3">3명</option><option value="4">4명+</option></select>
        </div>
        <input id="rv_phone" placeholder="연락처 (선택)" maxlength="20"/>
        <input id="rv_memo" placeholder="메모" maxlength="100"/>
        <button class="rsvp-submit" data-action="submit-rsvp" data-card-id="${esc(card.id)}">참석 여부 남기기</button>
        <p class="privacy">입력하신 정보는 예식 준비 목적으로만 사용됩니다.</p>
      </div>
    </div>`;
  }

  /* ⑦ 방명록 */
  if(opts.guest!==false){
    html+=`<div class="iv-sec guest-sec">
      <div class="iv-sec-t">축하의 글</div>
      <div class="hk-sec-desc" style="font-size:13px;color:inherit;opacity:.7;margin-top:8px;margin-bottom:14px;">두 사람에게 따뜻한 마음을 전해주세요</div>
      ${(tpl==='hanok'||tpl==='black'||tpl==='minimal'||tpl==='fullscreen'||tpl==='gold-serif')?`<button type="button" class="hk-open-btn" data-action="open-guest">마음 남기기</button>`:''}
      <div class="guest-form"${(tpl==='hanok'||tpl==='black'||tpl==='minimal'||tpl==='fullscreen'||tpl==='gold-serif')?' style="display:none;"':''}>
        <input id="gb_name" placeholder="성함" maxlength="20"/>
        <textarea id="gb_msg" rows="3" placeholder="두 사람에게 따뜻한 마음을 전해주세요" maxlength="300"></textarea>
        <button class="guest-submit" data-action="submit-guest" data-card-id="${esc(card.id)}">마음 남기기</button>
      </div>
      <div class="guest-list" id="guestList"></div>
    </div>`;
  }

  /* ⑧ 계좌 (마지막 — 감성 → 정보 → 기능 → 계좌 순서) */
  if(opts.account!==false&&(groomAcc||brideAcc||gpBank||gpAcc||gpHolder||bpBank||bpAcc||bpHolder)){
    html+=`<div class="iv-sec acc-sec">
      <div class="iv-sec-t">마음 전하실 곳</div>
      <div class="hk-sec-desc" style="font-size:13px;opacity:${tpl==='hanok'?'.9':'.55'};margin-top:6px;margin-bottom:12px;">${tpl==='hanok'?'마음을 전하실 분들을 위해 준비했습니다':'참석이 어려우신 분들을 위한 안내입니다'}</div>
      <div class="acc-box">
        <button type="button" class="acc-toggle" aria-expanded="false" data-action="toggle-account">계좌번호 확인하기</button>
        <div class="acc-list" hidden>
          ${groomAcc?`<div class="acc-row"><div class="acc-info"><span class="acc-side">신랑측</span><span class="acc-bank">${groomBank} ${groomHolder}</span><span class="acc-num">${groomAcc}</span></div><button type="button" class="acc-copy" data-acc="${groomAcc}" data-action="copy-account">복사</button></div>`:''}
          ${(gpBank||gpAcc||gpHolder)?`<div class="acc-row"><div class="acc-info"><span class="acc-side">신랑측 혼주</span><span class="acc-bank">${gpBank} ${gpHolder}</span><span class="acc-num">${gpAcc}</span></div><button type="button" class="acc-copy" data-acc="${gpAcc}" data-action="copy-account">복사</button></div>`:''}

/* 실제 복사 성공 여부를 boolean으로 판정 (clipboard API → textarea+execCommand fallback) */
function _doCopy(txt){
  return new Promise(function(resolve){
    if(window.isSecureContext&&navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){resolve(true);}).catch(function(){resolve(_fallbackCopy(txt));});
    }else{
      resolve(_fallbackCopy(txt));
    }
  });
}
function _fallbackCopy(txt){
  var ok=false, ta=null;
  try{
    ta=document.createElement('textarea');
    ta.value=txt;ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,txt.length);
    ok=(document.execCommand('copy')===true); /* 반환값 반드시 확인 */
  }catch(e){ ok=false; }
  if(ta&&ta.parentNode)ta.parentNode.removeChild(ta); /* 성공·실패 무관 제거 */
  return ok;
}
function copyAcc(btn){

/* 갤러리 */
var _lbIndex=0;
var _lbPrevOverflow=null; /* 라이트박스 열기 전 body overflow 저장 */
function _lbValidIndexes(){
  var urls=window._lbUrls||[],bad=window._lbBad||{};
  return urls.map(function(_,i){return i;}).filter(function(i){return !bad[i];});
}
function _lbNearestUsable(start,dir){
  var urls=window._lbUrls||[],bad=window._lbBad||{};
  if(!urls.length)return -1;
  var step=dir<0?-1:1,idx=((start%urls.length)+urls.length)%urls.length;
  for(var n=0;n<urls.length;n++,idx=(idx+step+urls.length)%urls.length){if(!bad[idx])return idx;}
  return -1;
}
function openLb(arg){
  var urls=window._lbUrls||[];
  var idx=0;
  if(typeof arg==='number')idx=arg;
  else { var f=urls.indexOf(arg); idx=f>=0?f:0; } /* src 호환 */
  if(!urls.length)return;
  idx=_lbNearestUsable(idx,1);if(idx<0)return;
  _lbIndex=idx;
  _lbRender();
  var lb=document.getElementById('lb');if(!lb)return;
  lb.classList.add('show');
  /* 배경 페이지 스크롤 잠금 (현재 overflow 저장 후 hidden) */
  if(_lbPrevOverflow===null){ _lbPrevOverflow=document.body.style.overflow||''; }
  document.body.style.overflow='hidden';
}
function _lbRender(){
  var urls=window._lbUrls||[],valid=_lbValidIndexes();
  if(!urls.length||!valid.length){closeLb();return;}
  if((window._lbBad||{})[_lbIndex]){_lbIndex=_lbNearestUsable(_lbIndex,1);if(_lbIndex<0){closeLb();return;}}
  var img=document.getElementById('lbImg');
  if(img){img.onerror=function(){galleryImageError(this,_lbIndex);_lbIndex=_lbNearestUsable(_lbIndex+1,1);_lbRender();};img.src=urls[_lbIndex];}
  var c=document.getElementById('lbCounter'),pos=valid.indexOf(_lbIndex);
  if(c)c.textContent=(pos+1)+' / '+valid.length;
  var multi=valid.length>1;
  var p=document.querySelector('.lb-prev'), n=document.querySelector('.lb-next');
  if(p)p.style.display=multi?'flex':'none';
  if(n)n.style.display=multi?'flex':'none';
}
function lbStep(dir){
  var urls=window._lbUrls||[];
  if(!urls.length)return;
  var next=_lbNearestUsable(_lbIndex+(dir<0?-1:1),dir);if(next<0)return;
  _lbIndex=next;_lbRender();
}
function closeLb(){
  var lb=document.getElementById('lb');
  if(lb)lb.classList.remove('show');
  /* 배경 스크롤 복원 (저장된 값으로, 누적·재진입 안전) */
  if(_lbPrevOverflow!==null){ document.body.style.overflow=_lbPrevOverflow; _lbPrevOverflow=null; }
  else { document.body.style.overflow=''; }
}
/* 키보드 ←/→/ESC */
document.addEventListener('keydown',function(e){
  var lb=document.getElementById('lb');
  if(!lb||!lb.classList.contains('show'))return;
  if(e.key==='ArrowLeft')lbStep(-1);
  else if(e.key==='ArrowRight')lbStep(1);
  else if(e.key==='Escape')closeLb();

/* 모바일 좌우 스와이프 */
(function(){
  var sx=0,sy=0,tracking=false;
  var lb=document.getElementById('lb');
  if(!lb)return;
  lb.addEventListener('touchstart',function(e){
    if(e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;
  },{passive:true});
  lb.addEventListener('touchend',function(e){
    if(!tracking)return;tracking=false;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;

/* 배경 클릭 시 닫기 (이미지/버튼 클릭은 제외) */

function initBgm(card){
  if(window._bgmAudio){try{window._bgmAudio.pause();window._bgmAudio.remove();}catch(e){}window._bgmAudio=null;}
  const mode=card.options?.bgm_mode||(card.options?.bgm_url?'custom':'none');let src='';
  if(mode==='preset'&&card.options?.bgm_preset)src='music/'+card.options.bgm_preset+'.mp3';

  let pending=false;window._bgmTryPlay=async()=>{if(!audio.paused||pending)return true;pending=true;try{await audio.play();return true;}catch(e){return false;}finally{pending=false;_setBgmLabel();}};
  audio.addEventListener('play',_setBgmLabel);audio.addEventListener('pause',_setBgmLabel);audio.addEventListener('error',_setBgmLabel);_setBgmLabel();

function _rectHit(a,b,pad=0){return !(a.right<b.left-pad||a.left>b.right+pad||a.bottom<b.top-pad||a.top>b.bottom+pad);}
function updateFabSafety(){
  _fabSafetyRaf=0;const wrap=document.querySelector('.fab-wrap'),main=document.getElementById('fabMain');if(!wrap||!main)return;
  const active=document.activeElement,isTyping=!!active&&(/^(INPUT|TEXTAREA|SELECT)$/.test(active.tagName)||active.isContentEditable);
  const vv=window.visualViewport,keyboard=!!vv&&vv.height<Math.min(_fabInitialVh,window.innerHeight)*.72;

  const suppress=isTyping||keyboard||collision;wrap.classList.toggle('fab-suppressed',suppress);if(suppress)closeFab();
}
function scheduleFabSafety(){if(!_fabSafetyRaf)_fabSafetyRaf=requestAnimationFrame(updateFabSafety);}

/* ===== 링크 복사 ===== */
/* 보기·복사·카카오·QR은 항상 현재 배포의 최신 card.html을 사용한다.
   구형 VPS 렌더러는 editor/card 불일치가 있으므로 링크 대상으로 사용하지 않는다. */
function getViewUrl(){return slug?new URL(`card.html?slug=${encodeURIComponent(slug)}`,location.href).href:location.href;}
/* 서버 OG 공유 페이지가 최신 버전으로 배포된 경우에만 자동 사용한다.
   구형 weddingapi 카드가 남아 있으면 검증 헤더가 없으므로 현재 card.html 링크를 유지한다. */
const SHARE_ROUTE_BASE='https://weddingapi.duckdns.org';
/* OG 서버 링크는 실제 운영 /wedding/ 배포에서만 사용한다.
   테스트 저장소가 운영 카드로 잘못 이동하는 문제를 원천 차단한다. */
function shareRouteAllowed(){
  if(window.__ENABLE_SHARE_ROUTE===true)return true; /* 자동검수 전용 */
  return location.hostname==='kkacmn-cpu.github.io'&&/^\/wedding\/card\.html$/i.test(location.pathname);
}
let _verifiedShareUrl='';
async function probeShareRoute(){
  if(!shareRouteAllowed()||!slug||!/^https:\/\//i.test(SHARE_ROUTE_BASE))return false;
  const candidate=`${SHARE_ROUTE_BASE}/card/${encodeURIComponent(slug)}`;
  const ctrl=typeof AbortController!=='undefined'?new AbortController():null;
  const timer=ctrl?setTimeout(()=>ctrl.abort(),1200):null;
  try{
    const res=await fetch(candidate+'?probe=1',{method:'HEAD',mode:'cors',cache:'no-store',credentials:'omit',signal:ctrl?.signal});
    if(res.ok&&res.headers.get('X-Wedding-Share-Version')==='2'){
      _verifiedShareUrl=candidate;return true;
    }
  }catch(e){}finally{if(timer)clearTimeout(timer);}
  _verifiedShareUrl='';return false;
}
function getShareUrl(){return _verifiedShareUrl||getViewUrl();}

async function copyCardLink(){
  /* 링크 직접 붙여넣기용 OG 서버가 최신 배포된 경우에만 해당 주소를 사용한다. */
  await probeShareRoute();
  const shareUrl=getShareUrl();
  const ok=await _doCopy(shareUrl);
  showToast(ok?'링크가 복사됐어요 ✓':'복사하지 못했습니다. 링크를 직접 선택해 주세요.');

}

/* ===== 카카오 공유 (SDK 방식) =====
   원칙:
   - og:image는 HTML 고정값 (JS로 변경 안 함)
   - 카카오 공유 썸네일은 sendDefault의 imageUrl로만 결정
   - imageUrl 우선순위: 대표사진 → 갤러리 → 기본 썸네일(og-default.jpg)
*/
/* 카카오 공유 이미지: 검증된 http URL만 사용, 아니면 기본 썸네일
   - http/https 아니면 제외
   - null/undefined/빈값 → 기본 썸네일
   - blob/data/상대경로/DOM이미지/signed URL 사용 안 함 */
function getSafeImageUrl(data){
  let DEFAULT='https://kkacmn-cpu.github.io/wedding/og-default.jpg';
  try{if(location.protocol==='https:')DEFAULT=new URL('og-default.jpg',location.href).href;}catch(e){}
  const firstGallery=Array.isArray(data?.gallery_urls)?data.gallery_urls.find(x=>typeof x==='string'&&/^https:\/\//i.test(x)):null;
  const url=data?.main_photo_url||data?.cover_image||firstGallery||DEFAULT;
  if(typeof url!=='string'||!/^https:\/\//i.test(url))return DEFAULT;
  return url;
}

let _kakaoLoadPromise=null;
function ensureKakaoSdk(){
  if(window.Kakao)return Promise.resolve(window.Kakao);
  if(_kakaoLoadPromise)return _kakaoLoadPromise;
  _kakaoLoadPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');s.src='https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js';s.async=true;s.crossOrigin='anonymous';
    const timer=setTimeout(()=>reject(new Error('카카오 SDK 로드 시간 초과')),10000);
    s.onload=()=>{clearTimeout(timer);window.Kakao?resolve(window.Kakao):reject(new Error('카카오 SDK 초기화 실패'));};
    s.onerror=()=>{clearTimeout(timer);reject(new Error('카카오 SDK를 불러오지 못했습니다.'));};document.head.appendChild(s);
  }).catch(err=>{_kakaoLoadPromise=null;throw err;});
  return _kakaoLoadPromise;
}
async function shareKakao(){
  let KakaoApi;
  try{KakaoApi=await ensureKakaoSdk();}
  catch(e){console.error(e);showToast('카카오 공유를 열지 못해 링크를 복사합니다.');copyCardLink();return;}
  if(!KakaoApi.isInitialized())KakaoApi.init(KAKAO_JS_KEY);

  const d=window._cardData;
  const cardUrl=getShareUrl();

  const _gn=d?.groom_name||'신랑', _bn=d?.bride_name||'신부';
  const _orderGb=d?.options?.order_gb!==false;
  const _names=_orderGb?`${_gn} ♥ ${_bn}`:`${_bn} ♥ ${_gn}`;
  const title=d?`${_names}의 결혼식에 초대합니다`:(document.title||'모바일 청첩장');
  const desc=d?`${d.wedding_date||''} · ${d.venue_name||''}`.trim():'소중한 날에 초대합니다.';

  /* 대표사진 — 검증된 http URL만, 없으면 기본 썸네일 */
  const imageUrl=getSafeImageUrl(d);
  try{
    KakaoApi.Share.sendDefault({
      objectType:'feed',
      content:{
        title:title,
        description:desc,
        imageUrl:imageUrl,
        imageWidth:800,
        imageHeight:800,
        link:{mobileWebUrl:cardUrl,webUrl:cardUrl}
      },
      buttons:[{title:'청첩장 보기',link:{mobileWebUrl:cardUrl,webUrl:cardUrl}}]
    });
    closeFab();
  }catch(e){
    console.error('Kakao share failed:', e);
    try{
      if(navigator.share){
        await navigator.share({title:title,text:desc,url:cardUrl});
        closeFab();
        return;
      }
    }catch(nativeErr){
      if(nativeErr?.name==='AbortError')return;
      console.error('Native share failed:',nativeErr);
    }
    copyCardLink();
    showToast('공유 인증을 확인할 수 없어 링크를 복사했어요. 카카오톡에 붙여넣기 해주세요.');
  }
}

function addCalendar(){
  const d=window._cardData;
  if(!d||!d.wedding_date){showToast('예식 날짜 정보가 없어요');return;}
  const dt=d.wedding_date.replace(/-/g,'');
  const tm=d.wedding_time?d.wedding_time.replace(':','')+'00':'120000';
  const title=`${d.groom_name||'신랑'} ♥ ${d.bride_name||'신부'} 결혼식`;
  const loc=(d.venue_name||'')+(d.venue_address?' '+d.venue_address:'');
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Wedding Invitation//Calendar//KO',
    'BEGIN:VEVENT',
    `DTSTART:${dt}T${tm}`,`DTEND:${dt}T${tm}`,
    `SUMMARY:${title}`,`LOCATION:${loc}`,
    `DESCRIPTION:${getShareUrl()}`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='wedding.ics';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(a.href);
  showToast('달력 파일이 다운로드됐어요 📅');
  closeFab();
}

/* ===== QR 코드 생성 (안정화) ===== */
/* qrcodejs는 내부적으로 canvas 또는 img를 동적 생성함
   → canvas 고정 ID 대신 div 컨테이너를 사용해 안정적으로 처리 */
function showQR(){
  const url=getShareUrl();
  const urlEl=document.getElementById('qrUrl');
  if(urlEl)urlEl.textContent=url;
  const container=document.getElementById('qrContainer');
  if(!container)return;
  /* 이전 QR 초기화 */
  container.innerHTML='';
  if(!window.QRCode){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=()=>_drawQR(url,container);
    s.onerror=()=>showToast('QR 라이브러리 로드 실패');
    document.head.appendChild(s);
  }else{
    _drawQR(url,container);
  }
  const ov=document.getElementById('qrOv');
  if(ov)ov.classList.add('show');
  closeFab();
}

function _drawQR(url,container){
  try{
    new QRCode(container,{
      text:url,width:200,height:200,
      colorDark:'#3a2f26',colorLight:'#fcf9f4',
      correctLevel:QRCode.CorrectLevel.M
    });
  }catch(e){
    container.textContent='QR 생성 실패';
    console.error('QR 생성 오류:',e);
  }
}

function closeQR(){
  const ov=document.getElementById('qrOv');if(ov)ov.classList.remove('show');
}

async function submitEditCode(){
  const inp=document.getElementById('editCodeInput');
  const err=document.getElementById('editErr');
  const btn=document.getElementById('editGoBtn');
  const code=(inp?.value||'').replace(/\D/g,'').trim();
  if(err)err.textContent='';
  if(code.length!==6){if(err)err.textContent='6자리 숫자를 입력해주세요.';return;}
  if(!slug){if(err)err.textContent='청첩장 정보를 찾을 수 없어요.';return;}

  if(btn){btn.disabled=true;btn.textContent='확인 중...';}
  try{
    if(!sb){if(err)err.textContent='서버에 연결하지 못했습니다. 잠시 후 다시 시도해주세요.';return;}
    const{data:raw,error}=await sb.rpc('verify_edit_code',{p_slug:slug,p_edit_code:code});
    let data=raw;if(typeof data==='string')data=parseJsonMaybe(data,data);if(Array.isArray(data))data=data[0]||null;
    if(error){if(err)err.textContent='확인 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';}
    else if(data&&(data.ok||data.success)){
      /* 검증 성공 → editor 진입 (editCode 전달) */
      location.href='editor.html?slug='+encodeURIComponent(slug)+'&editCode='+encodeURIComponent(code);
      return;
    }else{
      if(err)err.textContent=(data&&data.error)||'수정번호가 일치하지 않습니다.';
    }
  }catch(e){
    if(err)err.textContent='확인 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';
  }
  if(btn){btn.disabled=false;btn.textContent='수정하기';}
}

function downloadQR(){
  const container=document.getElementById('qrContainer');
  if(!container){showToast('QR 컨테이너를 찾을 수 없어요');return;}
  /* qrcodejs는 canvas 또는 img를 생성함 */

  const img=container.querySelector('img');
  const a=document.createElement('a');
  a.download='청첩장_QR.png';
  if(canvas){
    try{

      document.body.appendChild(a);a.click();document.body.removeChild(a);

    }catch(e){showToast('QR 저장 실패 — 길게 눌러서 저장해주세요');}
  }else if(img&&img.src){
    a.href=img.src;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    showToast('QR 코드가 저장됐어요 ✓');

}


/* ===== 공통 모바일 동작 엔진 =====
   동적으로 다시 그려지는 카드에서도 버튼 이벤트가 사라지지 않도록 document 한 곳에서 처리한다. */
function bindCommonActions(){
  if(window.__weddingActionsBound)return;window.__weddingActionsBound=true;
  document.addEventListener('click',function(e){
    const target=e.target instanceof Element?e.target.closest('[data-action]'):null;
    if(!target)return;
    const action=target.dataset.action;
    if(!action)return;
    if(target.tagName==='A')return;
    e.preventDefault();
    if(action==='toggle-account'){toggleAccountBox(target);return;}
    if(action==='copy-account'){copyAcc(target);return;}
    if(action==='gallery-more'){galMore(target);return;}
    if(action==='open-lightbox'){openLb(Number(target.dataset.index));return;}
    if(action==='rsvp-pick'){rsvpPick(target);return;}
    if(action==='open-rsvp'){
      target.style.display='none';const form=target.closest('.rsvp-sec')?.querySelector('.rsvp-form');if(form)form.style.display='flex';scheduleFabSafety();return;
    }
    if(action==='open-guest'){
      target.style.display='none';const form=target.closest('.guest-sec')?.querySelector('.guest-form');if(form)form.style.display='flex';scheduleFabSafety();return;
    }
    if(action==='submit-rsvp'){submitRsvp(target.dataset.cardId);return;}
    if(action==='submit-guest'){submitGuest(target.dataset.cardId);return;}
    if(action==='retry-load'){location.reload();return;}
    if(action==='close-lightbox'){closeLb();return;}
    if(action==='lightbox-step'){lbStep(Number(target.dataset.delta)||0);return;}
    if(action==='toggle-bgm'){toggleBgm();return;}
    if(action==='share-kakao'){shareKakao();return;}
    if(action==='copy-link'){copyCardLink();return;}
    if(action==='show-qr'){showQR();return;}
    if(action==='add-calendar'){addCalendar();return;}
    if(action==='open-edit'){openEditModal();return;}
    if(action==='toggle-fab'){toggleFab();return;}
    if(action==='download-qr'){downloadQR();return;}
    if(action==='close-qr'){closeQR();return;}
    if(action==='submit-edit-code'){submitEditCode();return;}
    if(action==='close-edit'){closeEditModal();return;}
  },false);
  /* iOS에서 버튼을 빠르게 탭할 때 선택 지연/하이라이트가 남지 않도록 포인터 처리 */
  document.addEventListener('keydown',function(e){
    if(e.key!=='Enter'&&e.key!==' ')return;
    const el=e.target instanceof Element?e.target.closest('[role="button"][data-action]'):null;
    if(!el)return;e.preventDefault();el.click();
  });
  document.addEventListener('pointerup',function(e){
    const el=e.target instanceof Element?e.target.closest('button,[role="button"],[data-action]'):null;
    if(el)el.classList.add('tap-active');
    setTimeout(()=>el?.classList.remove('tap-active'),120);
  },{passive:true});
}
bindCommonActions();

  var v=sel||'auto';
  if(v!=='auto'&&!AMB_EFFECTS[v])v='auto';
  if(v==='auto'){ return AMB_AUTO_MAP[theme]||'none'; }
  return v;
}
function ambParticleCount(effect,theme,stageW){
  var w=stageW||390, small=w<=390;
  if(effect==='winter_snow') return small?9:12;
  if(effect==='gold_dust'){
    if(theme==='gold-serif') return small?14:16;
    return small?17:19;
  }
  if(effect==='film_dust') return AMB_LIGHT_THEMES[theme]?(small?27:36):(small?23:31);
  if(effect==='pearl_bokeh') return AMB_LIGHT_THEMES[theme]?(small?8:11):(small?7:10);
  return 0;
}
function findAmbientStage(theme, coverEl){
  /* gold-serif: 프레임 뒤에 가려지지 않도록 카드 프레임 내부를 무대로 사용 (editor/card 통일) */
  if(theme==='gold-serif'){ var fr=coverEl.querySelector('.lt-frame'); if(fr) return fr; }
  var sel=AMB_STAGE_SEL[theme];
  if(sel){ var st=coverEl.querySelector(sel); if(st) return st; }
  return coverEl;
}
function removeAmbientLayer(root){
  if(!root)return;
  var L=root.querySelectorAll('.ambient-layer');
  for(var i=0;i<L.length;i++){ if(L[i].parentNode) L[i].parentNode.removeChild(L[i]); }
}
function createAmbientLayer(effect, theme, coverEl){
  if(!coverEl)return null;
  var stage=findAmbientStage(theme, coverEl);
  removeAmbientLayer(coverEl);
  if(effect==='none'||!AMB_EFFECTS[effect])return null;
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)return null;
  /* 입자 밀도는 stage 실제 폭 기준 (editor/card 강도 일치) */
  var stageW=(stage&&stage.clientWidth)?stage.clientWidth:(coverEl.clientWidth||390);
  var layer=document.createElement('div');
  var _ambCls=AMB_CLASS_MAP[effect];
  if(!_ambCls)return null;
  layer.className='ambient-layer '+_ambCls;
  var n=ambParticleCount(effect,theme,stageW);
  var isGS=(theme==='gold-serif');
  var isLight=!!AMB_LIGHT_THEMES[theme];   /* 밝은 배경 가시성 보정 */
  for(var i=0;i<n;i++){
    var p=document.createElement('div');p.className='ambient-particle';
    var size,dur,left,op,style;
    if(effect==='winter_snow'){
      /* === 겨울눈: 변경 금지 (기존 값 그대로) === */
      left=((i+Math.random())/n*100).toFixed(1);
      size=2+Math.random()*3; dur=10+Math.random()*8;
      op=(.35+Math.random()*.35).toFixed(3);
      var sway=(4+Math.random()*6).toFixed(1);
      var swayDur=(2.5+Math.random()*2.5).toFixed(2);
      style='left:'+left+'%;width:'+size+'px;height:'+size+'px;'
           +'--amb-op:'+op+';--amb-sway:'+sway+'px;'
           +'animation-duration:'+dur.toFixed(2)+'s,'+swayDur+'s;'
           +'animation-delay:'+(-Math.random()*dur).toFixed(2)+'s,'+(-Math.random()*swayDur).toFixed(2)+'s;';
    }else if(effect==='gold_dust'){
      /* === 골드 더스트 (재설계) === */
      var isPoint=(i % 5 === 0);                          /* 약 20%만 포인트 입자 */
      if(isGS){
        /* gold-serif: 중앙(38~62%) 최소화, 약 62% 좌우 / 38% 중앙외곽 */
        if(i % 10 < 6){ var side=(i%2===0); left=(side?(Math.random()*34):(66+Math.random()*34)).toFixed(1); }
        else { var seg=Math.random(); left=(seg<.5?(34+seg*8):(58+(seg-.5)*8)).toFixed(1); }
        size=(isPoint?(3+Math.random()*.5):(1.5+Math.random()*1.5)).toFixed(2);  /* 1.5~3 / 포인트 ~3.5 */
        dur=11+Math.random()*7;                            /* 11~18초 */
        var maxOpG=isPoint?(.44+Math.random()*.04):(.36+Math.random()*.10);     /* 포인트 0.44~0.48 / 일반 0.36~0.46 */
        op=Math.min(.48,maxOpG).toFixed(3);
        var glowG=(isPoint?(4+Math.random()*1):(2+Math.random()*2)).toFixed(1); /* 2~5px (유지) */
        var driftG=(4+Math.random()*6).toFixed(1);
        style='left:'+left+'%;width:'+size+'px;height:'+size+'px;'
             +'--amb-op:'+op+';--amb-drift:'+driftG+'px;'
             +'--amb-core:rgba(170,116,34,'+(.92+Math.random()*.06).toFixed(2)+');'
             +'--amb-edge:rgba(201,151,67,'+(.25+Math.random()*.10).toFixed(2)+');'
             +'--amb-glow:'+glowG+'px;--amb-glowc:rgba(150,108,40,.45);'
             +'animation-duration:'+dur.toFixed(2)+'s;'
             +'animation-delay:'+(-Math.random()*dur).toFixed(2)+'s;';
      }else{
        /* black: 구간 분할 분산, 명확히 보이는 따뜻한 골드 */
        left=((i+Math.random())/n*100).toFixed(1);
        size=(isPoint?(4+Math.random()):(2+Math.random()*2)).toFixed(2);         /* 2~4 / 포인트 4~5 */
        dur=9+Math.random()*6;                             /* 9~15초 */
        var maxOpB=isPoint?(.78+Math.random()*.07):(.58+Math.random()*.12);      /* 포인트 0.78~0.85 / 일반 0.58~0.70 */
        op=Math.min(.85,maxOpB).toFixed(3);
        var glowB=(isPoint?(7+Math.random()*3):(4+Math.random()*2)).toFixed(1);  /* 포인트 7~10px / 일반 4~6px */
        var driftB=(4+Math.random()*8).toFixed(1);                               /* 4~12px */
        style='left:'+left+'%;width:'+size+'px;height:'+size+'px;'
             +'--amb-op:'+op+';--amb-drift:'+driftB+'px;'
             +'--amb-core:rgba(255,225,145,'+(.92+Math.random()*.06).toFixed(2)+');'
             +'--amb-edge:rgba(196,136,44,'+(.30+Math.random()*.10).toFixed(2)+');'
             +'--amb-glow:'+glowB+'px;--amb-glowc:rgba(220,175,95,.55);'
             +'animation-duration:'+dur.toFixed(2)+'s;'
             +'animation-delay:'+(-Math.random()*dur).toFixed(2)+'s;';
      }
    }else if(effect==='pearl_bokeh'){
      left=((i+Math.random())/n*100).toFixed(1);
      var pbSz=isLight?(12+Math.random()*14):(10+Math.random()*12);  /* 밝은배경 12~26px / 기본 10~22px */
      size=pbSz.toFixed(2);
      dur=14+Math.random()*8;
      var pbOp=isLight?(.34+Math.random()*.16):(.27+Math.random()*.16); /* 밝은배경 opacity↑ */
      op=pbOp.toFixed(3);
      var driftPB=(6+Math.random()*5).toFixed(1); var pulseDur=(4+Math.random()*3).toFixed(2);
      var dlyPB=(i%5<2)?(-(.2+Math.random()*.6)*dur):(-Math.random()*dur);
      style='left:'+left+'%;width:'+size+'px;height:'+size+'px;--amb-op:'+op+';--amb-drift:'+driftPB+'px;'
           +(isLight?'--amb-ring:inset 0 0 0 1px rgba(206,184,150,.28);':'')  /* 연한 베이지/샴페인 테두리 */
           +'animation-duration:'+dur.toFixed(2)+'s,'+pulseDur+'s;'
           +'animation-delay:'+dlyPB.toFixed(2)+'s,'+(-Math.random()*pulseDur).toFixed(2)+'s;';
    }else if(effect==='film_dust'){
      left=((i+Math.random())/n*100).toFixed(1);
      size=(1+Math.random()).toFixed(2);                   /* 1~2px (유지) */
      dur=14+Math.random()*10;
      var fdOp=isLight?(.22+Math.random()*.12):(.18+Math.random()*.12); /* 밝은배경 opacity↑ */
      op=fdOp.toFixed(3);
      var flickDur=(.6+Math.random()*.6).toFixed(2);
      var dlyF=(i%4<2)?(-(.2+Math.random()*.6)*dur):(-Math.random()*dur);
      /* 밝은배경: 흰점 대신 옅은 브라운/세피아 */
      var fdCore=isLight?('rgba('+(122+Math.floor(Math.random()*24))+','+(92+Math.floor(Math.random()*20))+','+(64+Math.floor(Math.random()*18))+',.55)'):'';
      style='left:'+left+'%;width:'+size+'px;height:'+size+'px;--amb-op:'+op+';'
           +(fdCore?('--amb-core:'+fdCore+';'):'')
           +'animation-duration:'+dur.toFixed(2)+'s,'+flickDur+'s;'
           +'animation-delay:'+dlyF.toFixed(2)+'s,'+(-Math.random()*parseFloat(flickDur)).toFixed(2)+'s;';
    }
    p.style.cssText=style;
    layer.appendChild(p);
  }
  /* 레이어 순서: 사진/배경 → ambient → 그라데이션 → 텍스트. 그라데이션 앞에 삽입 */
  var fade=null;
  for(var ff=0; ff<AMB_FADE_SEL.length; ff++){ var fe=stage.querySelector(AMB_FADE_SEL[ff]); if(fe&&fe.parentNode===stage){ fade=fe; break; } }
  if(fade){ stage.insertBefore(layer, fade); }
  else if(stage.firstChild){ stage.insertBefore(layer, stage.firstChild.nextSibling); }
  else { stage.appendChild(layer); }
  return layer;
}
var _ambObserver=null, _ambVisHandler=null;
function setupAmbientVisibility(coverEl){
  if(_ambObserver){_ambObserver.disconnect();_ambObserver=null;}
  if(!coverEl)return;
  var layer=coverEl.querySelector('.ambient-layer');
  if(!layer)return;
  if('IntersectionObserver' in window){
    _ambObserver=new IntersectionObserver(function(ents){
      ents.forEach(function(e){
        if(e.isIntersecting&&e.intersectionRatio>=0.35){ layer.classList.remove('amb-hidden'); }
        else if(e.intersectionRatio<0.15){ layer.classList.add('amb-hidden'); }
      });
    },{threshold:[0,0.15,0.35,1]});
    _ambObserver.observe(coverEl);
  }
  if(_ambVisHandler)document.removeEventListener('visibilitychange',_ambVisHandler);
  _ambVisHandler=function(){
    if(document.hidden){ layer.classList.add('amb-hidden'); return; }
    /* 재활성화: 첫 화면이 viewport 안에 충분히 보일 때만 재개 */
    var r=coverEl.getBoundingClientRect();
    var vh=window.innerHeight||document.documentElement.clientHeight;
    var visible=Math.min(r.bottom,vh)-Math.max(r.top,0);
    var ratio=r.height>0?visible/r.height:0;
    if(ratio>=0.35){ layer.classList.remove('amb-hidden'); }
    else { layer.classList.add('amb-hidden'); }
  };
  document.addEventListener('visibilitychange',_ambVisHandler);
}
function applyAmbient(theme, selected, coverEl){
  if(!coverEl)return;
  var effect=resolveAmbientEffect(theme, selected);
  createAmbientLayer(effect, theme, coverEl);
  setupAmbientVisibility(coverEl);
}

</script>
</body>
</html>
